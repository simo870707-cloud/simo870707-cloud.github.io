  var NEST=[{"icon": "✨", "bg": "#E8F1EC", "bd": "#CFE0D5", "rad": "20px", "name": ["Cleaning", "Ménage", "Pulizie", "Putzen", "Curățenie"], "blurb": ["Calm, repeatable cleaning that actually keeps the house fresh.", "Un ménage calme et régulier qui garde vraiment la maison fraîche.", "Pulizie tranquille e ripetibili che mantengono davvero fresca la casa.", "Ruhiges, wiederholbares Putzen, das das Zuhause wirklich frisch hält.", "Curățenie calmă și repetabilă care chiar păstrează casa proaspătă."], "topics": [{"icon": "🌬️", "t": ["The deep-clean rhythm", "Le rythme du grand nettoyage", "Il ritmo delle pulizie profonde", "Der Grundreinigungs-Rhythmus", "Ritmul curățeniei profunde"], "b": ["Work top to bottom and left to right in each room, so dust and crumbs always fall onto surfaces you haven't cleaned yet. Do one full room a day rather than the whole house at once — it keeps the task small and the result lasting.", "Nettoyez du haut vers le bas et de gauche à droite dans chaque pièce, pour que poussière et miettes tombent toujours sur des surfaces pas encore nettoyées. Faites une pièce entière par jour plutôt que toute la maison d'un coup : la tâche reste petite et le résultat dure.", "Pulisci dall'alto verso il basso e da sinistra a destra in ogni stanza, così polvere e briciole cadono sempre su superfici non ancora pulite. Fai una stanza intera al giorno invece di tutta la casa in una volta: il compito resta piccolo e il risultato dura.", "Arbeite in jedem Raum von oben nach unten und von links nach rechts, damit Staub und Krümel immer auf noch ungereinigte Flächen fallen. Mach lieber einen ganzen Raum pro Tag als das ganze Haus auf einmal — so bleibt die Aufgabe klein und das Ergebnis hält.", "Curăță de sus în jos și de la stânga la dreapta în fiecare cameră, ca praful și firimiturile să cadă mereu pe suprafețe necurățate încă. Fă o cameră întreagă pe zi în loc de toată casa deodată — sarcina rămâne mică, iar rezultatul ține."]}, {"icon": "🧪", "t": ["Natural cleaning solutions", "Solutions de nettoyage naturelles", "Soluzioni di pulizia naturali", "Natürliche Reinigungsmittel", "Soluții de curățare naturale"], "b": ["A spray of equal parts white vinegar and water cuts grease and limescale on most hard surfaces, while a paste of baking soda lifts grime from sinks and ovens. Keep vinegar away from natural stone like marble, which it can etch.", "Un vaporisateur moitié vinaigre blanc, moitié eau dégraisse et enlève le calcaire sur la plupart des surfaces dures, tandis qu'une pâte de bicarbonate décolle la crasse des éviers et des fours. Évitez le vinaigre sur la pierre naturelle comme le marbre, qu'il peut attaquer.", "Uno spray di aceto bianco e acqua in parti uguali sgrassa e toglie il calcare dalla maggior parte delle superfici dure, mentre una pasta di bicarbonato solleva lo sporco da lavelli e forni. Tieni l'aceto lontano dalla pietra naturale come il marmo, che può corrodere.", "Ein Spray aus gleichen Teilen weißem Essig und Wasser löst Fett und Kalk auf den meisten harten Flächen, eine Paste aus Natron hebt Schmutz aus Spülen und Öfen. Halte Essig von Naturstein wie Marmor fern, den er angreifen kann.", "Un spray din părți egale de oțet alb și apă desface grăsimea și calcarul de pe majoritatea suprafețelor dure, iar o pastă de bicarbonat ridică murdăria din chiuvete și cuptoare. Ține oțetul departe de piatra naturală precum marmura, pe care o poate coroda."]}, {"icon": "🩹", "t": ["Stain-removal first aid", "Premiers secours anti-taches", "Pronto soccorso antimacchia", "Erste Hilfe bei Flecken", "Prim ajutor pentru pete"], "b": ["Blot, never rub, and treat stains while fresh with cool water — heat sets many of them for good. Match the remedy to the stain: dish soap for grease, cold water for blood, and a little vinegar for coffee or tea.", "Tamponnez sans frotter et traitez les taches fraîches à l'eau froide : la chaleur en fixe beaucoup définitivement. Adaptez le remède à la tache : liquide vaisselle pour le gras, eau froide pour le sang, un peu de vinaigre pour le café ou le thé.", "Tampona senza strofinare e tratta le macchie fresche con acqua fredda: il calore ne fissa molte per sempre. Adatta il rimedio alla macchia: detersivo per i piatti sul grasso, acqua fredda sul sangue, un po' di aceto su caffè o tè.", "Tupfen statt reiben und Flecken frisch mit kaltem Wasser behandeln — Hitze fixiert viele für immer. Wähle das Mittel passend zum Fleck: Spülmittel gegen Fett, kaltes Wasser gegen Blut, etwas Essig gegen Kaffee oder Tee.", "Tamponează, nu freca, și tratează petele cât sunt proaspete cu apă rece — căldura fixează multe pentru totdeauna. Potrivește remediul cu pata: detergent de vase pentru grăsime, apă rece pentru sânge și puțin oțet pentru cafea sau ceai."], "steps": [["Blot up as much as you can with a clean cloth.", "Épongez le maximum avec un chiffon propre.", "Tampona più che puoi con un panno pulito.", "Tupfe mit einem sauberen Tuch so viel wie möglich auf.", "Absoarbe cât poți cu o cârpă curată."], ["Rinse from the back of the fabric with cool water.", "Rincez l'envers du tissu à l'eau froide.", "Risciacqua dal retro del tessuto con acqua fredda.", "Spüle von der Rückseite des Stoffs mit kaltem Wasser.", "Clătește din spatele materialului cu apă rece."], ["Apply the right remedy and let it sit a few minutes.", "Appliquez le bon remède et laissez agir quelques minutes.", "Applica il rimedio giusto e lascia agire qualche minuto.", "Trage das passende Mittel auf und lass es einige Minuten einwirken.", "Aplică remediul potrivit și lasă-l câteva minute."], ["Wash as usual, then air-dry — heat locks in leftovers.", "Lavez normalement puis séchez à l'air : la chaleur fixe les restes.", "Lava come al solito, poi asciuga all'aria: il calore fissa i residui.", "Wasche wie gewohnt und lufttrockne — Hitze fixiert Reste.", "Spală normal, apoi usucă la aer — căldura fixează rămășițele."]]}, {"icon": "🧹", "t": ["The ten-minute tidy", "Le rangement en dix minutes", "Il riordino in dieci minuti", "Die Zehn-Minuten-Ordnung", "Ordinea în zece minute"], "b": ["Set a timer for ten minutes and tidy only the surfaces you see most — the kitchen counter, the coffee table, the hall. Carry a basket to gather stray items in one sweep, then put them away as you move through the house. Done daily, this small habit stops mess from ever piling up.", "Réglez un minuteur sur dix minutes et ne rangez que les surfaces les plus visibles : le plan de travail, la table basse, l'entrée. Munissez-vous d'un panier pour rassembler les objets égarés en une fois, puis rangez-les en circulant dans la maison. Pratiquée chaque jour, cette petite habitude empêche le désordre de s'accumuler.", "Imposta un timer su dieci minuti e riordina solo le superfici più in vista: il piano della cucina, il tavolino, l'ingresso. Tieni a portata un cesto per raccogliere gli oggetti sparsi in un solo giro, poi rimettili a posto mentre attraversi casa. Fatta ogni giorno, questa piccola abitudine impedisce al disordine di accumularsi.", "Stell einen Timer auf zehn Minuten und räume nur die Flächen auf, die du am meisten siehst — die Küchenzeile, den Couchtisch, den Flur. Nimm einen Korb, um verstreute Dinge in einem Durchgang einzusammeln, und räume sie weg, während du durchs Haus gehst. Täglich gemacht, verhindert diese kleine Gewohnheit, dass sich Unordnung je auftürmt.", "Pune un cronometru la zece minute și strânge doar suprafețele pe care le vezi cel mai des — blatul din bucătărie, măsuța, holul. Ia un coș ca să aduni lucrurile rătăcite dintr-o singură trecere, apoi pune-le la loc în timp ce străbați casa. Făcut zilnic, acest mic obicei împiedică dezordinea să se adune."]}]}, {"icon": "📦", "bg": "#ECE8F2", "bd": "#D8D0E2", "rad": "22px 22px 22px 6px", "name": ["Organization", "Rangement", "Organizzazione", "Ordnung", "Organizare"], "blurb": ["Less clutter, calmer rooms, and a place for everything.", "Moins de désordre, des pièces plus sereines, une place pour chaque chose.", "Meno disordine, stanze più serene e un posto per ogni cosa.", "Weniger Unordnung, ruhigere Räume und ein Platz für alles.", "Mai puțină dezordine, camere mai liniștite și un loc pentru fiecare lucru."], "topics": [{"icon": "🧹", "t": ["Declutter by category", "Désencombrer par catégorie", "Riordinare per categoria", "Ausmisten nach Kategorie", "Debarasează pe categorii"], "b": ["Gather every item of one kind — all the books, then all the mugs — into a single pile so you finally see how much you own. Keep only what you use or love, and give everything that stays a fixed home.", "Rassemblez tous les objets d'une même catégorie — tous les livres, puis toutes les tasses — en un seul tas pour enfin voir ce que vous possédez. Ne gardez que ce que vous utilisez ou aimez, et donnez une place fixe à tout ce qui reste.", "Raduna ogni oggetto dello stesso tipo — tutti i libri, poi tutte le tazze — in un'unica pila per vedere finalmente quanto possiedi. Tieni solo ciò che usi o ami e dai una casa fissa a tutto ciò che resta.", "Sammle alle Dinge einer Art — alle Bücher, dann alle Tassen — auf einen Haufen, um endlich zu sehen, wie viel du besitzt. Behalte nur, was du nutzt oder liebst, und gib allem, was bleibt, einen festen Platz.", "Adună fiecare obiect de un fel — toate cărțile, apoi toate cănile — într-un singur morman, ca să vezi în sfârșit cât deții. Păstrează doar ce folosești sau iubești și dă-i fiecărui lucru rămas un loc fix."]}, {"icon": "🗄️", "t": ["Small-space storage", "Rangement pour petits espaces", "Soluzioni salvaspazio", "Stauraum auf kleinem Raum", "Depozitare în spații mici"], "b": ["Use vertical space — tall shelves, over-door racks and hooks — so the floor stays open and rooms feel larger. Clear bins with labels let you stack high and still find things at a glance.", "Exploitez la hauteur — étagères hautes, range-tout sur porte et crochets — pour garder le sol dégagé et agrandir les pièces. Des bacs transparents étiquetés permettent d'empiler haut tout en retrouvant tout d'un coup d'œil.", "Sfrutta lo spazio verticale — scaffali alti, organizer da porta e ganci — così il pavimento resta libero e le stanze sembrano più grandi. Contenitori trasparenti etichettati ti fanno impilare in alto e trovare tutto a colpo d'occhio.", "Nutze die Höhe — hohe Regale, Türhänger und Haken — damit der Boden frei bleibt und Räume größer wirken. Durchsichtige, beschriftete Boxen lassen dich hoch stapeln und alles auf einen Blick finden.", "Folosește spațiul vertical — rafturi înalte, suporturi de ușă și cârlige — ca podeaua să rămână liberă și camerele să pară mai mari. Cutiile transparente, etichetate, îți permit să stivuiești sus și să găsești totul dintr-o privire."]}, {"icon": "🥫", "t": ["A pantry that works", "Un garde-manger efficace", "Una dispensa che funziona", "Eine Speisekammer, die funktioniert", "O cămară care funcționează"], "b": ["Decant dry goods into matching jars and put the oldest at the front so nothing expires unseen. Group by use — baking, breakfast, snacks — and keep a small 'running low' list on the door.", "Transvasez les produits secs dans des bocaux assortis et placez les plus anciens devant pour que rien ne périme en silence. Regroupez par usage — pâtisserie, petit-déjeuner, en-cas — et tenez une petite liste « bientôt fini » sur la porte.", "Travasa gli alimenti secchi in barattoli uguali e metti i più vecchi davanti, così nulla scade inosservato. Raggruppa per uso — dolci, colazione, snack — e tieni sulla porta una piccola lista «in esaurimento».", "Fülle Trockenwaren in gleiche Gläser und stelle die ältesten nach vorne, damit nichts ungesehen abläuft. Gruppiere nach Verwendung — Backen, Frühstück, Snacks — und führe an der Tür eine kleine „geht zur Neige”-Liste.", "Toarnă alimentele uscate în borcane asortate și pune-le pe cele mai vechi în față, ca nimic să nu expire neobservat. Grupează după utilizare — copt, mic dejun, gustări — și ține pe ușă o listă mică „pe terminate”."]}, {"icon": "🔁", "t": ["The one-in, one-out rule", "La règle : un entré, un sorti", "La regola: uno entra, uno esce", "Die Eins-rein-eins-raus-Regel", "Regula: unul intră, unul iese"], "b": ["Every time something new comes into the house, let one similar thing leave — a new shirt means an old one goes. It keeps drawers and shelves from slowly overflowing and makes you pause before each purchase. Keep a donation box by the door so letting go stays effortless.", "Chaque fois qu'un objet neuf entre dans la maison, laissez-en partir un semblable : une nouvelle chemise, une ancienne s'en va. Cela évite que tiroirs et étagères ne débordent peu à peu et vous fait réfléchir avant chaque achat. Gardez un carton de dons près de la porte pour que se séparer reste facile.", "Ogni volta che qualcosa di nuovo entra in casa, lascia uscire qualcosa di simile: una camicia nuova significa una vecchia che se ne va. Evita che cassetti e scaffali trabocchino piano piano e ti fa riflettere prima di ogni acquisto. Tieni una scatola per le donazioni vicino alla porta, così liberarsene resta semplice.", "Immer wenn etwas Neues ins Haus kommt, lass ein ähnliches Stück gehen — ein neues Hemd bedeutet, ein altes zieht aus. So laufen Schubladen und Regale nicht langsam über, und du hältst vor jedem Kauf kurz inne. Stell eine Spendenkiste an die Tür, damit das Loslassen mühelos bleibt.", "De fiecare dată când ceva nou intră în casă, lasă să plece ceva asemănător — o cămașă nouă înseamnă că una veche pleacă. Astfel sertarele și rafturile nu se revarsă încet, iar tu te oprești o clipă înainte de fiecare cumpărătură. Ține o cutie pentru donații lângă ușă, ca renunțarea să rămână ușoară."]}]}, {"icon": "🍳", "bg": "#F8E9DC", "bd": "#EAD2BF", "rad": "16px", "name": ["Kitchen", "Cuisine", "Cucina", "Küche", "Bucătărie"], "blurb": ["Plan, cook and shop with less stress and less waste.", "Planifier, cuisiner et faire les courses avec moins de stress et moins de gaspillage.", "Pianificare, cucinare e fare la spesa con meno stress e meno sprechi.", "Planen, kochen und einkaufen mit weniger Stress und weniger Abfall.", "Planifică, gătește și fă cumpărături cu mai puțin stres și mai puțină risipă."], "topics": [{"icon": "📅", "t": ["A weekly meal plan", "Un menu de la semaine", "Un menù settimanale", "Ein Wochen-Essensplan", "Un plan de mese săptămânal"], "b": ["Pick a handful of reliable dinners, write them against the days, and build your shopping list straight from that. Planning even three nights a week cuts last-minute takeaways and the 'what's for dinner' fatigue.", "Choisissez quelques dîners fiables, inscrivez-les en face des jours et dressez votre liste de courses à partir de là. Planifier ne serait-ce que trois soirs par semaine réduit les plats à emporter de dernière minute et la fatigue du « qu'est-ce qu'on mange ? ».", "Scegli alcune cene affidabili, scrivile accanto ai giorni e crea la lista della spesa direttamente da lì. Pianificare anche solo tre sere a settimana riduce i take-away dell'ultimo minuto e la stanchezza del «cosa si mangia?».", "Wähle ein paar verlässliche Abendessen, schreibe sie zu den Tagen und erstelle die Einkaufsliste direkt daraus. Schon drei geplante Abende pro Woche sparen Last-Minute-Lieferungen und die „Was gibt's heute?”-Müdigkeit.", "Alege câteva cine de încredere, scrie-le în dreptul zilelor și fă lista de cumpărături direct din ele. Planificarea a doar trei seri pe săptămână reduce comenzile de ultim moment și oboseala întrebării „ce mâncăm?”."]}, {"icon": "🧊", "t": ["Freezer meals", "Plats au congélateur", "Piatti da congelare", "Gerichte aus dem Tiefkühler", "Mese la congelator"], "b": ["Cook double of soups, stews and sauces and freeze half in flat, labelled bags that thaw quickly and stack thin. A small stash of ready meals turns a hard day into a five-minute dinner.", "Cuisinez en double les soupes, ragoûts et sauces et congelez la moitié dans des sachets plats étiquetés qui décongèlent vite et s'empilent. Une petite réserve de plats prêts transforme une journée difficile en dîner de cinq minutes.", "Cucina il doppio di zuppe, stufati e sughi e congela metà in sacchetti piatti ed etichettati che si scongelano in fretta e si impilano sottili. Una piccola scorta di piatti pronti trasforma una giornata dura in una cena di cinque minuti.", "Koche die doppelte Menge Suppen, Eintöpfe und Soßen und friere die Hälfte in flachen, beschrifteten Beuteln ein, die schnell auftauen und platzsparend stapeln. Ein kleiner Vorrat verwandelt einen harten Tag in ein Fünf-Minuten-Essen.", "Gătește dublu din supe, tocănițe și sosuri și congelează jumătate în pungi plate, etichetate, care se decongelează repede și se stivuiesc subțire. O mică rezervă de mese gata transformă o zi grea într-o cină de cinci minute."]}, {"icon": "🛒", "t": ["Smarter grocery trips", "Des courses plus malines", "Spesa più intelligente", "Cleverer einkaufen", "Cumpărături mai inteligente"], "b": ["Shop with a list grouped by aisle and never on an empty stomach — both cut impulse buys sharply. Check what you already have first, so you stop buying a third jar of the same thing.", "Faites les courses avec une liste classée par rayon et jamais le ventre vide : les deux réduisent fortement les achats impulsifs. Vérifiez d'abord ce que vous avez déjà, pour cesser d'acheter un troisième pot de la même chose.", "Fai la spesa con una lista divisa per corsia e mai a stomaco vuoto: entrambi riducono molto gli acquisti d'impulso. Controlla prima cosa hai già, così smetti di comprare il terzo barattolo della stessa cosa.", "Kaufe mit einer nach Gängen sortierten Liste und nie mit leerem Magen — beides senkt Impulskäufe deutlich. Sieh zuerst nach, was du schon hast, damit du nicht das dritte Glas vom Gleichen kaufst.", "Fă cumpărături cu o listă grupată pe raioane și niciodată pe stomacul gol — ambele reduc mult cumpărăturile impulsive. Verifică întâi ce ai deja, ca să nu mai cumperi al treilea borcan din același lucru."]}, {"icon": "🍲", "t": ["Batch-cook the basics", "Cuisiner les bases en lot", "Cucinare le basi in grandi quantità", "Grundzutaten auf Vorrat kochen", "Gătește bazele în loturi"], "b": ["Cook a big pot of rice, grains, beans or roasted vegetables once, and they become the backbone of several quick meals through the week. Keep them in clear containers at eye level so you reach for them first. A little cooking on one calm evening saves an hour on every busy night.", "Préparez une grande casserole de riz, de céréales, de légumineuses ou de légumes rôtis en une fois : ils deviennent la base de plusieurs repas rapides dans la semaine. Rangez-les dans des boîtes transparentes à hauteur des yeux pour les attraper en premier. Un peu de cuisine un soir tranquille vous épargne une heure chaque soir pressé.", "Cuoci una volta una grande pentola di riso, cereali, legumi o verdure al forno: diventano la base di diversi pasti veloci durante la settimana. Tienili in contenitori trasparenti all'altezza degli occhi, così li prendi per primi. Un po' di cucina in una sera tranquilla ti fa risparmiare un'ora in ogni sera di corsa.", "Koch einmal einen großen Topf Reis, Getreide, Bohnen oder Ofengemüse — sie werden zur Grundlage mehrerer schneller Mahlzeiten in der Woche. Bewahre sie in durchsichtigen Behältern auf Augenhöhe auf, damit du zuerst danach greifst. Ein wenig Kochen an einem ruhigen Abend spart an jedem hektischen Abend eine Stunde.", "Gătește o dată o oală mare de orez, cereale, fasole sau legume la cuptor — devin baza mai multor mese rapide în timpul săptămânii. Ține-le în recipiente transparente la nivelul ochilor, ca să le iei primele. Puțin gătit într-o seară liniștită îți economisește o oră în fiecare seară aglomerată."]}]}, {"icon": "💰", "bg": "#F5EFD6", "bd": "#E6DBB4", "rad": "24px", "name": ["Save Money", "Économiser", "Risparmiare", "Geld sparen", "Economisește bani"], "blurb": ["Small household habits that quietly add up over a year.", "De petites habitudes domestiques qui, mine de rien, comptent sur l'année.", "Piccole abitudini domestiche che, in un anno, fanno la differenza.", "Kleine Haushaltsgewohnheiten, die sich übers Jahr leise summieren.", "Mici obiceiuri casnice care, pe parcursul anului, contează."], "topics": [{"icon": "💡", "t": ["Lower your utility bills", "Réduisez vos factures", "Abbassa le bollette", "Senke deine Nebenkosten", "Reduce facturile"], "b": ["Wash clothes on cold, run only full loads, and switch off 'standby' devices at the wall — phantom power can be a tenth of a home's electricity. Lowering the thermostat by one degree noticeably trims heating costs over winter.", "Lavez à froid, ne lancez que des machines pleines et coupez les appareils en veille à la prise : la consommation fantôme peut représenter un dixième de l'électricité d'un logement. Baisser le thermostat d'un degré réduit nettement le chauffage sur l'hiver.", "Lava a freddo, avvia solo lavaggi pieni e spegni gli apparecchi in standby dalla presa: i consumi fantasma possono essere un decimo dell'elettricità di casa. Abbassare il termostato di un grado riduce sensibilmente il riscaldamento in inverno.", "Wasche kalt, starte nur volle Maschinen und schalte Standby-Geräte an der Steckdose aus — Phantomstrom kann ein Zehntel des Hausstroms sein. Das Thermostat um ein Grad zu senken spart über den Winter spürbar Heizkosten.", "Spală la rece, pornește doar mașini pline și oprește aparatele în standby de la priză — consumul-fantomă poate fi o zecime din electricitatea casei. Coborârea termostatului cu un grad reduce vizibil încălzirea pe iarnă."]}, {"icon": "🧴", "t": ["DIY household products", "Produits maison", "Prodotti fatti in casa", "Hausmittel selbst machen", "Produse de casă DIY"], "b": ["An all-purpose spray of vinegar, water and a drop of dish soap replaces several store bottles for pennies. A bowl of baking soda quietly absorbs fridge and room odours without any fragrance spray.", "Un spray multi-usage à base de vinaigre, d'eau et d'une goutte de liquide vaisselle remplace plusieurs flacons du commerce pour quelques centimes. Un bol de bicarbonate absorbe discrètement les odeurs du frigo et des pièces, sans désodorisant.", "Uno spray multiuso di aceto, acqua e una goccia di detersivo per piatti sostituisce vari flaconi del negozio per pochi centesimi. Una ciotola di bicarbonato assorbe in silenzio gli odori del frigo e delle stanze, senza profumatori.", "Ein Allzweckspray aus Essig, Wasser und einem Tropfen Spülmittel ersetzt für ein paar Cent mehrere gekaufte Flaschen. Eine Schale Natron schluckt Kühlschrank- und Raumgerüche ganz ohne Duftspray.", "Un spray universal din oțet, apă și un strop de detergent de vase înlocuiește mai multe sticle din magazin pentru câțiva bani. Un bol cu bicarbonat absoarbe discret mirosurile din frigider și camere, fără spray parfumat."]}, {"icon": "🥗", "t": ["Cut food waste", "Réduisez le gaspillage", "Riduci gli sprechi", "Lebensmittelabfall vermeiden", "Reduce risipa de mâncare"], "b": ["Keep a 'eat me first' shelf at eye level in the fridge for things near their date, and cook flexible meals like soups and frittatas to use up odds and ends. Most households throw away around a quarter of the food they buy — a real, recoverable cost.", "Réservez une étagère « à manger en premier » à hauteur des yeux pour les produits proches de leur date, et cuisinez des plats souples — soupes, frittatas — pour écouler les restes. La plupart des foyers jettent environ un quart de ce qu'ils achètent : un coût bien réel et récupérable.", "Tieni a livello degli occhi nel frigo un ripiano «da mangiare per primo» per ciò che è vicino alla scadenza e cucina piatti flessibili come zuppe e frittate per usare gli avanzi. Molte famiglie buttano circa un quarto del cibo che comprano: un costo reale e recuperabile.", "Richte im Kühlschrank auf Augenhöhe ein „Zuerst essen”-Fach für Ablaufendes ein und koche flexible Gerichte wie Suppen und Frittatas, um Reste zu verwerten. Die meisten Haushalte werfen rund ein Viertel der gekauften Lebensmittel weg — echte, vermeidbare Kosten.", "Ține în frigider, la nivelul ochilor, un raft „de mâncat întâi” pentru ce e aproape de termen și gătește mese flexibile precum supe și frittate ca să folosești resturile. Multe gospodării aruncă în jur de un sfert din mâncarea cumpărată — un cost real și recuperabil."]}, {"icon": "💳", "t": ["Audit your subscriptions", "Passez vos abonnements en revue", "Controlla i tuoi abbonamenti", "Prüfe deine Abos", "Verifică-ți abonamentele"], "b": ["List every recurring charge — streaming, apps, memberships — in one place, then cancel anything you haven't used in the last month. Many quietly renew long after we stop noticing them. Re-checking every few months keeps small monthly fees from quietly adding up to a large yearly one.", "Notez au même endroit chaque prélèvement récurrent — streaming, applis, adhésions — puis résiliez tout ce que vous n'avez pas utilisé le mois dernier. Beaucoup se renouvellent en silence bien après qu'on les a oubliés. Revérifier tous les quelques mois évite que de petits frais mensuels finissent par former une grosse somme annuelle.", "Elenca in un unico posto ogni addebito ricorrente — streaming, app, iscrizioni — poi disdici tutto ciò che non usi da un mese. Molti si rinnovano in silenzio molto dopo che abbiamo smesso di notarli. Ricontrollare ogni pochi mesi evita che piccole spese mensili diventino in sordina una grande spesa annuale.", "Schreib jede wiederkehrende Abbuchung — Streaming, Apps, Mitgliedschaften — an einer Stelle auf und kündige alles, was du im letzten Monat nicht genutzt hast. Vieles verlängert sich still, lange nachdem wir es nicht mehr bemerken. Alle paar Monate nachzusehen verhindert, dass kleine monatliche Gebühren heimlich zu einer großen Jahressumme werden.", "Notează într-un singur loc fiecare plată recurentă — streaming, aplicații, abonamente — apoi anulează tot ce nu ai folosit în ultima lună. Multe se reînnoiesc în tăcere mult după ce încetăm să le observăm. O verificare la câteva luni împiedică micile taxe lunare să se adune pe nesimțite într-una mare, anuală."]}]}, {"icon": "🏠", "bg": "#E4EDF2", "bd": "#CBDAE3", "rad": "6px 22px 22px 22px", "name": ["Home Care", "Entretien", "Cura della casa", "Hauspflege", "Întreținerea casei"], "blurb": ["The quiet upkeep that keeps a home running smoothly.", "L'entretien discret qui fait tourner la maison sans accroc.", "La manutenzione silenziosa che fa funzionare bene la casa.", "Die stille Pflege, die ein Zuhause am Laufen hält.", "Întreținerea discretă care face casa să meargă lin."], "topics": [{"icon": "🗓️", "t": ["A calm cleaning schedule", "Un planning de ménage serein", "Un programma di pulizie sereno", "Ein ruhiger Putzplan", "Un program de curățenie calm"], "b": ["Spread tasks across the week — surfaces one day, floors another, bathrooms another — so cleaning never swallows a whole weekend. Daily ten-minute resets keep the baseline tidy, so deep cleans stay rare and quick.", "Répartissez les tâches sur la semaine — surfaces un jour, sols un autre, salles de bain encore un autre — pour que le ménage n'avale jamais tout un week-end. Des remises en ordre quotidiennes de dix minutes maintiennent le niveau de base, et les grands nettoyages restent rares et rapides.", "Distribuisci i compiti nella settimana — superfici un giorno, pavimenti un altro, bagni un altro ancora — così le pulizie non si mangiano mai un intero weekend. Riordini quotidiani di dieci minuti tengono la base in ordine, e le pulizie profonde restano rare e veloci.", "Verteile die Aufgaben über die Woche — Flächen an einem Tag, Böden an einem anderen, Bäder an einem dritten — damit Putzen nie ein ganzes Wochenende verschlingt. Tägliche Zehn-Minuten-Aufräumrunden halten die Basis ordentlich, sodass Grundreinigungen selten und kurz bleiben.", "Împarte sarcinile pe parcursul săptămânii — suprafețe într-o zi, podele în alta, băi în alta — ca să nu îți înghită curățenia un weekend întreg. Resetările zilnice de zece minute mențin baza ordonată, iar curățeniile profunde rămân rare și rapide."]}, {"icon": "👕", "t": ["Laundry done right", "Une lessive bien faite", "Bucato fatto bene", "Wäsche richtig gemacht", "Rufe spălate corect"], "b": ["Sort by colour and fabric weight, close zips and turn prints inside out to protect them, and don't overload the drum — clothes need room to move to come out clean. Air-drying saves energy and is gentler on fibres than a hot tumble.", "Triez par couleur et par épaisseur, fermez les fermetures éclair et retournez les imprimés pour les protéger, et ne surchargez pas le tambour : le linge a besoin de place pour bouger et ressortir propre. Le séchage à l'air économise de l'énergie et ménage les fibres mieux qu'un sèche-linge chaud.", "Dividi per colore e peso del tessuto, chiudi le cerniere e rovescia le stampe per proteggerle, e non sovraccaricare il cestello: i capi hanno bisogno di spazio per muoversi e uscire puliti. Asciugare all'aria risparmia energia ed è più delicato delle fibre rispetto all'asciugatrice calda.", "Sortiere nach Farbe und Stoffgewicht, schließe Reißverschlüsse und drehe Drucke auf links zum Schutz, und überlade die Trommel nicht — Wäsche braucht Platz zum Bewegen, um sauber zu werden. Lufttrocknen spart Energie und ist schonender für Fasern als heißes Trocknen.", "Sortează după culoare și greutatea materialului, închide fermoarele și întoarce imprimeurile pe dos ca să le protejezi și nu supraîncărca tamburul — hainele au nevoie de loc să se miște ca să iasă curate. Uscarea la aer economisește energie și e mai blândă cu fibrele decât uscătorul fierbinte."]}, {"icon": "🔧", "t": ["Seasonal maintenance", "Entretien saisonnier", "Manutenzione stagionale", "Saisonale Wartung", "Întreținere sezonieră"], "b": ["A few times a year, test smoke alarms, clear gutters and drains, and check seals around windows and doors before the weather turns. Catching small problems early — a drip, a draught, a soft hinge — keeps them from becoming expensive repairs.", "Quelques fois par an, testez les détecteurs de fumée, dégagez gouttières et siphons, et vérifiez les joints des fenêtres et des portes avant que le temps ne change. Repérer tôt les petits soucis — une fuite, un courant d'air, un gond fatigué — évite des réparations coûteuses.", "Qualche volta l'anno, prova gli allarmi antifumo, libera grondaie e scarichi e controlla le guarnizioni di finestre e porte prima che cambi il tempo. Cogliere presto i piccoli problemi — un gocciolio, uno spiffero, un cardine molle — evita riparazioni costose.", "Teste ein paar Mal im Jahr Rauchmelder, reinige Dachrinnen und Abflüsse und prüfe Dichtungen an Fenstern und Türen, bevor das Wetter umschlägt. Kleine Probleme früh zu erkennen — ein Tropfen, ein Zug, ein lockeres Scharnier — verhindert teure Reparaturen.", "De câteva ori pe an, testează detectoarele de fum, curăță jgheaburile și scurgerile și verifică garniturile ferestrelor și ușilor înainte să se schimbe vremea. Prinderea din timp a problemelor mici — o picurare, un curent, o balama slăbită — le împiedică să devină reparații scumpe."]}, {"icon": "🔧", "t": ["Catch small repairs early", "Réparez tôt les petits soucis", "Ripara subito i piccoli guasti", "Kleine Reparaturen früh angehen", "Repară din timp micile defecte"], "b": ["A dripping tap, a loose hinge or a tiny leak rarely fixes itself — and almost always grows. Keep a short running list of small problems and tackle one each weekend. Dealing with them while they're minor protects your home and avoids the far larger cost of a repair left too long.", "Un robinet qui goutte, une charnière desserrée ou une petite fuite ne se réparent jamais seuls — et empirent presque toujours. Tenez une courte liste des petits problèmes et réglez-en un chaque week-end. Les traiter tant qu'ils sont mineurs protège votre logement et évite le coût bien plus élevé d'une réparation trop longtemps repoussée.", "Un rubinetto che gocciola, un cardine allentato o una piccola perdita non si risolvono da soli — e quasi sempre peggiorano. Tieni un breve elenco dei piccoli problemi e affrontane uno ogni fine settimana. Risolverli finché sono lievi protegge la casa ed evita il costo ben più alto di una riparazione rimandata troppo a lungo.", "Ein tropfender Hahn, ein lockeres Scharnier oder ein winziges Leck behebt sich selten von selbst — und wird fast immer größer. Führe eine kurze Liste kleiner Probleme und nimm dir an jedem Wochenende eines vor. Sie zu beheben, solange sie klein sind, schützt dein Zuhause und erspart die weit höheren Kosten einer zu lange aufgeschobenen Reparatur.", "Un robinet care picură, o balama slăbită sau o scurgere mică rareori se repară singure — și aproape mereu se agravează. Ține o listă scurtă cu micile probleme și rezolvă una în fiecare weekend. Rezolvarea lor cât sunt minore îți protejează casa și evită costul mult mai mare al unei reparații amânate prea mult."]}]}, {"icon": "🔨", "bg": "#F3E3D6", "bd": "#E2C9B6", "rad": "18px", "name": ["DIY Projects", "Bricolage", "Fai-da-te", "Heimwerken", "Proiecte DIY"], "blurb": ["Small, satisfying projects you can finish in a weekend.", "De petits projets satisfaisants à finir en un week-end.", "Piccoli progetti soddisfacenti da finire in un weekend.", "Kleine, befriedigende Projekte für ein Wochenende.", "Proiecte mici și satisfăcătoare, gata într-un weekend."], "topics": [{"icon": "🎨", "t": ["Painting like a pro", "Peindre comme un pro", "Dipingere come un pro", "Streichen wie ein Profi", "Vopsește ca un profesionist"], "b": ["The result lives or dies on prep: clean and lightly sand the surface, fill holes, and tape edges before you open the tin. Two thin coats always look better than one thick one, and they dry far more evenly.", "Le résultat se joue à la préparation : nettoyez et poncez légèrement, rebouchez les trous et protégez les bords au ruban avant d'ouvrir le pot. Deux couches fines rendent toujours mieux qu'une épaisse, et sèchent bien plus uniformément.", "Il risultato dipende dalla preparazione: pulisci e carteggia leggermente, stucca i fori e nastra i bordi prima di aprire il barattolo. Due mani sottili rendono sempre meglio di una spessa e asciugano molto più uniformemente.", "Das Ergebnis steht und fällt mit der Vorbereitung: reinigen, leicht anschleifen, Löcher füllen und Kanten abkleben, bevor du die Dose öffnest. Zwei dünne Schichten sehen immer besser aus als eine dicke und trocknen viel gleichmäßiger.", "Rezultatul depinde de pregătire: curăță și șlefuiește ușor, astupă găurile și pune bandă pe margini înainte să deschizi cutia. Două straturi subțiri arată mereu mai bine decât unul gros și se usucă mult mai uniform."], "steps": [["Clean, sand lightly and wipe off all dust.", "Nettoyez, poncez légèrement et essuyez la poussière.", "Pulisci, carteggia leggermente e togli la polvere.", "Reinigen, leicht schleifen und Staub abwischen.", "Curăță, șlefuiește ușor și șterge praful."], ["Fill holes and tape edges and trim.", "Rebouchez les trous, protégez bords et plinthes au ruban.", "Stucca i fori e nastra bordi e cornici.", "Löcher füllen, Kanten und Leisten abkleben.", "Astupă găurile și pune bandă pe margini și tocuri."], ["Prime bare or patched spots first.", "Appliquez une sous-couche sur les zones nues ou réparées.", "Dai il primer su zone nude o stuccate.", "Grundiere nackte oder gespachtelte Stellen zuerst.", "Aplică grund pe zonele goale sau reparate."], ["Roll two thin coats, letting each dry fully.", "Passez deux couches fines au rouleau, en laissant sécher.", "Stendi due mani sottili a rullo, lasciando asciugare.", "Rolle zwei dünne Schichten und lass jede trocknen.", "Aplică două straturi subțiri cu trafaletul, lăsându-le să se usuce."]]}, {"icon": "🪑", "t": ["Upcycle old furniture", "Relooker les vieux meubles", "Recupera i vecchi mobili", "Alte Möbel aufwerten", "Recondiționează mobila veche"], "b": ["A solid old piece often just needs new paint, fresh handles or a sand-and-oil to outshine flat-pack. Test any finish on a hidden corner first, and let solid wood dry fully between coats.", "Un meuble ancien et solide n'a souvent besoin que d'une nouvelle peinture, de poignées neuves ou d'un ponçage-huilage pour surpasser le mobilier en kit. Testez toute finition dans un coin caché et laissez le bois massif bien sécher entre les couches.", "Un mobile vecchio e robusto spesso ha solo bisogno di nuova vernice, maniglie nuove o una carteggiata-e-olio per battere i mobili in kit. Prova ogni finitura in un angolo nascosto e lascia asciugare bene il legno massello tra le mani.", "Ein solides altes Stück braucht oft nur neue Farbe, frische Griffe oder Schleifen-und-Ölen, um Fertigmöbel zu übertreffen. Teste jede Oberfläche zuerst an einer versteckten Ecke und lass Massivholz zwischen den Schichten gut trocknen.", "O piesă veche și solidă are adesea nevoie doar de vopsea nouă, mânere proaspete sau o șlefuire-și-ulei ca să întreacă mobila la pachet. Testează orice finisaj într-un colț ascuns și lasă lemnul masiv să se usuce bine între straturi."]}, {"icon": "🛠️", "t": ["Beginner home repairs", "Petites réparations pour débutants", "Riparazioni casalinghe base", "Reparaturen für Anfänger", "Reparații de început"], "b": ["A handful of fixes — tightening a loose screw, re-sealing a bath, unblocking a drain, swapping a washer in a dripping tap — cover most everyday annoyances. Always shut off water or power before you start, and keep a small basic toolkit within reach.", "Quelques gestes — resserrer une vis, refaire un joint de baignoire, déboucher un siphon, changer un joint de robinet qui goutte — règlent la plupart des tracas du quotidien. Coupez toujours l'eau ou le courant avant de commencer et gardez une petite boîte à outils à portée de main.", "Pochi interventi — stringere una vite lenta, risigillare la vasca, sturare uno scarico, cambiare la guarnizione di un rubinetto che gocciola — risolvono la maggior parte dei fastidi quotidiani. Chiudi sempre acqua o corrente prima di iniziare e tieni a portata una piccola cassetta degli attrezzi.", "Eine Handvoll Handgriffe — eine lockere Schraube nachziehen, eine Wanne neu abdichten, einen Abfluss frei machen, eine Dichtung im tropfenden Hahn tauschen — deckt die meisten Alltagsärgernisse ab. Stelle immer zuerst Wasser oder Strom ab und halte einen kleinen Werkzeugkasten griffbereit.", "Câteva intervenții — strângerea unui șurub slăbit, resigilarea căzii, desfundarea unei scurgeri, schimbarea unei garnituri la un robinet care picură — rezolvă majoritatea bătăilor de cap zilnice. Oprește mereu apa sau curentul înainte să începi și ține la îndemână o trusă mică de scule."]}, {"icon": "🧰", "t": ["Build a starter toolkit", "Composez une boîte à outils de base", "Crea una cassetta degli attrezzi di base", "Stell eine Grund-Werkzeugkiste zusammen", "Pregătește o trusă de scule de bază"], "b": ["A hammer, a set of screwdrivers, a tape measure, pliers, a spirit level and a cordless drill handle the great majority of household jobs. Buy decent versions once and keep them together in a single box by the door. Having the right tool within reach turns a dreaded chore into a five-minute fix.", "Un marteau, un jeu de tournevis, un mètre ruban, une pince, un niveau à bulle et une perceuse sans fil suffisent à la grande majorité des travaux de la maison. Achetez de bons modèles une fois et gardez-les ensemble dans une seule boîte près de la porte. Avoir le bon outil à portée de main transforme une corvée redoutée en réparation de cinq minutes.", "Un martello, un set di cacciaviti, un metro, una pinza, una livella e un trapano a batteria bastano per la grande maggioranza dei lavori di casa. Compra una volta modelli decenti e tienili insieme in un'unica cassetta vicino alla porta. Avere l'attrezzo giusto a portata di mano trasforma un lavoro temuto in una riparazione di cinque minuti.", "Ein Hammer, ein Schraubendreher-Satz, ein Maßband, eine Zange, eine Wasserwaage und ein Akkuschrauber erledigen den Großteil aller Arbeiten im Haus. Kauf einmal ordentliche Versionen und bewahre sie zusammen in einer Kiste an der Tür auf. Das richtige Werkzeug griffbereit zu haben, macht aus einer gefürchteten Aufgabe eine Fünf-Minuten-Reparatur.", "Un ciocan, un set de șurubelnițe, o ruletă, un clește, o nivelă cu bulă și o mașină de găurit fără fir acoperă marea majoritate a lucrărilor din casă. Cumpără o dată variante decente și ține-le împreună într-o singură cutie lângă ușă. Scula potrivită la îndemână transformă o corvoadă temută într-o reparație de cinci minute."]}]}, {"icon": "🌿", "bg": "#E9F0DD", "bd": "#D2DFBC", "rad": "22px 6px 22px 6px", "name": ["Garden", "Jardin", "Giardino", "Garten", "Grădină"], "blurb": ["Greenery for windowsills, balconies and backyards alike.", "De la verdure pour rebords de fenêtre, balcons et jardins.", "Verde per davanzali, balconi e giardini.", "Grün für Fensterbänke, Balkone und Gärten.", "Verdeață pentru pervazuri, balcoane și curți."], "topics": [{"icon": "🪴", "t": ["Start an indoor jungle", "Créez une jungle d'intérieur", "Crea una giungla d'interni", "Starte einen Indoor-Dschungel", "Începe o junglă de interior"], "b": ["Begin with forgiving plants — pothos, snake plant, ZZ — that tolerate low light and irregular watering. The most common killer is overwatering, so let the top few centimetres of soil dry before you water again.", "Commencez par des plantes indulgentes — pothos, sansevière, ZZ — qui supportent peu de lumière et un arrosage irrégulier. Le tueur le plus courant est l'excès d'eau : laissez sécher les premiers centimètres de terre avant de réarroser.", "Parti da piante tolleranti — pothos, sansevieria, ZZ — che reggono poca luce e annaffiature irregolari. Il killer più comune è l'eccesso d'acqua: lascia asciugare i primi centimetri di terra prima di bagnare di nuovo.", "Beginne mit genügsamen Pflanzen — Efeutute, Bogenhanf, ZZ — die wenig Licht und unregelmäßiges Gießen vertragen. Der häufigste Killer ist Überwässern: lass die obersten Zentimeter Erde trocknen, bevor du erneut gießt.", "Începe cu plante iertătoare — pothos, limba-soacrei, ZZ — care tolerează lumina slabă și udarea neregulată. Cel mai frecvent ucigaș este udarea în exces: lasă primii centimetri de pământ să se usuce înainte să uzi din nou."]}, {"icon": "🌅", "t": ["Balcony & patio", "Balcon et terrasse", "Balcone e terrazzo", "Balkon & Terrasse", "Balcon și terasă"], "b": ["Group pots by how much sun a spot really gets, and choose containers with drainage holes so roots never sit in water. A few herbs, a climber and a comfortable chair turn even a tiny balcony into a green retreat.", "Regroupez les pots selon l'ensoleillement réel d'un coin et choisissez des contenants percés pour que les racines ne baignent jamais. Quelques herbes, une grimpante et une chaise confortable transforment même un petit balcon en refuge vert.", "Raggruppa i vasi in base al sole reale di ogni angolo e scegli contenitori con fori di drenaggio, così le radici non restano nell'acqua. Qualche erba, un rampicante e una sedia comoda trasformano anche un piccolo balcone in un rifugio verde.", "Gruppiere Töpfe danach, wie viel Sonne eine Stelle wirklich bekommt, und wähle Gefäße mit Abzugslöchern, damit Wurzeln nie im Wasser stehen. Ein paar Kräuter, eine Kletterpflanze und ein bequemer Stuhl machen selbst aus einem kleinen Balkon eine grüne Oase.", "Grupează ghivecele după cât soare primește cu adevărat un loc și alege recipiente cu găuri de drenaj, ca rădăcinile să nu stea în apă. Câteva ierburi, o plantă cățărătoare și un scaun confortabil transformă chiar și un balcon mic într-un refugiu verde."]}, {"icon": "♻️", "t": ["Easy composting", "Le compost facile", "Compostaggio facile", "Einfaches Kompostieren", "Compostare ușoară"], "b": ["Balance 'greens' (fruit and veg scraps, coffee grounds) with 'browns' (dry leaves, cardboard, paper) and turn the pile now and then for air. Skip meat, dairy and oils, which attract pests and slow everything down.", "Équilibrez les « verts » (épluchures, marc de café) et les « bruns » (feuilles sèches, carton, papier) et retournez le tas de temps en temps pour l'aérer. Évitez viande, laitages et huiles, qui attirent les nuisibles et ralentissent tout.", "Bilancia il «verde» (scarti di frutta e verdura, fondi di caffè) con il «marrone» (foglie secche, cartone, carta) e rivolta il cumulo ogni tanto per arieggiarlo. Evita carne, latticini e oli, che attirano parassiti e rallentano tutto.", "Halte „Grünes” (Obst- und Gemüsereste, Kaffeesatz) und „Braunes” (trockene Blätter, Karton, Papier) im Gleichgewicht und wende den Haufen ab und zu für Luft. Lass Fleisch, Milchprodukte und Öle weg — sie locken Schädlinge an und bremsen alles.", "Echilibrează „verdele” (resturi de fructe și legume, zaț de cafea) cu „maroul” (frunze uscate, carton, hârtie) și întoarce grămada din când în când pentru aer. Evită carnea, lactatele și uleiurile, care atrag dăunători și încetinesc totul."], "steps": [["Pick a bin or shady corner for the pile.", "Choisissez un bac ou un coin ombragé pour le tas.", "Scegli un bidone o un angolo ombroso per il cumulo.", "Wähle eine Tonne oder schattige Ecke für den Haufen.", "Alege un recipient sau un colț umbros pentru grămadă."], ["Layer greens and browns, roughly half and half.", "Alternez verts et bruns, à peu près moitié-moitié.", "Alterna verde e marrone, più o meno metà e metà.", "Schichte Grünes und Braunes, etwa halb und halb.", "Pune straturi de verde și maro, cam jumătate-jumătate."], ["Keep it as damp as a wrung-out sponge.", "Gardez-le humide comme une éponge essorée.", "Tienilo umido come una spugna strizzata.", "Halte ihn feucht wie ein ausgewrungener Schwamm.", "Menține-l umed ca un burete stors."], ["Turn every week or two; use it when dark and crumbly.", "Retournez toutes les 1-2 semaines ; utilisez-le quand il est sombre et friable.", "Rivolta ogni 1-2 settimane; usalo quando è scuro e friabile.", "Wende alle 1-2 Wochen; nutze ihn, wenn dunkel und krümelig.", "Întoarce la 1-2 săptămâni; folosește-l când e închis și sfărâmicios."]]}, {"icon": "🌿", "t": ["Grow herbs on a windowsill", "Cultivez des herbes sur le rebord", "Coltiva erbe sul davanzale", "Kräuter auf der Fensterbank ziehen", "Cultivă ierburi pe pervaz"], "b": ["Basil, mint, parsley and chives thrive in a sunny window with little more than water and the odd trim. Snip what you need straight into the pan for fresher flavour and almost no waste. Start with one pot you'll actually use, and let success tempt you into a second.", "Basilic, menthe, persil et ciboulette prospèrent sur un rebord ensoleillé avec à peine plus que de l'eau et une taille de temps en temps. Coupez ce dont vous avez besoin directement dans la poêle, pour plus de fraîcheur et presque aucun gaspillage. Commencez par un pot que vous utiliserez vraiment, et laissez la réussite vous tenter d'en ajouter un second.", "Basilico, menta, prezzemolo ed erba cipollina crescono bene su un davanzale soleggiato con poco più che acqua e una potatura ogni tanto. Taglia ciò che ti serve direttamente nella padella, per più freschezza e quasi nessuno spreco. Inizia con un vaso che userai davvero e lascia che il successo ti tenti con un secondo.", "Basilikum, Minze, Petersilie und Schnittlauch gedeihen an einem sonnigen Fenster mit kaum mehr als Wasser und gelegentlichem Zurückschneiden. Schneide direkt in die Pfanne, was du brauchst — für frischeren Geschmack und fast keinen Abfall. Fang mit einem Topf an, den du wirklich nutzt, und lass dich vom Erfolg zu einem zweiten verführen.", "Busuiocul, menta, pătrunjelul și arpagicul cresc bine la o fereastră însorită cu puțin mai mult decât apă și o tundere din când în când. Taie direct în tigaie ce ai nevoie, pentru aromă mai proaspătă și aproape nicio risipă. Începe cu un ghiveci pe care chiar îl vei folosi și lasă reușita să te ispitească spre al doilea."]}]}, {"icon": "🎄", "bg": "#F2E5E5", "bd": "#E2CCCC", "rad": "20px", "name": ["Seasonal Living", "Au fil des saisons", "Vita stagionale", "Saisonales Wohnen", "Viața după anotimpuri"], "blurb": ["Gentle resets that move the home through the year.", "De douces remises à zéro qui accompagnent la maison toute l'année.", "Dolci reset che accompagnano la casa durante l'anno.", "Sanfte Resets, die das Zuhause durchs Jahr tragen.", "Resetări blânde care poartă casa prin an."], "topics": [{"icon": "🌷", "t": ["The spring reset", "La remise à neuf de printemps", "Il reset di primavera", "Der Frühjahrs-Reset", "Resetul de primăvară"], "b": ["Open the windows, wash what hides dust all winter — curtains, bedding, light fittings — and rotate wardrobes as you go. Spring is the natural moment to declutter one category and let the house breathe again.", "Ouvrez les fenêtres, lavez ce qui retient la poussière tout l'hiver — rideaux, literie, luminaires — et faites tourner les penderies au passage. Le printemps est le moment idéal pour désencombrer une catégorie et laisser la maison respirer.", "Apri le finestre, lava ciò che trattiene la polvere tutto l'inverno — tende, biancheria, lampadari — e ruota gli armadi mentre procedi. La primavera è il momento naturale per riordinare una categoria e far respirare la casa.", "Öffne die Fenster, wasche, was den ganzen Winter Staub sammelt — Vorhänge, Bettzeug, Leuchten — und tausche dabei die Garderobe. Der Frühling ist der natürliche Moment, eine Kategorie auszumisten und das Haus durchatmen zu lassen.", "Deschide ferestrele, spală ce adună praf toată iarna — perdele, lenjerie, corpuri de iluminat — și schimbă garderoba pe parcurs. Primăvara e momentul firesc să debarasezi o categorie și să lași casa să respire."]}, {"icon": "❄️", "t": ["Winter-proofing", "Préparer l'hiver", "Preparare all'inverno", "Winterfest machen", "Pregătirea pentru iarnă"], "b": ["Seal draughts around doors and windows, bleed radiators so they heat evenly, and reverse ceiling fans to push warm air down. Thick curtains and door snakes keep heat in and bills down through the cold months.", "Calfeutrez les courants d'air autour des portes et fenêtres, purgez les radiateurs pour un chauffage uniforme, et inversez les ventilateurs de plafond pour rabattre l'air chaud. Rideaux épais et boudins de porte gardent la chaleur et allègent les factures pendant le froid.", "Sigilla gli spifferi attorno a porte e finestre, sfiata i termosifoni perché scaldino in modo uniforme e inverti i ventilatori a soffitto per spingere giù l'aria calda. Tende spesse e paraspifferi trattengono il calore e abbassano le bollette nei mesi freddi.", "Dichte Zugluft an Türen und Fenstern ab, entlüfte Heizkörper für gleichmäßige Wärme und drehe Deckenventilatoren um, um warme Luft nach unten zu drücken. Dicke Vorhänge und Zugluftstopper halten die Wärme drin und die Kosten unten.", "Etanșează curenții din jurul ușilor și ferestrelor, aerisește caloriferele ca să încălzească uniform și inversează ventilatoarele de tavan ca să împingă aerul cald în jos. Perdelele groase și opritoarele de ușă păstrează căldura și reduc facturile în lunile reci."]}, {"icon": "🕯️", "t": ["Calm holiday hosting", "Recevoir sereinement", "Ospitare con calma", "Entspannt Gäste bewirten", "Găzduire calmă de sărbători"], "b": ["Prep what you can the day before, keep one drawer or shelf cleared for last-minute clutter, and set the table early so the final hour is calm. A simple make-ahead menu beats an ambitious one that keeps you in the kitchen all night.", "Préparez ce que vous pouvez la veille, gardez un tiroir ou une étagère libre pour le fouillis de dernière minute, et dressez la table tôt pour que la dernière heure soit paisible. Un menu simple préparé à l'avance vaut mieux qu'un menu ambitieux qui vous cloue en cuisine toute la soirée.", "Prepara ciò che puoi il giorno prima, tieni libero un cassetto o un ripiano per il disordine dell'ultimo minuto e apparecchia presto, così l'ultima ora è serena. Un menù semplice preparato in anticipo batte uno ambizioso che ti tiene in cucina tutta la sera.", "Bereite vor, was geht, am Vortag, halte eine Schublade oder ein Regal für Last-Minute-Kram frei und decke früh den Tisch, damit die letzte Stunde ruhig bleibt. Ein einfaches, vorab zubereitetes Menü schlägt ein ehrgeiziges, das dich den ganzen Abend in der Küche hält.", "Pregătește ce poți cu o zi înainte, ține un sertar sau un raft liber pentru dezordinea de ultim moment și pune masa devreme, ca ultima oră să fie calmă. Un meniu simplu, pregătit din timp, bate unul ambițios care te ține în bucătărie toată seara."]}, {"icon": "🍂", "t": ["A gentle autumn wind-down", "Une douce transition d'automne", "Una dolce transizione d'autunno", "Ein sanfter Herbst-Übergang", "O tranziție blândă spre toamnă"], "b": ["As the light softens, swap thin summer textiles for warmer layers, check that heating and draughts are sorted before the first cold snap, and store away what summer no longer needs. A slow, early changeover means winter arrives to a home that already feels ready and snug.", "À mesure que la lumière s'adoucit, remplacez les textiles légers de l'été par des épaisseurs plus chaudes, vérifiez le chauffage et les courants d'air avant le premier coup de froid, et rangez ce dont l'été n'a plus besoin. Un changement lent et anticipé fait que l'hiver arrive dans une maison déjà prête et douillette.", "Man mano che la luce si addolcisce, sostituisci i tessuti leggeri dell'estate con strati più caldi, controlla riscaldamento e spifferi prima della prima ondata di freddo e riponi ciò che l'estate non serve più. Un cambio lento e anticipato fa sì che l'inverno arrivi in una casa già pronta e accogliente.", "Wenn das Licht weicher wird, tausch die dünnen Sommertextilien gegen wärmere Schichten, prüfe Heizung und Zugluft vor dem ersten Kälteeinbruch und räum weg, was der Sommer nicht mehr braucht. Ein langsamer, früher Wechsel sorgt dafür, dass der Winter in ein Zuhause kommt, das sich schon bereit und behaglich anfühlt.", "Pe măsură ce lumina se domolește, schimbă textilele subțiri de vară cu straturi mai calde, verifică încălzirea și curenții de aer înainte de primul val de frig și pune deoparte ce nu-ți mai trebuie de la vară. O schimbare lentă și din timp face ca iarna să sosească într-o casă care se simte deja pregătită și primitoare."]}]}, {"icon": "👨‍👩‍👧", "bg": "#E7ECEF", "bd": "#CFD9DF", "rad": "6px 22px 6px 22px", "name": ["Household Management", "Gestion du foyer", "Gestione della casa", "Haushaltsorganisation", "Administrarea gospodăriei"], "blurb": ["The 'life admin' that keeps a busy household on track.", "L'« intendance » qui garde un foyer chargé sur les rails.", "La «vita amministrativa» che tiene in carreggiata una casa impegnata.", "Die „Lebensorganisation”, die einen vollen Haushalt im Takt hält.", "„Administrația vieții” care ține o gospodărie aglomerată pe drumul cel bun."], "topics": [{"icon": "📋", "t": ["Chore charts that stick", "Des plannings de tâches qui tiennent", "Tabelle dei lavori che funzionano", "Putzpläne, die halten", "Planuri de treburi care țin"], "b": ["Share the load visibly — a chart on the fridge or a shared app — so no one person carries the mental list alone. Match jobs to ages and rotate the dreaded ones so resentment never builds.", "Partagez la charge de façon visible — tableau sur le frigo ou appli partagée — pour qu'une seule personne ne porte pas seule la charge mentale. Adaptez les tâches aux âges et faites tourner les corvées détestées pour éviter les rancœurs.", "Condividi il carico in modo visibile — una tabella sul frigo o un'app condivisa — così nessuno porta da solo la lista mentale. Adatta i compiti alle età e ruota quelli odiati, così non cresce il risentimento.", "Teile die Last sichtbar — ein Plan am Kühlschrank oder eine gemeinsame App — damit nicht eine Person die mentale Liste allein trägt. Passe Aufgaben ans Alter an und rotiere die ungeliebten, damit kein Groll entsteht.", "Împarte sarcina vizibil — un tabel pe frigider sau o aplicație comună — ca o singură persoană să nu poarte singură lista mentală. Potrivește treburile cu vârstele și rotește-le pe cele neplăcute, ca să nu se adune resentimente."]}, {"icon": "📅", "t": ["A family command center", "Un centre de commande familial", "Un centro di comando familiare", "Eine Familien-Schaltzentrale", "Un centru de comandă al familiei"], "b": ["Put one shared calendar, a meal plan and a 'this week' note in a single spot everyone passes — by the door or fridge. When plans live in one place, fewer things slip and fewer texts are needed.", "Réunissez un calendrier partagé, le menu et un mot « cette semaine » à un seul endroit de passage — près de la porte ou du frigo. Quand tout vit au même endroit, moins de choses passent à la trappe et moins de messages sont nécessaires.", "Metti un calendario condiviso, il menù e una nota «questa settimana» in un unico punto di passaggio — vicino alla porta o al frigo. Quando tutto vive in un solo posto, sfuggono meno cose e servono meno messaggi.", "Bringe einen gemeinsamen Kalender, den Essensplan und eine „diese Woche”-Notiz an einem Ort an, an dem alle vorbeikommen — an Tür oder Kühlschrank. Liegt alles an einem Ort, rutscht weniger durch und es braucht weniger Nachrichten.", "Pune un calendar comun, planul de mese și o notă „săptămâna aceasta” într-un singur loc pe lângă care trec toți — la ușă sau la frigider. Când totul stă într-un singur loc, scapă mai puține și sunt nevoie de mai puține mesaje."]}, {"icon": "🧯", "t": ["An emergency-ready home", "Une maison parée aux imprévus", "Una casa pronta alle emergenze", "Ein notfallbereites Zuhause", "O casă pregătită pentru urgențe"], "b": ["Keep a small kit — water, torch, basic first aid, copies of key documents — where everyone can find it, and agree where to meet if you must leave. Test smoke alarms twice a year and know where your water and power shut-offs are.", "Gardez un petit kit — eau, lampe, premiers secours, copies des documents clés — accessible à tous, et convenez d'un point de rendez-vous en cas d'évacuation. Testez les détecteurs de fumée deux fois par an et sachez où couper l'eau et l'électricité.", "Tieni un piccolo kit — acqua, torcia, pronto soccorso, copie dei documenti chiave — dove tutti lo trovano, e concordate dove ritrovarvi se dovete uscire. Prova gli allarmi antifumo due volte l'anno e sappi dove chiudere acqua ed elettricità.", "Halte ein kleines Set — Wasser, Taschenlampe, Erste Hilfe, Kopien wichtiger Dokumente — für alle auffindbar bereit und vereinbart einen Treffpunkt für den Fall einer Evakuierung. Teste Rauchmelder zweimal im Jahr und wisse, wo Wasser- und Stromabsperrungen sind.", "Ține o trusă mică — apă, lanternă, prim ajutor de bază, copii ale documentelor cheie — la îndemâna tuturor și stabiliți unde vă întâlniți dacă trebuie să plecați. Testează detectoarele de fum de două ori pe an și află unde se opresc apa și curentul."]}, {"icon": "🗓️", "t": ["A weekly family check-in", "Un point hebdomadaire en famille", "Un punto settimanale in famiglia", "Ein wöchentliches Familientreffen", "O întâlnire săptămânală în familie"], "b": ["Spend fifteen minutes once a week to look at the calendar together, agree who does what, and flag anything coming up. It heads off forgotten appointments and last-minute scrambles, and gives everyone a shared picture of the week. Keep it short, friendly and at the same time each week.", "Consacrez quinze minutes une fois par semaine pour regarder le calendrier ensemble, convenir de qui fait quoi et signaler ce qui approche. Cela évite les rendez-vous oubliés et les courses de dernière minute, et donne à chacun une vue commune de la semaine. Gardez-le court, convivial et à la même heure chaque semaine.", "Dedica quindici minuti una volta a settimana per guardare insieme il calendario, decidere chi fa cosa e segnalare ciò che sta per arrivare. Evita appuntamenti dimenticati e corse dell'ultimo minuto e dà a tutti un quadro condiviso della settimana. Tienilo breve, sereno e alla stessa ora ogni settimana.", "Nimm dir einmal pro Woche fünfzehn Minuten, um gemeinsam den Kalender anzusehen, zu klären, wer was macht, und Anstehendes zu markieren. Das verhindert vergessene Termine und Last-Minute-Hektik und gibt allen ein gemeinsames Bild der Woche. Halte es kurz, freundlich und zur selben Zeit jede Woche.", "Alocă cincisprezece minute o dată pe săptămână ca să priviți împreună calendarul, să stabiliți cine ce face și să marcați ce urmează. Previne programările uitate și agitația de ultim moment și le oferă tuturor o imagine comună a săptămânii. Păstreaz-o scurtă, prietenoasă și la aceeași oră în fiecare săptămână."]}]}, {"icon": "♻️", "bg": "#E6EFE3", "bd": "#CCDFC6", "rad": "24px", "name": ["Sustainable Home", "Maison durable", "Casa sostenibile", "Nachhaltiges Zuhause", "Casă sustenabilă"], "blurb": ["Healthier, lighter-footprint habits for everyday living.", "Des habitudes plus saines et plus légères pour le quotidien.", "Abitudini più sane e a minore impatto per ogni giorno.", "Gesündere Gewohnheiten mit kleinerem Fußabdruck.", "Obiceiuri mai sănătoase și cu amprentă mai mică pentru zi cu zi."], "topics": [{"icon": "🌬️", "t": ["Indoor air quality", "La qualité de l'air intérieur", "La qualità dell'aria interna", "Raumluftqualität", "Calitatea aerului din casă"], "b": ["Air the home for a few minutes daily, even in winter, and run extractor fans while cooking and showering to clear moisture and fumes. Doormats, fewer synthetic fragrances and the odd houseplant all quietly help.", "Aérez quelques minutes par jour, même en hiver, et faites tourner les hottes et VMC en cuisinant et en vous douchant pour évacuer humidité et fumées. Paillassons, moins de parfums synthétiques et quelques plantes aident discrètement.", "Arieggia la casa qualche minuto al giorno, anche d'inverno, e usa le cappe quando cucini e fai la doccia per eliminare umidità e fumi. Zerbini, meno profumi sintetici e qualche pianta aiutano in silenzio.", "Lüfte täglich ein paar Minuten, auch im Winter, und nutze Abzugshauben beim Kochen und Duschen, um Feuchte und Dämpfe abzuführen. Fußmatten, weniger synthetische Düfte und die eine oder andere Pflanze helfen leise mit.", "Aerisește casa câteva minute zilnic, chiar și iarna, și pornește hotele când gătești și faci duș ca să elimini umezeala și aburii. Preșurile, mai puține parfumuri sintetice și câte o plantă ajută discret."]}, {"icon": "🧼", "t": ["Non-toxic swaps", "Des alternatives non toxiques", "Alternative non tossiche", "Schadstoffarme Alternativen", "Alternative netoxice"], "b": ["Trade a few harsh products for simple ones — vinegar, baking soda, castile soap, microfibre cloths — that clean well without strong fumes. Fewer aerosols and fragrances mean cleaner air and less packaging in the bin.", "Remplacez quelques produits agressifs par des solutions simples — vinaigre, bicarbonate, savon de Castille, chiffons microfibre — qui nettoient bien sans vapeurs fortes. Moins d'aérosols et de parfums, c'est un air plus pur et moins d'emballages à la poubelle.", "Sostituisci alcuni prodotti aggressivi con soluzioni semplici — aceto, bicarbonato, sapone di Castiglia, panni in microfibra — che puliscono bene senza esalazioni forti. Meno aerosol e profumi significano aria più pulita e meno imballaggi nel cestino.", "Tausche ein paar scharfe Produkte gegen einfache — Essig, Natron, Kernseife, Mikrofasertücher — die ohne starke Dämpfe gut reinigen. Weniger Sprays und Düfte bedeuten sauberere Luft und weniger Verpackung im Müll.", "Înlocuiește câteva produse agresive cu unele simple — oțet, bicarbonat, săpun de Castilia, lavete din microfibră — care curăță bine fără vapori puternici. Mai puțini aerosoli și parfumuri înseamnă aer mai curat și mai puține ambalaje la gunoi."]}, {"icon": "🔁", "t": ["Use-it-up habits", "L'art de tout utiliser", "Abitudini «finisci tutto»", "Aufbrauch-Gewohnheiten", "Obiceiuri de a folosi tot"], "b": ["Before buying more, shop your own cupboards, repair before replacing, and repurpose jars, bags and boxes you already own. Buying a little less and using things fully is the simplest, cheapest sustainability of all.", "Avant d'acheter, faites les courses dans vos placards, réparez avant de remplacer et réemployez bocaux, sacs et boîtes que vous avez déjà. Acheter un peu moins et utiliser les choses à fond, c'est la durabilité la plus simple et la moins chère.", "Prima di comprare, fai la spesa nei tuoi armadi, ripara prima di sostituire e riusa barattoli, sacchetti e scatole che hai già. Comprare un po' meno e usare tutto fino in fondo è la sostenibilità più semplice ed economica.", "Bevor du mehr kaufst, „kaufe” in den eigenen Schränken, repariere statt zu ersetzen und verwende Gläser, Beutel und Kartons wieder, die du schon hast. Etwas weniger kaufen und Dinge ganz aufbrauchen ist die einfachste und günstigste Nachhaltigkeit.", "Înainte să cumperi, caută în propriile dulapuri, repară înainte să înlocuiești și refolosește borcane, pungi și cutii pe care le ai deja. Să cumperi puțin mai puțin și să folosești lucrurile complet e cea mai simplă și ieftină sustenabilitate."]}, {"icon": "💧", "t": ["Easy water-saving habits", "Des gestes simples pour économiser l'eau", "Semplici abitudini per risparmiare acqua", "Einfache Wasserspar-Gewohnheiten", "Obiceiuri simple de economisire a apei"], "b": ["Turn off the tap while brushing or scrubbing, run the dishwasher and washing machine only when full, and fix a dripping tap quickly — a slow drip can waste thousands of litres a year. Keeping a jug in the fridge gives cold water without running the tap. Small habits, repeated daily, add up fast.", "Fermez le robinet pendant que vous vous brossez les dents ou que vous frottez, ne lancez lave-vaisselle et lave-linge que pleins, et réparez vite un robinet qui goutte — une fuite lente peut gaspiller des milliers de litres par an. Garder une carafe au réfrigérateur donne de l'eau fraîche sans laisser couler le robinet. De petits gestes, répétés chaque jour, comptent vite.", "Chiudi il rubinetto mentre ti lavi i denti o strofini, avvia lavastoviglie e lavatrice solo a pieno carico e ripara in fretta un rubinetto che gocciola — una perdita lenta può sprecare migliaia di litri all'anno. Tenere una caraffa in frigo dà acqua fresca senza far scorrere il rubinetto. Piccole abitudini, ripetute ogni giorno, contano in fretta.", "Dreh den Hahn beim Zähneputzen oder Schrubben zu, lass Spül- und Waschmaschine nur voll laufen und repariere einen tropfenden Hahn schnell — ein langsames Tropfen kann im Jahr Tausende Liter verschwenden. Eine Karaffe im Kühlschrank gibt kaltes Wasser, ohne den Hahn laufen zu lassen. Kleine Gewohnheiten, täglich wiederholt, summieren sich schnell.", "Închide robinetul cât te speli pe dinți sau freci, pornește mașina de spălat vase și rufe doar pline și repară repede un robinet care picură — o scurgere lentă poate irosi mii de litri pe an. O carafă în frigider îți dă apă rece fără să lași robinetul să curgă. Obiceiuri mici, repetate zilnic, se adună repede."]}]}];

  function tileHTML(sec,t,delay){
    var steps="";
    if(t.steps){var id="nst"+Math.random().toString(36).slice(2,8);
      steps='<button class="nbtn sm" onclick="nestToggle(\''+id+'\')">'+E(L(U.how))+' →</button>'+
        '<div class="nsteps" id="'+id+'"><ol>'+t.steps.map(function(s){return '<li>'+E(L(s))+'</li>';}).join('')+'</ol></div>';}
    return '<div class="ntile" style="--nbg:'+sec.bg+';--nbd:'+sec.bd+';border-radius:'+sec.rad+';animation-delay:'+delay+'s">'+
      '<button class="nheart" onclick="nestSaveToggle(this)" aria-label="Save">♡</button>'+
      '<div class="ntile-ic">'+sec.icon+'</div><h3>'+E(L(t.t))+'</h3><p>'+E(L(t.b))+'</p>'+steps+'</div>';
  }
  function inner(){
    var chips='<div class="nchips">'+NEST.map(function(s,i){return '<button class="nchip" onclick="nestJump('+i+')">'+s.icon+' '+E(L(s.name))+'</button>';}).join('')+'</div>';
    var secs=NEST.map(function(s,i){
      var tiles=s.topics.map(function(t,ti){return tileHTML(s,t,(ti*0.06).toFixed(2));}).join('');
      return '<div class="nsec" id="nsec'+i+'"><div class="nsec-h"><span class="nsec-ic">'+s.icon+'</span><h2>'+E(L(s.name))+'</h2></div><div class="nsec-blurb muted ital">'+E(L(s.blurb))+'</div><div class="ntiles">'+tiles+'</div></div>';
    }).join('');
    return '<div class="masthead"><div class="kicker">'+E(L(U.kicker))+'</div><h1 style="font-size:33px">Modern Home Digest</h1><div class="muted ital">'+E(L(U.sub))+'</div></div>'+
      chips+'<div class="ntools"><button class="nbtn" onclick="nestSurprise()">'+E(L(U.surprise))+'</button></div>'+secs+
      '<div class="nfoot muted ital center" style="margin-top:18px">'+E(L(U.foot))+'</div>';
  }
  window.renderNest=function(){
    var head='<div class="back" onclick="setTab(0)">'+E(L(U.back))+'</div>';
    var body=inner();
    if(typeof S!=="undefined"&&S&&S.unlocked) return '<div class="panel nest">'+head+body+'</div>';
    return '<div class="panel nest">'+head+'<div class="lockwrap"><div class="lockblur">'+body+'</div>'+
      '<div class="lockcard"><div class="lk">🔒</div>'+
      '<h2 class="serif" style="font-size:25px;margin:8px 0 4px">'+E(L(U.lockt))+'</h2>'+
      '<div class="muted ital" style="margin-bottom:16px;max-width:320px">'+E(L(U.lockb))+'</div>'+
      '<button class="btn" onclick="subscribe()">'+E(L(U.unlock))+'</button>'+
      '<button class="btn gift" style="margin-top:10px" onclick="ding();toast(\'Gift link ready to send 🎁\')">'+E(L(U.gift))+'</button>'+
      '</div></div></div>';
  };
  window.nestToggle=function(id){var e=document.getElementById(id);if(e)e.classList.toggle('open');};
  window.nestSaveToggle=function(el){var on=el.classList.toggle('on');el.textContent=on?'♥':'♡';};
  window.nestJump=function(i){var e=document.getElementById('nsec'+i);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});};
  window.nestSurprise=function(){var t=document.querySelectorAll('.nest .ntile');if(!t.length)return;var p=t[Math.floor(Math.random()*t.length)];p.scrollIntoView({behavior:'smooth',block:'center'});p.style.animation='none';void p.offsetWidth;p.style.animation='nestPop .6s';try{if(window.ding)ding('pop');}catch(e){}};
})();
