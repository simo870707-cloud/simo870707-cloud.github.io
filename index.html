<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f1e7d2">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png?v=4">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=4">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=4">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=4">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=4">
<meta property="og:title" content="The Living EDIT — Home & Mind">
<meta property="og:description" content="A daily edit for home & mind — facts, ideas and inspiration.">
<meta property="og:image" content="https://kaleidoscopic-pixie-b139ed.netlify.app/icon-512.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Living EDIT">
<title>The Living EDIT — Home &amp; Mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=EB+Garamond:ital@0;1&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
<div id="grain"></div>
<div class="app"><div id="view"></div></div>

<nav class="nav">
  <button id="hamb" class="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="navtitle" style="font-size:21px;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;letter-spacing:.3px">The Living EDIT</div>
  <span style="width:40px"></span>
</nav>
<div id="menuScrim" class="menu-scrim" onclick="closeMenu()"></div>
<aside id="menu" class="menu">
  <div class="menu-h">The Living EDIT</div>
  <div class="menu-loc"><span class="menu-loc-k">You're on</span><span id="menuLoc">Today</span></div>
  <div style="height:1px;background:var(--line);opacity:.4;margin:10px 14px"></div>
  <button class="menu-item" onclick="openSettings()">Settings</button>
  <button class="menu-item" onclick="openBilling()">Billing</button>
  <button class="menu-item" onclick="openTerms()">Terms &amp; Conditions</button>
</aside>
<div id="toast"></div>
<div id="a11ySheet" class="sheet" onclick="if(event.target===this)closeA11y()"><div class="sheet-card"><div id="a11yBody"></div></div></div>
<div id="colSheet" class="sheet" onclick="if(event.target===this)closeCollection()"><div class="sheet-card"><div id="colBody"></div></div></div>
<div id="appSheet" class="sheet" onclick="if(event.target===this)closeAppSheet()"><div class="sheet-card"><div id="appSheetBody"></div></div></div>
<input id="importFileGlobal" type="file" accept="application/json,.json" style="display:none" onchange="importData(this)">
<div id="rempop"><div class="pp"><div style="font-size:34px">⏰</div><h2 class="serif" id="rpTitle" style="margin:6px 0">Reminder</h2><div class="muted" id="rpText" style="margin-bottom:14px"></div><button class="btn" onclick="closePop()">Got it</button></div></div>

<div id="breathFx" class="breath-fx" aria-hidden="true"></div>
<nav id="botnav" class="botnav" aria-label="Main navigation">
  <button class="botnav-item" data-t="0" onclick="goTab(0)">Today</button>
  <button class="botnav-item" data-t="3" onclick="goTab(3)">Home</button>
  <button class="botnav-item" data-t="1" onclick="goTab(1)">Mind</button>
  <button class="botnav-item" data-t="5" onclick="goTab(5)">Saved</button>
</nav>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js?v=21"></script>
<script src="cloud.js?v=14"></script>
</body>
</html>
