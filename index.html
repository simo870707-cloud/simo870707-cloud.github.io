ngo hatches grey; its pink comes entirely from the food it eats.": {"fr": "Un flamant naît gris ; son rose vient entièrement de ce qu'il mange.", "it": "Un fenicottero nasce grigio; il suo rosa viene interamente da ciò che mangia.", "de": "Ein Flamingo schlüpft grau; sein Rosa stammt vollständig von dem, was er frisst.", "ro": "Un flamingo eclozează gri; roz-ul lui vine în întregime din hrana pe care o mănâncă."}, "You are what you eat.": {"fr": "Tu es ce que tu manges.", "it": "Sei ciò che mangi.", "de": "Du bist, was du isst.", "ro": "Ești ceea ce mănânci."}, "Tardigrades can survive boiling, freezing and even the vacuum of space.": {"fr": "Les tardigrades peuvent survivre à l'ébullition, au gel et même au vide de l'espace.", "it": "I tardigradi possono sopravvivere a bollitura, congelamento e persino al vuoto dello spazio.", "de": "Bärtierchen können Kochen, Gefrieren und sogar das Vakuum des Alls überleben.", "ro": "Tardigradele pot supraviețui fierberii, înghețului și chiar vidului spațiului."}, "The toughest animal alive.": {"fr": "L'animal le plus résistant qui soit.", "it": "L'animale più resistente in vita.", "de": "Das zäheste Tier, das es gibt.", "ro": "Cel mai rezistent animal în viață."}, "Spain's La Tomatina sees tens of thousands of people hurl over 100 tonnes of tomatoes in one afternoon.": {"fr": "Lors de la Tomatina, en Espagne, des dizaines de milliers de personnes se lancent plus de 100 tonnes de tomates en un après-midi.", "it": "Alla Tomatina, in Spagna, decine di migliaia di persone si lanciano oltre 100 tonnellate di pomodori in un pomeriggio.", "de": "Bei Spaniens La Tomatina bewerfen sich Zehntausende an einem Nachmittag mit über 100 Tonnen Tomaten.", "ro": "La La Tomatina, în Spania, zeci de mii de oameni aruncă peste 100 de tone de roșii într-o singură după-amiază."}, "A town painted red.": {"fr": "Une ville peinte en rouge.", "it": "Una città dipinta di rosso.", "de": "Eine rot gefärbte Stadt.", "ro": "Un oraș vopsit în roșu."}, "Thailand's Yi Peng festival releases thousands of glowing paper lanterns into the night sky at once.": {"fr": "Le festival Yi Peng, en Thaïlande, libère d'un coup des milliers de lanternes de papier lumineuses dans le ciel nocturne.", "it": "Il festival Yi Peng, in Thailandia, libera migliaia di lanterne di carta luminose nel cielo notturno tutte insieme.", "de": "Thailands Yi-Peng-Fest lässt Tausende leuchtende Papierlaternen auf einmal in den Nachthimmel steigen.", "ro": "Festivalul Yi Peng din Thailanda eliberează mii de lampioane de hârtie strălucitoare pe cerul nopții deodată."}, "A river of light overhead.": {"fr": "Une rivière de lumière au-dessus de soi.", "it": "Un fiume di luce sopra la testa.", "de": "Ein Fluss aus Licht über einem.", "ro": "Un râu de lumină pe cer."}, "Farming began around 12,000 years ago and let people settle down and build the first towns.": {"fr": "L'agriculture a commencé il y a environ 12 000 ans et a permis aux gens de se sédentariser et de bâtir les premières villes.", "it": "L'agricoltura iniziò circa 12.000 anni fa e permise alle persone di stabilirsi e costruire le prime città.", "de": "Der Ackerbau begann vor etwa 12.000 Jahren und ließ Menschen sesshaft werden und die ersten Städte bauen.", "ro": "Agricultura a început acum circa 12.000 de ani și a permis oamenilor să se așeze și să construiască primele orașe."}, "The quiet revolution.": {"fr": "La révolution silencieuse.", "it": "La rivoluzione silenziosa.", "de": "Die stille Revolution.", "ro": "Revoluția tăcută."}, "Bees pollinate about a third of the food we eat — a single colony can visit millions of flowers.": {"fr": "Les abeilles pollinisent environ un tiers de ce que nous mangeons — une seule colonie peut visiter des millions de fleurs.", "it": "Le api impollinano circa un terzo del cibo che mangiamo — una sola colonia può visitare milioni di fiori.", "de": "Bienen bestäuben etwa ein Drittel unserer Nahrung — ein einziges Volk kann Millionen Blüten besuchen.", "ro": "Albinele polenizează aproximativ o treime din hrana noastră — o singură colonie poate vizita milioane de flori."}, "Tiny workers, vast harvests.": {"fr": "De minuscules ouvrières, d'immenses récoltes.", "it": "Minuscole operaie, raccolti immensi.", "de": "Winzige Arbeiterinnen, riesige Ernten.", "ro": "Lucrătoare minuscule, recolte uriașe."}, "The world's shortest scheduled flight, in Scotland's Orkney Islands, can last under 90 seconds.": {"fr": "Le plus court vol régulier au monde, dans les îles Orcades en Écosse, peut durer moins de 90 secondes.", "it": "Il volo di linea più breve al mondo, nelle Orcadi scozzesi, può durare meno di 90 secondi.", "de": "Der kürzeste Linienflug der Welt, auf den schottischen Orkneyinseln, kann unter 90 Sekunden dauern.", "ro": "Cel mai scurt zbor regulat din lume, în Insulele Orkney din Scoția, poate dura sub 90 de secunde."}, "Airborne and landed in a minute.": {"fr": "Décollé et atterri en une minute.", "it": "Decollato e atterrato in un minuto.", "de": "In einer Minute gestartet und gelandet.", "ro": "Decolat și aterizat într-un minut."}, "The Trans-Siberian Railway crosses eight time zones on a single journey of over 9,000 km.": {"fr": "Le Transsibérien traverse huit fuseaux horaires en un seul trajet de plus de 9 000 km.", "it": "La Transiberiana attraversa otto fusi orari in un solo viaggio di oltre 9.000 km.", "de": "Die Transsibirische Eisenbahn durchquert acht Zeitzonen auf einer einzigen Reise von über 9.000 km.", "ro": "Calea ferată transsiberiană traversează opt fuse orare într-o singură călătorie de peste 9.000 km."}, "A week-long train ride.": {"fr": "Un voyage en train d'une semaine.", "it": "Un viaggio in treno lungo una settimana.", "de": "Eine einwöchige Zugfahrt.", "ro": "O călătorie cu trenul de o săptămână."}, "Everest is the highest point on Earth, but Mauna Kea is taller base-to-peak — most of it underwater.": {"fr": "L'Everest est le point le plus haut de la Terre, mais le Mauna Kea est plus haut de la base au sommet — en grande partie sous l'eau.", "it": "L'Everest è il punto più alto della Terra, ma il Mauna Kea è più alto dalla base alla cima — per lo più sott'acqua.", "de": "Der Everest ist der höchste Punkt der Erde, doch der Mauna Kea ist von Fuß bis Gipfel höher — größtenteils unter Wasser.", "ro": "Everest este cel mai înalt punct de pe Pământ, dar Mauna Kea e mai înalt de la bază la vârf — în mare parte sub apă."}, "Tallest depends how you measure.": {"fr": "« Le plus haut » dépend de la mesure.", "it": "«Il più alto» dipende da come si misura.", "de": "„Am höchsten” hängt von der Messung ab.", "ro": "„Cel mai înalt” depinde cum măsori."}, "The Mariana Trench is so deep that Everest could sink in and still leave 2 km of water above it.": {"fr": "La fosse des Mariannes est si profonde que l'Everest pourrait y disparaître en laissant encore 2 km d'eau au-dessus.", "it": "La Fossa delle Marianne è così profonda che l'Everest potrebbe sprofondarvi lasciando ancora 2 km d'acqua sopra.", "de": "Der Marianengraben ist so tief, dass der Everest darin versinken könnte und immer noch 2 km Wasser darüber wären.", "ro": "Groapa Marianelor este atât de adâncă încât Everestul ar putea dispărea în ea lăsând încă 2 km de apă deasupra."}, "The deepest place on Earth.": {"fr": "L'endroit le plus profond de la Terre.", "it": "Il luogo più profondo della Terra.", "de": "Der tiefste Ort der Erde.", "ro": "Cel mai adânc loc de pe Pământ."}, "\"A society grows great when old men plant trees whose shade they will never sit in.\" — Greek proverb": {"fr": "« Une société devient grande quand des vieillards plantent des arbres dont ils ne verront jamais l'ombre. » — proverbe grec", "it": "«Una società diventa grande quando i vecchi piantano alberi alla cui ombra non sederanno mai.» — proverbio greco", "de": "„Eine Gesellschaft wird groß, wenn alte Menschen Bäume pflanzen, in deren Schatten sie nie sitzen werden.” — griechisches Sprichwort", "ro": "„O societate devine măreață când bătrânii plantează copaci la umbra cărora nu vor sta niciodată.” — proverb grecesc"}, "On patience and legacy.": {"fr": "Sur la patience et l'héritage.", "it": "Sulla pazienza e l'eredità.", "de": "Über Geduld und Vermächtnis.", "ro": "Despre răbdare și moștenire."}, "\"Fall seven times, stand up eight.\" — Japanese proverb": {"fr": "« Tombe sept fois, relève-toi huit. » — proverbe japonais", "it": "«Cadi sette volte, rialzati otto.» — proverbio giapponese", "de": "„Fällst du siebenmal, steh achtmal auf.” — japanisches Sprichwort", "ro": "„Cazi de șapte ori, ridică-te de opt.” — proverb japonez"}, "On quiet resilience.": {"fr": "Sur la résilience tranquille.", "it": "Sulla resilienza silenziosa.", "de": "Über stille Widerstandskraft.", "ro": "Despre reziliența tăcută."}, "The ampersand '&' began as a handwritten blend of the Latin word 'et', meaning 'and'.": {"fr": "L'esperluette « & » est née d'une ligature manuscrite du mot latin « et », qui signifie « et ».", "it": "La e commerciale «&» nacque come legatura manoscritta della parola latina «et», che significa «e».", "de": "Das Et-Zeichen „&” entstand als handschriftliche Verschmelzung des lateinischen Wortes „et”, das „und” bedeutet.", "ro": "Ampersandul „&” a apărut ca o ligatură scrisă de mână a cuvântului latin „et”, care înseamnă „și”."}, "A whole word folded into one mark.": {"fr": "Un mot entier plié en un seul signe.", "it": "Una parola intera ripiegata in un segno.", "de": "Ein ganzes Wort, in ein Zeichen gefaltet.", "ro": "Un cuvânt întreg pliat într-un singur semn."}, "The '@' sign once meant 'at the rate of' in merchants' ledgers, centuries before it reached email.": {"fr": "Le signe « @ » signifiait jadis « au taux de » dans les registres des marchands, des siècles avant d'arriver dans les courriels.", "it": "Il segno «@» significava un tempo «al prezzo di» nei registri dei mercanti, secoli prima di arrivare nelle email.", "de": "Das Zeichen „@” bedeutete einst „zum Preis von” in Kaufmannsbüchern, Jahrhunderte bevor es zur E-Mail kam.", "ro": "Semnul „@” însemna cândva „la prețul de” în registrele negustorilor, cu secole înainte să ajungă la e-mail."}, "From invoices to inboxes.": {"fr": "Des factures aux boîtes de réception.", "it": "Dalle fatture alle caselle di posta.", "de": "Von Rechnungen zu Posteingängen.", "ro": "De la facturi la căsuțele de e-mail."}, "The peace symbol layers the semaphore flag signals for 'N' and 'D' — for 'nuclear disarmament'.": {"fr": "Le symbole de la paix superpose les signaux sémaphores des lettres « N » et « D » — pour « désarmement nucléaire ».", "it": "Il simbolo della pace sovrappone i segnali semaforici delle lettere «N» e «D» — per «disarmo nucleare».", "de": "Das Friedenszeichen überlagert die Winkeralphabet-Signale für „N” und „D” — für „nukleare Abrüstung”.", "ro": "Simbolul păcii suprapune semnalele de semafor pentru literele „N” și „D” — de la „dezarmare nucleară”."}, "A protest hidden in a circle.": {"fr": "Une protestation cachée dans un cercle.", "it": "Una protesta nascosta in un cerchio.", "de": "Ein Protest, verborgen in einem Kreis.", "ro": "Un protest ascuns într-un cerc."}, "The heart shape may trace back to silphium, an ancient plant whose seed pod looked just like it.": {"fr": "La forme du cœur remonterait au silphium, une plante antique dont la gousse lui ressemblait exactement.", "it": "La forma del cuore potrebbe risalire al silfio, un'antica pianta il cui baccello le somigliava in tutto.", "de": "Die Herzform geht möglicherweise auf Silphium zurück, eine antike Pflanze, deren Samenkapsel genau so aussah.", "ro": "Forma inimii ar putea proveni de la silphium, o plantă antică a cărei păstaie arăta exact așa."}, "Love, drawn from a herb.": {"fr": "L'amour, dessiné à partir d'une herbe.", "it": "L'amore, disegnato da un'erba.", "de": "Liebe, von einem Kraut abgezeichnet.", "ro": "Dragostea, desenată dintr-o plantă."}, "'Break the ice' comes from ships that once smashed through frozen harbours so trade and travel could begin.": {"fr": "« Briser la glace » vient des navires qui fracassaient jadis les ports gelés pour permettre au commerce et aux voyages de commencer.", "it": "«Rompere il ghiaccio» viene dalle navi che un tempo sfondavano i porti ghiacciati perché commercio e viaggi potessero iniziare.", "de": "„Das Eis brechen” stammt von Schiffen, die einst zugefrorene Häfen aufbrachen, damit Handel und Reisen beginnen konnten.", "ro": "„A sparge gheața” vine de la corăbiile care odinioară spărgeau porturile înghețate ca să poată începe comerțul și călătoriile."}, "Why first meetings 'thaw'.": {"fr": "Pourquoi les premières rencontres « dégèlent ».", "it": "Perché i primi incontri «si sciolgono».", "de": "Warum erste Begegnungen „auftauen”.", "ro": "De ce primele întâlniri „se dezgheață”."}, "'Caught red-handed' began in old Scottish law — a poacher or killer found with blood still on their hands.": {"fr": "« Pris la main rouge » (caught red-handed) vient du vieux droit écossais — un braconnier ou un meurtrier trouvé avec du sang encore sur les mains.", "it": "«Colto con le mani rosse» (caught red-handed) nasce dall'antico diritto scozzese — un bracconiere o un assassino trovato con il sangue ancora sulle mani.", "de": "„Auf frischer Tat ertappt” (caught red-handed) stammt aus altem schottischem Recht — ein Wilderer oder Mörder, der mit Blut an den Händen erwischt wurde.", "ro": "„Prins cu mâinile roșii” (caught red-handed) provine din vechiul drept scoțian — un braconier sau ucigaș găsit cu sânge încă pe mâini."}, "Guilt you can see.": {"fr": "Une culpabilité que l'on voit.", "it": "Una colpa che si vede.", "de": "Schuld, die man sehen kann.", "ro": "O vinovăție pe care o poți vedea."}, "'Mad as a hatter' recalls 1800s hat-makers who used mercury, which slowly caused tremors and confusion.": {"fr": "« Fou comme un chapelier » évoque les chapeliers du XIXᵉ siècle qui utilisaient du mercure, provoquant peu à peu tremblements et confusion.", "it": "«Matto come un cappellaio» ricorda i cappellai dell'Ottocento che usavano il mercurio, che causava lentamente tremori e confusione.", "de": "„Verrückt wie ein Hutmacher” erinnert an Hutmacher des 19. Jahrhunderts, die Quecksilber verwendeten, das allmählich Zittern und Verwirrung verursachte.", "ro": "„Nebun ca un pălărier” amintește de pălărierii din secolul al XIX-lea care foloseau mercur, ce provoca treptat tremor și confuzie."}, "A trade that addled the mind.": {"fr": "Un métier qui dérangeait l'esprit.", "it": "Un mestiere che annebbiava la mente.", "de": "Ein Handwerk, das den Verstand trübte.", "ro": "O meserie care tulbura mintea."}, "'Rule of thumb' most likely comes from using the thumb as a quick, rough unit of measurement.": {"fr": "« Règle du pouce » vient probablement de l'usage du pouce comme unité de mesure rapide et approximative.", "it": "«Regola del pollice» deriva probabilmente dall'uso del pollice come unità di misura rapida e approssimativa.", "de": "„Daumenregel” kommt höchstwahrscheinlich davon, den Daumen als schnelle, grobe Maßeinheit zu verwenden.", "ro": "„Regula degetului mare” provine cel mai probabil din folosirea degetului mare ca unitate de măsură rapidă și aproximativă."}, "Approximation by hand.": {"fr": "L'approximation à la main.", "it": "L'approssimazione a mano.", "de": "Schätzen mit der Hand.", "ro": "Aproximare cu mâna."}, "Saturn is so light for its size that, given a big enough ocean, the planet would float in water.": {"fr": "Saturne est si légère pour sa taille que, dans un océan assez grand, la planète flotterait sur l'eau.", "it": "Saturno è così leggero per le sue dimensioni che, in un oceano abbastanza grande, il pianeta galleggerebbe sull'acqua.", "de": "Saturn ist für seine Größe so leicht, dass der Planet in einem groß genug Ozean auf dem Wasser schwimmen würde.", "ro": "Saturn este atât de ușor pentru dimensiunea sa încât, într-un ocean suficient de mare, planeta ar pluti pe apă."}, "A giant less dense than water.": {"fr": "Une géante moins dense que l'eau.", "it": "Un gigante meno denso dell'acqua.", "de": "Ein Riese, weniger dicht als Wasser.", "ro": "Un gigant mai puțin dens decât apa."}, "There are thought to be more stars in the universe than grains of sand on all of Earth's beaches.": {"fr": "On pense qu'il y a plus d'étoiles dans l'univers que de grains de sable sur toutes les plages de la Terre.", "it": "Si pensa che nell'universo ci siano più stelle che granelli di sabbia su tutte le spiagge della Terra.", "de": "Man nimmt an, dass es im Universum mehr Sterne gibt als Sandkörner an allen Stränden der Erde.", "ro": "Se crede că în univers sunt mai multe stele decât fire de nisip pe toate plajele Pământului."}, "A sky beyond counting.": {"fr": "Un ciel impossible à compter.", "it": "Un cielo che non si può contare.", "de": "Ein Himmel jenseits des Zählbaren.", "ro": "Un cer ce nu poate fi numărat."}, "The Great Pyramid of Giza was the tallest human-made structure on Earth for nearly 4,000 years.": {"fr": "La grande pyramide de Gizeh fut la plus haute structure humaine sur Terre pendant près de 4 000 ans.", "it": "La Grande Piramide di Giza fu la struttura artificiale più alta della Terra per quasi 4.000 anni.", "de": "Die Große Pyramide von Gizeh war fast 4.000 Jahre lang das höchste von Menschen errichtete Bauwerk der Erde.", "ro": "Marea Piramidă din Giza a fost cea mai înaltă structură construită de om timp de aproape 4.000 de ani."}, "A record held across millennia.": {"fr": "Un record tenu sur des millénaires.", "it": "Un record durato millenni.", "de": "Ein Rekord über Jahrtausende.", "ro": "Un record menținut milenii."}, "Ancient Romans made concrete with volcanic ash that still stands strong after 2,000 years.": {"fr": "Les Romains de l'Antiquité fabriquaient un béton à la cendre volcanique qui tient encore solidement après 2 000 ans.", "it": "Gli antichi Romani facevano un cemento con cenere vulcanica che resiste ancora saldo dopo 2.000 anni.", "de": "Die alten Römer stellten Beton aus Vulkanasche her, der nach 2.000 Jahren noch fest steht.", "ro": "Romanii antici făceau un beton cu cenușă vulcanică ce rezistă solid și după 2.000 de ani."}, "Concrete that outlived an empire.": {"fr": "Un béton qui a survécu à un empire.", "it": "Un cemento sopravvissuto a un impero.", "de": "Beton, der ein Imperium überdauerte.", "ro": "Un beton care a supraviețuit unui imperiu."}, "Under the right conditions hot water can freeze faster than cold — the puzzling Mpemba effect.": {"fr": "Dans certaines conditions, l'eau chaude peut geler plus vite que la froide — le déroutant effet Mpemba.", "it": "In certe condizioni l'acqua calda può congelare più in fretta di quella fredda — lo sconcertante effetto Mpemba.", "de": "Unter den richtigen Bedingungen kann heißes Wasser schneller gefrieren als kaltes — der rätselhafte Mpemba-Effekt.", "ro": "În anumite condiții, apa fierbinte poate îngheța mai repede decât cea rece — derutantul efect Mpemba."}, "Physics that still sparks debate.": {"fr": "Une physique qui fait encore débat.", "it": "Una fisica che fa ancora discutere.", "de": "Physik, die noch immer für Debatten sorgt.", "ro": "O fizică ce încă stârnește dezbateri."}, "Glass is not a slow-flowing liquid; it is an amorphous solid. Old wavy windows were simply made unevenly.": {"fr": "Le verre n'est pas un liquide qui s'écoule lentement ; c'est un solide amorphe. Les vieilles vitres ondulées étaient simplement fabriquées de façon irrégulière.", "it": "Il vetro non è un liquido che scorre lentamente; è un solido amorfo. Le vecchie finestre ondulate erano semplicemente fatte in modo irregolare.", "de": "Glas ist keine langsam fließende Flüssigkeit; es ist ein amorpher Festkörper. Alte wellige Fenster wurden einfach ungleichmäßig gefertigt.", "ro": "Sticla nu este un lichid care curge lent; este un solid amorf. Geamurile vechi, ondulate, erau pur și simplu făcute neuniform."}, "Busting a stubborn myth.": {"fr": "On démonte un mythe tenace.", "it": "Sfatiamo un mito ostinato.", "de": "Ein hartnäckiger Mythos, entlarvt.", "ro": "Demontăm un mit încăpățânat."}, "Atoms are almost entirely empty space — if the nucleus were a marble, its electrons would orbit streets away.": {"fr": "Les atomes sont presque entièrement du vide — si le noyau était une bille, ses électrons orbiteraient à des rues de distance.", "it": "Gli atomi sono quasi interamente spazio vuoto — se il nucleo fosse una biglia, i suoi elettroni orbiterebbero a isolati di distanza.", "de": "Atome sind fast vollständig leerer Raum — wäre der Kern eine Murmel, kreisten seine Elektronen Straßen weit entfernt.", "ro": "Atomii sunt aproape în întregime spațiu gol — dacă nucleul ar fi o bilă, electronii săi ar orbita la străzi distanță."}, "Solid things, mostly nothing.": {"fr": "Des choses solides, presque rien.", "it": "Cose solide, quasi nulla.", "de": "Feste Dinge, fast nichts.", "ro": "Lucruri solide, aproape nimic."}, "There are more trees on Earth — around three trillion — than there are stars in our galaxy.": {"fr": "Il y a plus d'arbres sur Terre — environ trois mille milliards — que d'étoiles dans notre galaxie.", "it": "Sulla Terra ci sono più alberi — circa tremila miliardi — che stelle nella nostra galassia.", "de": "Es gibt auf der Erde mehr Bäume — etwa drei Billionen — als Sterne in unserer Galaxie.", "ro": "Pe Pământ sunt mai mulți copaci — aproximativ trei mii de miliarde — decât stele în galaxia noastră."}, "A forest outnumbering a galaxy.": {"fr": "Une forêt plus nombreuse qu'une galaxie.", "it": "Una foresta più numerosa di una galassia.", "de": "Ein Wald, zahlreicher als eine Galaxie.", "ro": "O pădure mai numeroasă decât o galaxie."}, "Earth's day is very slowly getting longer as the Moon drifts a few centimetres further away each year.": {"fr": "Le jour terrestre s'allonge très lentement à mesure que la Lune s'éloigne de quelques centimètres chaque année.", "it": "Il giorno terrestre si allunga molto lentamente mentre la Luna si allontana di qualche centimetro ogni anno.", "de": "Der Erdtag wird sehr langsam länger, während der Mond jedes Jahr ein paar Zentimeter weiter abdriftet.", "ro": "Ziua Pământului se lungește foarte încet pe măsură ce Luna se îndepărtează cu câțiva centimetri în fiecare an."}, "Time stretches, ever so slightly.": {"fr": "Le temps s'étire, très légèrement.", "it": "Il tempo si allunga, impercettibilmente.", "de": "Die Zeit dehnt sich, ganz leicht.", "ro": "Timpul se întinde, foarte ușor."}, "Your body is built from around 37 trillion cells, each carrying the same DNA.": {"fr": "Votre corps est constitué d'environ 37 000 milliards de cellules, portant toutes le même ADN.", "it": "Il tuo corpo è formato da circa 37.000 miliardi di cellule, ciascuna con lo stesso DNA.", "de": "Dein Körper besteht aus etwa 37 Billionen Zellen, die alle dieselbe DNA tragen.", "ro": "Corpul tău este alcătuit din aproximativ 37 de mii de miliarde de celule, fiecare purtând același ADN."}, "A trillion-fold library.": {"fr": "Une bibliothèque démultipliée par milliers de milliards.", "it": "Una biblioteca moltiplicata per migliaia di miliardi.", "de": "Eine billionenfache Bibliothek.", "ro": "O bibliotecă înmulțită de mii de miliarde de ori."}, "Stomach acid is strong enough to corrode metal; a constant layer of mucus stops it digesting you.": {"fr": "L'acide gastrique est assez puissant pour corroder le métal ; une couche constante de mucus l'empêche de vous digérer.", "it": "L'acido dello stomaco è abbastanza forte da corrodere il metallo; uno strato costante di muco gli impedisce di digerirti.", "de": "Magensäure ist stark genug, um Metall zu zersetzen; eine ständige Schleimschicht hindert sie daran, dich zu verdauen.", "ro": "Acidul gastric este suficient de puternic să corodeze metalul; un strat constant de mucus îl împiedică să te digere."}, "A controlled chemical furnace.": {"fr": "Une fournaise chimique sous contrôle.", "it": "Una fornace chimica controllata.", "de": "Ein kontrollierter chemischer Ofen.", "ro": "Un cuptor chimic controlat."}, "You're about a centimetre taller in the morning — overnight your spine's discs quietly decompress.": {"fr": "Vous êtes environ un centimètre plus grand le matin — la nuit, les disques de votre colonne se décompriment doucement.", "it": "Al mattino sei circa un centimetro più alto — di notte i dischi della colonna si decomprimono lentamente.", "de": "Morgens bist du etwa einen Zentimeter größer — über Nacht entspannen sich die Bandscheiben deiner Wirbelsäule.", "ro": "Dimineața ești cu aproximativ un centimetru mai înalt — peste noapte discurile coloanei se destind ușor."}, "Tallest first thing in the day.": {"fr": "Au plus haut dès le réveil.", "it": "Più alto appena svegliato.", "de": "Am größten gleich am Morgen.", "ro": "Cel mai înalt la prima oră."}, "The human eye can distinguish roughly ten million different colours.": {"fr": "L'œil humain peut distinguer environ dix millions de couleurs différentes.", "it": "L'occhio umano può distinguere circa dieci milioni di colori diversi.", "de": "Das menschliche Auge kann etwa zehn Millionen verschiedene Farben unterscheiden.", "ro": "Ochiul uman poate distinge aproximativ zece milioane de culori diferite."}, "A world richly painted.": {"fr": "Un monde richement coloré.", "it": "Un mondo riccamente dipinto.", "de": "Eine reich gemalte Welt.", "ro": "O lume bogat colorată."}, "The first message sent over the internet's ancestor in 1969 was meant to be 'LOGIN' — it crashed after 'LO'.": {"fr": "Le premier message envoyé sur l'ancêtre d'Internet en 1969 devait être « LOGIN » — le système a planté après « LO ».", "it": "Il primo messaggio inviato sull'antenato di Internet nel 1969 doveva essere «LOGIN» — il sistema si bloccò dopo «LO».", "de": "Die erste Nachricht über den Vorläufer des Internets 1969 sollte „LOGIN” sein — das System stürzte nach „LO” ab.", "ro": "Primul mesaj trimis pe strămoșul internetului în 1969 trebuia să fie „LOGIN” — sistemul a căzut după „LO”."}, "The network began with a stumble.": {"fr": "Le réseau a commencé par un faux pas.", "it": "La rete iniziò con un inciampo.", "de": "Das Netz begann mit einem Stolperer.", "ro": "Rețeaua a început cu un poticnit."}, "More than half of all web traffic now comes from phones rather than computers.": {"fr": "Plus de la moitié du trafic web provient désormais des téléphones plutôt que des ordinateurs.", "it": "Oggi più della metà del traffico web arriva dai telefoni anziché dai computer.", "de": "Mehr als die Hälfte des gesamten Web-Traffics kommt heute von Telefonen statt von Computern.", "ro": "Mai mult de jumătate din traficul web vine acum de pe telefoane, nu de pe computere."}, "The web went mobile.": {"fr": "Le web est devenu mobile.", "it": "Il web è diventato mobile.", "de": "Das Web wurde mobil.", "ro": "Webul a devenit mobil."}, "QR codes were invented in 1994 to track car parts on Toyota's assembly lines.": {"fr": "Les codes QR ont été inventés en 1994 pour suivre les pièces automobiles sur les chaînes de montage de Toyota.", "it": "I codici QR furono inventati nel 1994 per tracciare i pezzi delle auto sulle linee di montaggio Toyota.", "de": "QR-Codes wurden 1994 erfunden, um Autoteile an Toyotas Fließbändern zu verfolgen.", "ro": "Codurile QR au fost inventate în 1994 pentru a urmări piese auto pe liniile de asamblare Toyota."}, "From factory floor to phone screen.": {"fr": "De l'usine à l'écran du téléphone.", "it": "Dalla fabbrica allo schermo del telefono.", "de": "Von der Fabrikhalle auf den Handybildschirm.", "ro": "De la hala fabricii la ecranul telefonului."}, "The world's first webcam watched a coffee pot at Cambridge, so researchers could see if it was full.": {"fr": "La première webcam au monde surveillait une cafetière à Cambridge, pour que les chercheurs voient si elle était pleine.", "it": "La prima webcam al mondo sorvegliava una caffettiera a Cambridge, perché i ricercatori vedessero se era piena.", "de": "Die erste Webcam der Welt überwachte in Cambridge eine Kaffeekanne, damit Forscher sehen konnten, ob sie voll war.", "ro": "Prima cameră web din lume supraveghea un ibric de cafea la Cambridge, ca cercetătorii să vadă dacă era plin."}, "The internet's first live feed.": {"fr": "Le premier flux en direct d'Internet.", "it": "Il primo feed dal vivo di Internet.", "de": "Der erste Livestream des Internets.", "ro": "Primul flux live al internetului."}, "The first people to program the ENIAC computer in the 1940s were six women.": {"fr": "Les premières personnes à programmer l'ordinateur ENIAC dans les années 1940 furent six femmes.", "it": "Le prime persone a programmare il computer ENIAC negli anni '40 furono sei donne.", "de": "Die ersten Menschen, die in den 1940ern den ENIAC-Computer programmierten, waren sechs Frauen.", "ro": "Primele persoane care au programat computerul ENIAC în anii 1940 au fost șase femei."}, "Hidden pioneers of computing.": {"fr": "Des pionnières oubliées de l'informatique.", "it": "Pioniere dimenticate dell'informatica.", "de": "Verborgene Pionierinnen der Informatik.", "ro": "Pioniere uitate ale informaticii."}, "Email is older than the World Wide Web by roughly two decades.": {"fr": "Le courriel est plus ancien que le World Wide Web d'environ deux décennies.", "it": "L'email è più vecchia del World Wide Web di circa due decenni.", "de": "E-Mail ist rund zwei Jahrzehnte älter als das World Wide Web.", "ro": "E-mailul este mai vechi decât World Wide Web cu aproximativ două decenii."}, "Messages before the web.": {"fr": "Des messages avant le web.", "it": "Messaggi prima del web.", "de": "Nachrichten vor dem Web.", "ro": "Mesaje înainte de web."}, "The word 'robot' comes from a 1920 Czech play and originally meant 'forced labour'.": {"fr": "Le mot « robot » vient d'une pièce de théâtre tchèque de 1920 et signifiait à l'origine « travail forcé ».", "it": "La parola «robot» viene da un'opera teatrale ceca del 1920 e significava in origine «lavoro forzato».", "de": "Das Wort „Roboter” stammt aus einem tschechischen Theaterstück von 1920 und bedeutete ursprünglich „Zwangsarbeit”.", "ro": "Cuvântul „robot” provine dintr-o piesă cehă din 1920 și însemna inițial „muncă forțată”."}, "A word born on stage.": {"fr": "Un mot né sur scène.", "it": "Una parola nata sul palco.", "de": "Ein Wort, geboren auf der Bühne.", "ro": "Un cuvânt născut pe scenă."}, "Basketball was invented in 1891 using a peach basket nailed to a gymnasium wall.": {"fr": "Le basket-ball fut inventé en 1891 à l'aide d'un panier à pêches cloué au mur d'un gymnase.", "it": "La pallacanestro fu inventata nel 1891 usando un cesto di pesche inchiodato al muro di una palestra.", "de": "Basketball wurde 1891 mit einem an die Turnhallenwand genagelten Pfirsichkorb erfunden.", "ro": "Baschetul a fost inventat în 1891 folosind un coș de piersici bătut în cuie pe peretele unei săli de sport."}, "A game born from fruit baskets.": {"fr": "Un sport né de paniers à fruits.", "it": "Uno sport nato da cesti di frutta.", "de": "Ein Spiel, geboren aus Obstkörben.", "ro": "Un sport născut din coșuri de fructe."}, "Football has been played on every continent on Earth — Antarctica included.": {"fr": "Le football s'est joué sur tous les continents de la Terre — l'Antarctique compris.", "it": "Il calcio è stato giocato in ogni continente della Terra — Antartide inclusa.", "de": "Fußball wurde auf jedem Kontinent der Erde gespielt — die Antarktis eingeschlossen.", "ro": "Fotbalul s-a jucat pe fiecare continent al Pământului — inclusiv Antarctica."}, "The game reaches the poles.": {"fr": "Le jeu atteint les pôles.", "it": "Il gioco raggiunge i poli.", "de": "Das Spiel erreicht die Pole.", "ro": "Jocul ajunge la poli."}, "The marathon's distance of 42.195 km was fixed in 1908, partly to finish before the royal box.": {"fr": "La distance du marathon, 42,195 km, fut fixée en 1908, en partie pour finir devant la tribune royale.", "it": "La distanza della maratona, 42,195 km, fu fissata nel 1908, in parte per arrivare davanti al palco reale.", "de": "Die Marathonstrecke von 42,195 km wurde 1908 festgelegt, teils um vor der königlichen Loge zu enden.", "ro": "Distanța maratonului, 42,195 km, a fost fixată în 1908, parțial ca să se termine în fața lojei regale."}, "Royalty set the finish line.": {"fr": "La royauté a placé la ligne d'arrivée.", "it": "La corona fissò il traguardo.", "de": "Das Königshaus setzte die Ziellinie.", "ro": "Regalitatea a stabilit linia de sosire."}, "Each of Pac-Man's four ghosts follows its own distinct chase behaviour, not random movement.": {"fr": "Chacun des quatre fantômes de Pac-Man suit son propre comportement de poursuite, et non des mouvements aléatoires.", "it": "Ognuno dei quattro fantasmi di Pac-Man segue un proprio comportamento d'inseguimento, non movimenti casuali.", "de": "Jeder der vier Geister von Pac-Man folgt seinem eigenen Jagdverhalten, nicht zufälligen Bewegungen.", "ro": "Fiecare dintre cele patru fantome ale lui Pac-Man urmează propriul comportament de urmărire, nu mișcări aleatorii."}, "Four minds in the maze.": {"fr": "Quatre esprits dans le labyrinthe.", "it": "Quattro menti nel labirinto.", "de": "Vier Köpfe im Labyrinth.", "ro": "Patru minți în labirint."}, "A Game Boy recovered from a bombing during the Gulf War still switched on and played.": {"fr": "Une Game Boy retrouvée après un bombardement pendant la guerre du Golfe s'allumait encore et fonctionnait.", "it": "Un Game Boy recuperato da un bombardamento durante la Guerra del Golfo si accendeva ancora e funzionava.", "de": "Ein nach einem Bombenangriff im Golfkrieg geborgener Game Boy ließ sich noch einschalten und spielen.", "ro": "Un Game Boy recuperat dintr-un bombardament din Războiul din Golf încă pornea și funcționa."}, "Built tougher than it looked.": {"fr": "Plus solide qu'il n'en avait l'air.", "it": "Più robusto di quanto sembrasse.", "de": "Robuster, als er aussah.", "ro": "Mai rezistent decât părea."}, "Tetris was the first video game played in space, carried aboard a 1993 mission.": {"fr": "Tetris fut le premier jeu vidéo joué dans l'espace, emporté lors d'une mission de 1993.", "it": "Tetris fu il primo videogioco giocato nello spazio, portato a bordo di una missione del 1993.", "de": "Tetris war das erste Videospiel, das im All gespielt wurde, an Bord einer Mission von 1993.", "ro": "Tetris a fost primul joc video jucat în spațiu, dus la bordul unei misiuni din 1993."}, "Falling blocks in orbit.": {"fr": "Des blocs qui tombent en orbite.", "it": "Blocchi che cadono in orbita.", "de": "Fallende Blöcke im Orbit.", "ro": "Blocuri care cad pe orbită."}, "The average car spends about 95% of its life parked and not moving.": {"fr": "Une voiture moyenne passe environ 95 % de sa vie garée, à l'arrêt.", "it": "Un'auto media passa circa il 95% della sua vita parcheggiata e ferma.", "de": "Ein durchschnittliches Auto steht etwa 95 % seines Lebens geparkt und bewegt sich nicht.", "ro": "O mașină obișnuită își petrece circa 95% din viață parcată și nemișcată."}, "Mostly standing still.": {"fr": "À l'arrêt la plupart du temps.", "it": "Per lo più ferma.", "de": "Meistens im Stillstand.", "ro": "În cea mai mare parte, nemișcată."}, "Volvo invented the three-point seatbelt in 1959 and opened the patent so all could use it.": {"fr": "Volvo a inventé la ceinture de sécurité à trois points en 1959 et a ouvert le brevet pour que tous puissent l'utiliser.", "it": "Volvo inventò la cintura di sicurezza a tre punti nel 1959 e aprì il brevetto perché tutti potessero usarla.", "de": "Volvo erfand 1959 den Dreipunktgurt und gab das Patent frei, damit alle ihn nutzen konnten.", "ro": "Volvo a inventat centura de siguranță în trei puncte în 1959 și a deschis brevetul ca toți să o poată folosi."}, "A gift that saved millions.": {"fr": "Un don qui a sauvé des millions de vies.", "it": "Un dono che ha salvato milioni di vite.", "de": "Ein Geschenk, das Millionen rettete.", "ro": "Un dar care a salvat milioane de vieți."}, "Cruise control was invented by Ralph Teetor, an engineer who was blind from childhood.": {"fr": "Le régulateur de vitesse fut inventé par Ralph Teetor, un ingénieur aveugle depuis l'enfance.", "it": "Il cruise control fu inventato da Ralph Teetor, un ingegnere cieco fin dall'infanzia.", "de": "Der Tempomat wurde von Ralph Teetor erfunden, einem von Kindheit an blinden Ingenieur.", "ro": "Cruise control-ul a fost inventat de Ralph Teetor, un inginer orb din copilărie."}, "Ingenuity beyond sight.": {"fr": "L'ingéniosité au-delà de la vue.", "it": "L'ingegno oltre la vista.", "de": "Erfindergeist jenseits des Sehens.", "ro": "Ingeniozitate dincolo de vedere."}, "A pineapple plant takes roughly two years to grow a single fruit.": {"fr": "Un plant d'ananas met environ deux ans à produire un seul fruit.", "it": "Una pianta di ananas impiega circa due anni per produrre un solo frutto.", "de": "Eine Ananaspflanze braucht rund zwei Jahre für eine einzige Frucht.", "ro": "O plantă de ananas are nevoie de aproximativ doi ani ca să dea un singur fruct."}, "Patience in every slice.": {"fr": "De la patience dans chaque tranche.", "it": "Pazienza in ogni fetta.", "de": "Geduld in jeder Scheibe.", "ro": "Răbdare în fiecare felie."}, "Peanuts aren't true nuts — they're legumes, growing underground like peas.": {"fr": "Les cacahuètes ne sont pas de vraies noix — ce sont des légumineuses, qui poussent sous terre comme les pois.", "it": "Le arachidi non sono vere noci — sono legumi, che crescono sottoterra come i piselli.", "de": "Erdnüsse sind keine echten Nüsse — sie sind Hülsenfrüchte und wachsen wie Erbsen unter der Erde.", "ro": "Arahidele nu sunt nuci adevărate — sunt leguminoase, care cresc sub pământ ca mazărea."}, "A nut that isn't.": {"fr": "Une noix qui n'en est pas une.", "it": "Una noce che non lo è.", "de": "Eine Nuss, die keine ist.", "ro": "O nucă ce nu e nucă."}, "The Aztecs used cacao beans as money — a currency you could also drink.": {"fr": "Les Aztèques utilisaient les fèves de cacao comme monnaie — une devise que l'on pouvait aussi boire.", "it": "Gli Aztechi usavano i semi di cacao come denaro — una valuta che si poteva anche bere.", "de": "Die Azteken nutzten Kakaobohnen als Geld — eine Währung, die man auch trinken konnte.", "ro": "Aztecii foloseau boabele de cacao drept bani — o monedă pe care o puteai și bea."}, "Wealth you could sip.": {"fr": "Une richesse que l'on pouvait siroter.", "it": "Una ricchezza da sorseggiare.", "de": "Reichtum zum Schlürfen.", "ro": "O bogăție pe care o puteai sorbi."}, "The Code of Hammurabi, from around 1750 BCE, carved 282 laws into a tall stone pillar.": {"fr": "Le code de Hammurabi, vers 1750 av. J.-C., gravait 282 lois sur un haut pilier de pierre.", "it": "Il Codice di Hammurabi, intorno al 1750 a.C., incise 282 leggi su un'alta colonna di pietra.", "de": "Der Kodex Hammurabi, um 1750 v. Chr., meißelte 282 Gesetze in eine hohe Steinsäule.", "ro": "Codul lui Hammurabi, în jurul anului 1750 î.Hr., a săpat 282 de legi pe un stâlp înalt de piatră."}, "Justice set in stone.": {"fr": "La justice gravée dans la pierre.", "it": "Giustizia scolpita nella pietra.", "de": "Gerechtigkeit in Stein gemeißelt.", "ro": "Dreptate săpată în piatră."}, "Iceland's Althing, founded about 930 CE, is among the oldest parliaments in the world.": {"fr": "L'Althing islandais, fondé vers 930 apr. J.-C., compte parmi les plus anciens parlements du monde.", "it": "L'Althing islandese, fondato intorno al 930 d.C., è tra i parlamenti più antichi del mondo.", "de": "Das isländische Althing, um 930 n. Chr. gegründet, gehört zu den ältesten Parlamenten der Welt.", "ro": "Althing-ul islandez, fondat în jurul anului 930 d.Hr., este printre cele mai vechi parlamente din lume."}, "Democracy's long memory.": {"fr": "La longue mémoire de la démocratie.", "it": "La lunga memoria della democrazia.", "de": "Das lange Gedächtnis der Demokratie.", "ro": "Memoria îndelungată a democrației."}, "By a centuries-old English rule, the monarch may claim unmarked mute swans on open water.": {"fr": "Selon une règle anglaise vieille de plusieurs siècles, le monarque peut revendiquer les cygnes tuberculés non marqués sur les eaux libres.", "it": "Per una regola inglese secolare, il monarca può rivendicare i cigni reali non marcati sulle acque aperte.", "de": "Nach einer jahrhundertealten englischen Regel kann der Monarch nicht gekennzeichnete Höckerschwäne auf offenem Wasser beanspruchen.", "ro": "Conform unei reguli engleze vechi de secole, monarhul poate revendica lebedele de vară nemarcate de pe apele deschise."}, "Royal birds by ancient right.": {"fr": "Des oiseaux royaux par droit ancien.", "it": "Uccelli reali per antico diritto.", "de": "Königliche Vögel nach altem Recht.", "ro": "Păsări regale prin drept străvechi."}, "Africa is the only continent that lies in all four hemispheres at once.": {"fr": "L'Afrique est le seul continent à se trouver à la fois dans les quatre hémisphères.", "it": "L'Africa è l'unico continente che si trova contemporaneamente in tutti e quattro gli emisferi.", "de": "Afrika ist der einzige Kontinent, der zugleich in allen vier Hemisphären liegt.", "ro": "Africa este singurul continent care se află în toate cele patru emisfere deodată."}, "A land that spans every quarter.": {"fr": "Une terre qui s'étend sur chaque quartier du globe.", "it": "Una terra che abbraccia ogni quarto del globo.", "de": "Ein Land, das jedes Viertel umspannt.", "ro": "Un tărâm care se întinde în fiecare sfert al globului."}, "Canada is said to hold more lakes than the rest of the world combined.": {"fr": "Le Canada compterait plus de lacs que tout le reste du monde réuni.", "it": "Si dice che il Canada abbia più laghi di tutto il resto del mondo messo insieme.", "de": "Kanada soll mehr Seen haben als der Rest der Welt zusammen.", "ro": "Se spune că în Canada sunt mai multe lacuri decât în tot restul lumii la un loc."}, "A country of water.": {"fr": "Un pays d'eau.", "it": "Un paese d'acqua.", "de": "Ein Land aus Wasser.", "ro": "O țară a apei."}, "The Sahara Desert is roughly the size of the entire United States.": {"fr": "Le désert du Sahara fait à peu près la taille des États-Unis tout entiers.", "it": "Il Deserto del Sahara è grande all'incirca quanto l'intero territorio degli Stati Uniti.", "de": "Die Sahara ist ungefähr so groß wie die gesamten Vereinigten Staaten.", "ro": "Deșertul Sahara are aproximativ mărimea întregilor Statele Unite."}, "Sand as wide as a nation.": {"fr": "Du sable aussi vaste qu'une nation.", "it": "Sabbia vasta come una nazione.", "de": "Sand, so weit wie eine Nation.", "ro": "Nisip cât o națiune."}, "Albert Einstein was offered the presidency of Israel in 1952 and politely declined.": {"fr": "On proposa à Albert Einstein la présidence d'Israël en 1952, qu'il déclina poliment.", "it": "Ad Albert Einstein fu offerta la presidenza di Israele nel 1952 e la rifiutò gentilmente.", "de": "Albert Einstein wurde 1952 die Präsidentschaft Israels angeboten, die er höflich ablehnte.", "ro": "Lui Albert Einstein i s-a oferit președinția Israelului în 1952, pe care a refuzat-o politicos."}, "A scientist who said no to power.": {"fr": "Un savant qui a dit non au pouvoir.", "it": "Uno scienziato che disse no al potere.", "de": "Ein Wissenschaftler, der zur Macht Nein sagte.", "ro": "Un savant care a spus nu puterii."}, "Isaac Newton ran Britain's Royal Mint and personally hunted down counterfeiters.": {"fr": "Isaac Newton dirigea la Monnaie royale britannique et traqua personnellement les faussaires.", "it": "Isaac Newton diresse la Zecca Reale britannica e diede personalmente la caccia ai falsari.", "de": "Isaac Newton leitete die britische Royal Mint und jagte persönlich Fälscher.", "ro": "Isaac Newton a condus Monetăria Regală britanică și a vânat personal falsificatorii."}, "The physicist turned detective.": {"fr": "Le physicien devenu détective.", "it": "Il fisico diventato detective.", "de": "Der Physiker als Detektiv.", "ro": "Fizicianul devenit detectiv."}, "Marie Curie is still the only person to win Nobel Prizes in two different sciences.": {"fr": "Marie Curie reste la seule personne à avoir reçu des prix Nobel dans deux sciences différentes.", "it": "Marie Curie è tuttora l'unica persona ad aver vinto premi Nobel in due scienze diverse.", "de": "Marie Curie ist bis heute die einzige Person, die Nobelpreise in zwei verschiedenen Wissenschaften gewann.", "ro": "Marie Curie este încă singura persoană care a câștigat premii Nobel în două științe diferite."}, "Twice honoured, in physics and chemistry.": {"fr": "Doublement honorée, en physique et en chimie.", "it": "Premiata due volte, in fisica e chimica.", "de": "Zweifach geehrt, in Physik und Chemie.", "ro": "Onorată de două ori, în fizică și chimie."}, "Benjamin Franklin invented the lightning rod, bifocals and more — and patented none of them.": {"fr": "Benjamin Franklin inventa le paratonnerre, les verres à double foyer et bien plus — sans en breveter aucun.", "it": "Benjamin Franklin inventò il parafulmine, le lenti bifocali e altro ancora — senza brevettarne nessuno.", "de": "Benjamin Franklin erfand den Blitzableiter, die Bifokalbrille und mehr — und ließ nichts davon patentieren.", "ro": "Benjamin Franklin a inventat paratrăsnetul, ochelarii bifocali și altele — și nu a brevetat niciunul."}, "Invention offered as a gift.": {"fr": "L'invention offerte en cadeau.", "it": "L'invenzione offerta in dono.", "de": "Erfindung als Geschenk.", "ro": "Invenția oferită în dar."}, "The Mona Lisa has no visible eyebrows, a small mystery that still puzzles viewers.": {"fr": "La Joconde n'a pas de sourcils visibles, un petit mystère qui intrigue encore les visiteurs.", "it": "La Gioconda non ha sopracciglia visibili, un piccolo mistero che ancora incuriosisce.", "de": "Die Mona Lisa hat keine sichtbaren Augenbrauen — ein kleines Rätsel, das Betrachter bis heute beschäftigt.", "ro": "Mona Lisa nu are sprâncene vizibile, un mic mister care încă îi nedumerește pe privitori."}, "A famous face, half-finished?": {"fr": "Un visage célèbre, à demi achevé ?", "it": "Un volto famoso, lasciato a metà?", "de": "Ein berühmtes Gesicht, halb vollendet?", "ro": "Un chip celebru, lăsat pe jumătate?"}, "Shakespeare coined or popularised hundreds of everyday words, among them 'lonely' and 'eyeball'.": {"fr": "Shakespeare a forgé ou popularisé des centaines de mots du quotidien, dont « lonely » (solitaire) et « eyeball » (globe oculaire).", "it": "Shakespeare coniò o rese popolari centinaia di parole d'uso comune, tra cui «lonely» (solo) ed «eyeball» (bulbo oculare).", "de": "Shakespeare prägte oder popularisierte Hunderte Alltagswörter, darunter „lonely” (einsam) und „eyeball” (Augapfel).", "ro": "Shakespeare a inventat sau a popularizat sute de cuvinte uzuale, printre care „lonely” (singuratic) și „eyeball” (glob ocular)."}, "A poet who reshaped English.": {"fr": "Un poète qui a remodelé l'anglais.", "it": "Un poeta che ha rimodellato l'inglese.", "de": "Ein Dichter, der das Englische umformte.", "ro": "Un poet care a remodelat engleza."}, "Agatha Christie's 'The Mousetrap' has run on the London stage since 1952 — the longest ever.": {"fr": "« La Souricière » d'Agatha Christie est jouée à Londres depuis 1952 — la plus longue série de l'histoire.", "it": "«Trappola per topi» di Agatha Christie è in scena a Londra dal 1952 — la più lunga di sempre.", "de": "Agatha Christies „Die Mausefalle” läuft seit 1952 auf Londons Bühnen — die längste aller Zeiten.", "ro": "„Cursa de șoareci” de Agatha Christie se joacă la Londra din 1952 — cea mai lungă din toate timpurile."}, "A whodunit that never closes.": {"fr": "Un polar qui ne baisse jamais le rideau.", "it": "Un giallo che non chiude mai.", "de": "Ein Krimi, der nie endet.", "ro": "Un thriller care nu se închide niciodată."}, "Vincent van Gogh sold very few paintings in his lifetime; today his work fills the great museums.": {"fr": "Vincent van Gogh vendit très peu de toiles de son vivant ; aujourd'hui, son œuvre remplit les grands musées.", "it": "Vincent van Gogh vendette pochissimi quadri in vita; oggi le sue opere riempiono i grandi musei.", "de": "Vincent van Gogh verkaufte zu Lebzeiten nur sehr wenige Bilder; heute füllt sein Werk die großen Museen.", "ro": "Vincent van Gogh a vândut foarte puține tablouri în viață; azi opera lui umple marile muzee."}, "Fame that arrived too late.": {"fr": "Une gloire arrivée trop tard.", "it": "Una fama arrivata troppo tardi.", "de": "Ruhm, der zu spät kam.", "ro": "O glorie venită prea târziu."}, "It takes around 2,700 litres of water to make a single cotton T-shirt.": {"fr": "Il faut environ 2 700 litres d'eau pour fabriquer un seul T-shirt en coton.", "it": "Servono circa 2.700 litri d'acqua per fare una sola maglietta di cotone.", "de": "Für ein einziges Baumwoll-T-Shirt braucht man rund 2.700 Liter Wasser.", "ro": "Sunt necesari aproximativ 2.700 de litri de apă pentru un singur tricou din bumbac."}, "The hidden cost of cloth.": {"fr": "Le coût caché du tissu.", "it": "Il costo nascosto del tessuto.", "de": "Die versteckten Kosten von Stoff.", "ro": "Costul ascuns al pânzei."}, "About 90% of world trade by volume travels across the oceans by ship.": {"fr": "Environ 90 % du commerce mondial en volume voyage par bateau à travers les océans.", "it": "Circa il 90% del commercio mondiale in volume viaggia per nave attraverso gli oceani.", "de": "Etwa 90 % des Welthandels nach Volumen reisen per Schiff über die Ozeane.", "ro": "Aproximativ 90% din comerțul mondial ca volum călătorește cu nava pe oceane."}, "The sea moves the world.": {"fr": "La mer fait bouger le monde.", "it": "Il mare muove il mondo.", "de": "Das Meer bewegt die Welt.", "ro": "Marea pune lumea în mișcare."}, "The first product ever scanned with a barcode, in 1974, was a packet of chewing gum.": {"fr": "Le tout premier produit scanné avec un code-barres, en 1974, était un paquet de chewing-gum.", "it": "Il primo prodotto mai scansionato con un codice a barre, nel 1974, fu un pacchetto di gomme da masticare.", "de": "Das erste je mit einem Barcode gescannte Produkt war 1974 eine Packung Kaugummi.", "ro": "Primul produs scanat vreodată cu un cod de bare, în 1974, a fost un pachet de gumă de mestecat."}, "A small beep that changed shops.": {"fr": "Un petit bip qui a changé les magasins.", "it": "Un piccolo bip che cambiò i negozi.", "de": "Ein kleiner Piepton, der Läden veränderte.", "ro": "Un mic bip care a schimbat magazinele."}, "Aluminium was once so hard to refine that it was prized above gold.": {"fr": "L'aluminium fut jadis si difficile à raffiner qu'on le prisait plus que l'or.", "it": "L'alluminio era un tempo così difficile da raffinare da essere apprezzato più dell'oro.", "de": "Aluminium war einst so schwer zu raffinieren, dass es höher geschätzt wurde als Gold.", "ro": "Aluminiul era cândva atât de greu de rafinat încât era prețuit mai mult decât aurul."}, "A metal once fit for emperors.": {"fr": "Un métal jadis digne des empereurs.", "it": "Un metallo un tempo degno di imperatori.", "de": "Ein Metall, einst der Kaiser würdig.", "ro": "Un metal cândva demn de împărați."}, "Zero as a number was a late invention, formalised in India over a thousand years ago.": {"fr": "Le zéro en tant que nombre fut une invention tardive, formalisée en Inde il y a plus de mille ans.", "it": "Lo zero come numero fu un'invenzione tardiva, formalizzata in India oltre mille anni fa.", "de": "Die Null als Zahl war eine späte Erfindung, vor über tausend Jahren in Indien formalisiert.", "ro": "Zeroul ca număr a fost o invenție târzie, formalizată în India acum peste o mie de ani."}, "Nothing took ages to count.": {"fr": "Il a fallu des siècles pour compter « rien ».", "it": "Ci sono voluti secoli per contare il «nulla».", "de": "„Nichts” zu zählen dauerte ewig.", "ro": "A durat secole să numărăm „nimicul”."}, "A 'googol' is a 1 followed by 100 zeros — and it inspired the name Google.": {"fr": "Un « gogol » est un 1 suivi de 100 zéros — et il a inspiré le nom Google.", "it": "Un «googol» è un 1 seguito da 100 zeri — e ha ispirato il nome Google.", "de": "Ein „Googol” ist eine 1 mit 100 Nullen — und es inspirierte den Namen Google.", "ro": "Un „googol” este un 1 urmat de 100 de zerouri — și a inspirat numele Google."}, "A number that named a giant.": {"fr": "Un nombre qui a donné son nom à un géant.", "it": "Un numero che diede il nome a un gigante.", "de": "Eine Zahl, die einen Giganten benannte.", "ro": "Un număr care a dat nume unui gigant."}, "In a room of just 23 people, there's about a 50% chance two share a birthday.": {"fr": "Dans une pièce de seulement 23 personnes, il y a environ 50 % de chances que deux partagent un anniversaire.", "it": "In una stanza di sole 23 persone, c'è circa il 50% di probabilità che due condividano il compleanno.", "de": "In einem Raum mit nur 23 Personen liegt die Chance bei etwa 50 %, dass zwei am selben Tag Geburtstag haben.", "ro": "Într-o cameră cu doar 23 de oameni, există circa 50% șanse ca doi să aibă aceeași zi de naștere."}, "The surprising birthday paradox.": {"fr": "Le surprenant paradoxe des anniversaires.", "it": "Il sorprendente paradosso dei compleanni.", "de": "Das überraschende Geburtstagsparadoxon.", "ro": "Surprinzătorul paradox al zilelor de naștere."}, "The Fibonacci sequence shows up in sunflowers, pinecones and seashells across nature.": {"fr": "La suite de Fibonacci apparaît dans les tournesols, les pommes de pin et les coquillages, partout dans la nature.", "it": "La successione di Fibonacci compare nei girasoli, nelle pigne e nelle conchiglie in tutta la natura.", "de": "Die Fibonacci-Folge taucht in Sonnenblumen, Tannenzapfen und Muscheln überall in der Natur auf.", "ro": "Șirul lui Fibonacci apare în floarea-soarelui, conuri de pin și scoici, peste tot în natură."}, "Maths hidden in petals.": {"fr": "Des maths cachées dans les pétales.", "it": "Matematica nascosta nei petali.", "de": "Mathematik, in Blütenblättern verborgen.", "ro": "Matematică ascunsă în petale."}, "Honeybees tell each other where flowers are by dancing a figure-eight 'waggle'.": {"fr": "Les abeilles s'indiquent l'emplacement des fleurs en dansant une « danse frétillante » en huit.", "it": "Le api si indicano dove sono i fiori danzando una «danza dell'addome» a forma di otto.", "de": "Honigbienen verraten einander den Standort von Blüten mit einem „Schwänzeltanz” in Achterform.", "ro": "Albinele își spun unde sunt florile dansând un „dans agitat” în formă de opt."}, "A language made of movement.": {"fr": "Un langage fait de mouvement.", "it": "Un linguaggio fatto di movimento.", "de": "Eine Sprache aus Bewegung.", "ro": "Un limbaj făcut din mișcare."}, "The Amazon rainforest is home to roughly one in ten of all known species on Earth.": {"fr": "La forêt amazonienne abrite environ une espèce connue sur dix sur Terre.", "it": "La foresta amazzonica ospita circa una specie conosciuta su dieci sulla Terra.", "de": "Der Amazonas-Regenwald beherbergt etwa jede zehnte bekannte Art der Erde.", "ro": "Pădurea amazoniană găzduiește aproximativ una din zece specii cunoscute de pe Pământ."}, "Life at its most abundant.": {"fr": "La vie dans toute son abondance.", "it": "La vita nella sua massima abbondanza.", "de": "Leben in seiner größten Fülle.", "ro": "Viața în cea mai mare abundență."}, "Trees can share food and warnings through underground fungal networks linking their roots.": {"fr": "Les arbres peuvent partager nourriture et avertissements via des réseaux fongiques souterrains reliant leurs racines.", "it": "Gli alberi possono condividere cibo e avvertimenti tramite reti fungine sotterranee che collegano le radici.", "de": "Bäume können über unterirdische Pilznetzwerke, die ihre Wurzeln verbinden, Nahrung und Warnungen teilen.", "ro": "Copacii pot împărtăși hrană și avertismente prin rețele fungice subterane care le leagă rădăcinile."}, "A forest quietly connected.": {"fr": "Une forêt discrètement reliée.", "it": "Una foresta silenziosamente connessa.", "de": "Ein Wald, still vernetzt.", "ro": "O pădure conectată în tăcere."}, "Germany's Oktoberfest actually begins, and mostly takes place, in September.": {"fr": "L'Oktoberfest allemande commence en réalité, et se déroule en grande partie, en septembre.", "it": "L'Oktoberfest tedesca in realtà inizia, e si svolge per lo più, a settembre.", "de": "Das deutsche Oktoberfest beginnt eigentlich im September und findet größtenteils dann statt.", "ro": "Oktoberfestul german începe de fapt, și se desfășoară în mare parte, în septembrie."}, "A festival that jumps the calendar.": {"fr": "Une fête qui devance le calendrier.", "it": "Una festa che anticipa il calendario.", "de": "Ein Fest, das dem Kalender vorauseilt.", "ro": "O sărbătoare care o ia înaintea calendarului."}, "India's Holi welcomes spring with joyful clouds of brightly coloured powder.": {"fr": "Holi, en Inde, accueille le printemps dans de joyeux nuages de poudre aux couleurs vives.", "it": "L'Holi indiano accoglie la primavera con gioiose nuvole di polvere dai colori vivaci.", "de": "Indiens Holi begrüßt den Frühling mit fröhlichen Wolken aus leuchtend buntem Pulver.", "ro": "Holi din India întâmpină primăvara cu nori veseli de pulbere viu colorată."}, "A day painted in joy.": {"fr": "Une journée peinte de joie.", "it": "Un giorno dipinto di gioia.", "de": "Ein Tag, in Freude getaucht.", "ro": "O zi pictată în bucurie."}, "In Spain's Las Fallas, towering sculptures are built for days, then burned in a single night.": {"fr": "Lors des Fallas, en Espagne, d'immenses sculptures sont bâties pendant des jours, puis brûlées en une seule nuit.", "it": "Alle Fallas di Spagna, sculture imponenti vengono costruite per giorni, poi bruciate in una sola notte.", "de": "Bei Spaniens Las Fallas werden riesige Skulpturen tagelang gebaut und dann in einer einzigen Nacht verbrannt.", "ro": "La Las Fallas, în Spania, sculpturi uriașe sunt construite zile întregi, apoi arse într-o singură noapte."}, "Art made to vanish in flame.": {"fr nește mai mulți oameni din lume decât orice alt aliment."}, "The grain that sustains the most.": {"fr": "La céréale qui nourrit le plus.", "it": "Il cereale che sostiene di più.", "de": "Das Korn, das die meisten nährt.", "ro": "Cerealul care susține cei mai mulți."}, "Singapore's Changi Airport has an indoor waterfall about seven storeys tall.": {"fr": "L'aéroport de Changi, à Singapour, abrite une cascade intérieure d'environ sept étages.", "it": "L'aeroporto di Changi, a Singapore, ha una cascata al coperto alta circa sette piani.", "de": "Singapurs Flughafen Changi hat einen Indoor-Wasserfall von etwa sieben Stockwerken Höhe.", "ro": "Aeroportul Changi din Singapore are o cascadă interioară de aproximativ șapte etaje."}, "A rainstorm under one roof.": {"fr": "Une averse sous un même toit.", "it": "Un temporale sotto un solo tetto.", "de": "Ein Regenguss unter einem Dach.", "ro": "O ploaie sub un singur acoperiș."}, "One library on the Canada–US border lets you walk between two countries between the shelves.": {"fr": "Une bibliothèque à la frontière entre le Canada et les États-Unis permet de passer d'un pays à l'autre entre les rayonnages.", "it": "Una biblioteca al confine tra Canada e Stati Uniti ti fa camminare tra due paesi tra gli scaffali.", "de": "Eine Bibliothek an der Grenze zwischen Kanada und den USA lässt dich zwischen den Regalen von einem Land ins andere gehen.", "ro": "O bibliotecă de la granița dintre Canada și SUA îți permite să treci între două țări printre rafturi."}, "A reading room in two nations.": {"fr": "Une salle de lecture dans deux nations.", "it": "Una sala di lettura in due nazioni.", "de": "Ein Lesesaal in zwei Nationen.", "ro": "O sală de lectură în două națiuni."}, "Vatican City is the world's smallest country — small enough to cross on foot in minutes.": {"fr": "La Cité du Vatican est le plus petit pays du monde — assez petit pour le traverser à pied en quelques minutes.", "it": "La Città del Vaticano è il paese più piccolo del mondo — abbastanza piccolo da attraversarlo a piedi in pochi minuti.", "de": "Die Vatikanstadt ist der kleinste Staat der Welt — klein genug, um ihn in Minuten zu Fuß zu durchqueren.", "ro": "Vaticanul este cea mai mică țară din lume — destul de mică încât s-o traversezi pe jos în câteva minute."}, "A nation the size of a park.": {"fr": "Une nation de la taille d'un parc.", "it": "Una nazione grande come un parco.", "de": "Eine Nation von der Größe eines Parks.", "ro": "O națiune cât un parc."}, "The Burj Khalifa is so tall you can watch the sun set, ride up, and watch it set again.": {"fr": "Le Burj Khalifa est si haut que l'on peut voir le soleil se coucher, monter, et le voir se coucher à nouveau.", "it": "Il Burj Khalifa è così alto che puoi vedere il tramonto, salire e vederlo di nuovo.", "de": "Der Burj Khalifa ist so hoch, dass man den Sonnenuntergang sehen, hochfahren und ihn erneut sehen kann.", "ro": "Burj Khalifa este atât de înalt încât poți vedea apusul, urca și-l vedea din nou."}, "Two sunsets in one evening.": {"fr": "Deux couchers de soleil en une soirée.", "it": "Due tramonti in una sera.", "de": "Zwei Sonnenuntergänge an einem Abend.", "ro": "Două apusuri într-o seară."}, "The longest verified human life reached 122 years.": {"fr": "La plus longue vie humaine vérifiée a atteint 122 ans.", "it": "La vita umana più lunga verificata ha raggiunto i 122 anni.", "de": "Das längste verbürgte Menschenleben erreichte 122 Jahre.", "ro": "Cea mai lungă viață umană verificată a atins 122 de ani."}, "A lifetime spanning three centuries' edges.": {"fr": "Une vie à cheval sur trois siècles.", "it": "Una vita a cavallo di tre secoli.", "de": "Ein Leben am Rand dreier Jahrhunderte.", "ro": "O viață la marginea a trei secole."}, "The hottest temperature reliably recorded on Earth, 56.7°C, was measured in Death Valley.": {"fr": "La température la plus élevée mesurée de façon fiable sur Terre, 56,7 °C, l'a été dans la Vallée de la Mort.", "it": "La temperatura più alta
