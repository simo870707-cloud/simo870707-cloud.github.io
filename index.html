body.night .affirm{color:#cdd7e0}
body.night .masthead h1{color:#FBF7EC}
body.night .masthead .kicker{color:#D9C18A}
body.night .masthead .muted{color:#bcc9d8}
body.night .section-h h2{color:#F3ECDC}
body.night .section-h small.note{color:#a6b4c4}
body.night .orn{color:#C7AE7C}
body.night .nav{background:linear-gradient(180deg,#17263f,#0e1830);border-bottom:1px solid rgba(199,174,124,.25);box-shadow:0 2px 14px rgba(0,0,0,.4)}
body.night .navtitle{color:#FBF7EC}
body.night .hamburger span{background:#C7AE7C}
#grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.045;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
.app{position:relative;z-index:2;max-width:560px;margin:0 auto;min-height:100%;
  padding:calc(74px + env(safe-area-inset-top)) 4px 34px 4px}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.3px}
.muted{color:var(--ink2)} .ital{font-style:italic} .center{text-align:center}
.rule{height:1px;background:var(--rule);opacity:.4;margin:14px 0}
.orn{color:var(--gold);text-align:center;font-size:18px;letter-spacing:6px;margin:2px 0}
.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 8px}
.section-h h2{font-size:25px;margin:0} small.note{font-size:12px;color:var(--ink2)}
.label{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--green)}

.card{background:linear-gradient(180deg,#fffdf7,#f7f0df);border:1px solid var(--line);
  border-radius:14px;padding:16px;box-shadow:var(--shadow);position:relative;animation:rise .4s backwards}
.card .frame{position:absolute;inset:7px;border:1px solid var(--gold);border-radius:9px;opacity:.45;pointer-events:none}
@keyframes rise{from{opacity:0;transform:translateY(10px)}}

.btn{font-family:'EB Garamond',serif;font-size:15px;cursor:pointer;border:1px solid var(--ink);

function sunTimes(lat,lng,date){const rad=Math.PI/180,deg=180/Math.PI;
  const day=Math.floor((Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())-Date.UTC(date.getFullYear(),0,0))/864e5);
  function calc(isRise){const lngHour=lng/15,tval=day+((isRise?6:18)-lngHour)/24,M=(0.9856*tval)-3.289;
    let L=M+(1.916*Math.sin(M*rad))+(0.020*Math.sin(2*M*rad))+282.634;L=(L+360)%360;
    let RA=deg*Math.atan(0.91764*Math.tan(L*rad));RA=(RA+360)%360;RA=RA+(Math.floor(L/90)*90-Math.floor(RA/90)*90);RA/=15;
    const sinDec=0.39782*Math.sin(L*rad),cosDec=Math.cos(Math.asin(sinDec));
    const cosH=(Math.cos(90.833*rad)-(sinDec*Math.sin(lat*rad)))/(cosDec*Math.cos(lat*rad));
    if(cosH>1||cosH<-1)return null;let H=isRise?360-deg*Math.acos(cosH):deg*Math.acos(cosH);H/=15;
    let UT=(H+RA-(0.06571*tval)-6.622-lngHour)%24;if(UT<0)UT+=24;return UT;}
  const r=calc(true),s=calc(false);if(r==null||s==null)return null;
  const mk=ut=>{const dt=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));dt.setUTCHours(Math.floor(ut),Math.round((ut%1)*60),0,0);return dt;};
  return {rise:mk(r),set:mk(s)};}
function requestSun(){const el=$("#sunTimes");if(!el)return;
  if(!navigator.geolocation){el.textContent="Location isn't available on this device.";return;}
  el.textContent="Finding your sky…";
  navigator.geolocation.getCurrentPosition(p=>{const t=sunTimes(p.coords.latitude,p.coords.longitude,new Date());
    if(!t){el.textContent="The Sun barely sets here today.";return;}
    const f=x=>x.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    el.innerHTML=`🌅 Sunrise ${f(t.rise)} &nbsp;·&nbsp; 🌇 Sunset ${f(t.set)}`;
  },()=>{el.textContent="Couldn't read your location.";},{timeout:8000});}
function moonPhase(d){const lp=2551442.8,now=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate(),12)/1000,nm=Date.UTC(2000,0,6,18,14)/1000;
  let p=((now-nm)%lp)/lp;if(p<0)p+=1;const i=Math.floor(p*8+0.5)%8;
  return {name:["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"][i],emoji:["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"][i]};}
let actx;
function ding(kind){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();const t=actx.currentTime;
  const mk=(f,s,dur)=>{const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
    g.gain.setValueAtTime(.0001,t+s);g.gain.exponentialRampToValueAtTime(.2,t+s+.012);
    g.gain.exponentialRampToValueAtTime(.0001,t+s+dur);o.connect(g);g.connect(actx.destination);o.start(t+s);o.stop(t+s+dur+.02);};
  if(kind==="del"){mk(392,0,.3);}else if(kind==="pop"){mk(880,0,.18);mk(660,.12,.2);mk(990,.26,.3);}else{mk(660,0,.16);mk(990,.1,.32);}
}catch(e){}}

let ttsOn=false, ttsKeep=null;
function setReadBtn(on){const b=$('#readBtn');if(b){b.innerHTML=on?'Stop reading':'Read today to me';b.classList.toggle('on',on);}}
function readToday(){
  const synth=window.speechSynthesis;
  if(!synth||typeof SpeechSynthesisUtterance==='undefined'){toast('Voice not supported here');return;}
  if(ttsOn){ttsOn=false;synth.cancel();clearInterval(ttsKeep);setReadBtn(false);return;}
  const d=new Date(), n=doy(d);
  const aff=AFFIRMATIONS[n%AFFIRMATIONS.length], f=FACTS[n%FACTS.length];
  const place=PLACES[n%PLACES.length], animal=ANIMALS[n%ANIMALS.length], plant=PLANTS[n%PLANTS.length];
  const q=QA[n%QA.length], mystery=MYSTERIES[n%MYSTERIES.length];
  const wis=FACTS.map((x,i)=>i).filter(i=>FACTS[i].cat==="wisdom");
  const quote=FACTS[wis.length?wis[n%wis.length]:n%FACTS.length];
  const hist=HIST[(d.getMonth()+1)+"-"+d.getDate()];
  const dateLong=d.toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'});
  const segs=[];
  segs.push(`${greet()}${S.name?', '+S.name:''}. Here is your Daybook for ${dateLong}.`);
  segs.push(`Today's thought. ${aff}`);
  segs.push(`Fact of the day. ${f.a}${f.d?' '+f.d:''}`);
  if(hist&&hist.length){segs.push('On this day in history.');hist.forEach(h=>segs.push(`In ${h[0]}. ${h[1]}`));}
  segs.push(`Place of the day. ${place.nm}, ${place.country}. ${place.facts.join(' ')}`);
  segs.push(`Animal of the day. ${animal.nm}. ${animal.facts.join(' ')}`);
  segs.push(`Today's plant. ${plant.nm}. ${plant.facts.join(' ')}`);
  segs.push(`A question to ponder. ${q.q} ${q.a}`);
  segs.push(`Words of wisdom. ${quote.a}`);
  segs.push(`And a mystery. ${mystery}`);
  segs.push("That's your Daybook for today. Enjoy the wonder.");
  synth.cancel();
  ttsOn=true;setReadBtn(true);
  const voices=synth.getVoices()||[];
  const voice=voices.find(v=>/^en/i.test(v.lang)&&v.localService)||voices.find(v=>/^en/i.test(v.lang))||null;
  let i=0;
  (function next(){
    if(!ttsOn)return;
    if(i>=segs.length){ttsOn=false;clearInterval(ttsKeep);setReadBtn(false);return;}
    const u=new SpeechSynthesisUtterance(segs[i++]);
    if(voice){u.voice=voice;u.lang=voice.lang;}else u.lang='en-US';
    u.rate=.96;u.pitch=1;
    u.onend=()=>{if(ttsOn)setTimeout(next,220);};
    u.onerror=()=>{ttsOn=false;clearInterval(ttsKeep);setReadBtn(false);};
    synth.speak(u);
  })();
  clearInterval(ttsKeep);
  ttsKeep=setInterval(()=>{if(ttsOn){try{synth.resume();}catch(e){}}else clearInterval(ttsKeep);},9000);
}

function birthdayFX(){

  document.body.appendChild(ov);
  ov.addEventListener("click",()=>endFX(ov));
  const bb=ov.querySelector(".bdayfx-balloons"),cols=["#DB4437","#F4B400","#4285F4","#0F9D58","#C77B5A","#9B59B6","#E29AB0"];
  for(let i=0;i<9;i++){const b=document.createElement("div");b.className="bf-balloon";const c=cols[i%cols.length];
    b.style.left=(5+Math.random()*86)+"%";

    b.style.animationDuration=(7.5+Math.random()*4)+"s";b.style.animationDelay=(Math.random()*1.4)+"s";
    b.style.setProperty("--sway",(Math.random()*60-30)+"px");bb.appendChild(b);}
  const cv=ov.querySelector(".bdayfx-cv"),ctx=cv.getContext("2d");let W=cv.width=innerWidth,H=cv.height=innerHeight;
  const colors=["#C7AE7C","#C77B5A","#6E7B4B","#E29AB0","#F4B400","#DB4437","#4285F4","#0F9D58","#FBF7EC","#9B59B6"];
  let parts=[];
  function burst(){for(let i=0;i<180;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*9;
    parts.push({x:W*(0.15+Math.random()*0.7),y:H*0.26,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-5,g:0.13+Math.random()*0.08,w:5+Math.random()*7,h:9+Math.random()*10,rot:Math.random()*6,vr:(Math.random()-.5)*.5,c:colors[i%colors.length],life:0});}}
  burst();setTimeout(burst,700);
  let raf;
  (function frame(){ctx.clearRect(0,0,W,H);for(const p of parts){p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=Math.max(0,1-p.life/250);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}
    parts=parts.filter(p=>p.y<H+40&&p.life<260);raf=requestAnimationFrame(frame);})();
  ov._stop=()=>cancelAnimationFrame(raf);
  try{ding("pop");}catch(e){}
  ov._timer=setTimeout(()=>endFX(ov),6500);
}

    mediaRec.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
    mediaRec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(recChunks,{type:(mediaRec&&mediaRec.mimeType)||'audio/webm'});

function setTab(n){
  if(n!==2)stopMic();
  tab=n;almStack=[];
  ["mi0","mi1","mi2"].forEach((id,i)=>{const el=$("#"+id);if(el)el.classList.toggle("on",i===n);});
  var _mn=document.getElementById("miNest");if(_mn)_mn.classList.toggle("on",n===3);
  var _mh=document.getElementById("miHowTo");if(_mh)_mh.classList.toggle("on",n===4);
  const v=$("#view");
  if(n===0){calOffset=0;v.innerHTML=renderHome();drawReminders();tickClock();celebrateBdayMaybe();setReadBtn(ttsOn);}
  else if(n===1){if(S.unlocked){v.innerHTML=renderAlmanac();drawRH();}else{v.innerHTML=lockedView(renderAlmanac(),"Your Almanach");}}

  else if(n===4){v.innerHTML=renderHowTo();}

}
setTab(0);

checkReminders();

, "A curious mind! 🦉": {"fr": "Un esprit curieux ! 🦉", "it": "Una mente curiosa! 🦉", "de": "Ein neugieriger Geist! 🦉", "ro": "O minte curioasă! 🦉"}, "Nicely done. 🌿": {"fr": "Bien joué. 🌿", "it": "Ben fatto. 🌿", "de": "Gut gemacht. 🌿", "ro": "Bine făcut. 🌿"}, "A fine start. 🌱": {"fr": "Un bon début. 🌱", "it": "Un buon inizio. 🌱", "de": "Ein guter Anfang. 🌱", "ro": "Un început bun. 🌱"}, "Tomorrow's a fresh page. 📖": {"fr": "Demain est une page neuve. 📖", "it": "Domani è una pagina nuova. 📖", "de": "Morgen ist eine neue Seite. 📖", "ro": "Mâine e o pagină nouă. 📖"}, "History is denser than we think — the full daily chronicle arrives with CuriO+.": {"fr": "L'histoire est plus dense qu'on ne le croit — la chronique quotidienne complète arrive avec CuriO+.", "it": "La storia è più densa di quanto pensiamo — la cronaca quotidiana completa arriva con CuriO+.", "de": "Geschichte ist dichter, als wir denken — die vollständige Tageschronik kommt mit CuriO+.", "ro": "Istoria e mai densă decât credem — cronica zilnică completă vine cu CuriO+."}, "Today, notice one thing you usually walk past.": {"fr": "Aujourd'hui, remarquez une chose devant laquelle vous passez d'habitude.", "it": "Oggi, nota una cosa a cui di solito non badi.", "de": "Bemerke heute eine Sache, an der du sonst vorbeigehst.", "ro": "Astăzi, observă un lucru pe lângă care treci de obicei."}, "Curiosity is a gentle kind of courage.": {"fr": "La curiosité est une forme douce de courage.", "it": "La curiosità è una forma gentile di coraggio.", "de": "Neugier ist eine sanfte Art von Mut.", "ro": "Curiozitatea este o formă blândă de curaj."}, "You don't need more time — only a quieter minute.": {"fr": "Vous n'avez pas besoin de plus de temps — seulement d'une minute plus calme.", "it": "Non ti serve più tempo — solo un minuto più tranquillo.", "de": "Du brauchst nicht mehr Zeit — nur eine ruhigere Minute.", "ro": "Nu ai nevoie de mai mult timp — doar de un minut mai liniștit."}, "Learn one new thing, and the day was not wasted.": {"fr": "Apprenez une chose nouvelle, et la journée n'aura pas été perdue.", "it": "Impara una cosa nuova, e la giornata non sarà sprecata.", "de": "Lerne eine neue Sache, und der Tag war nicht vergeudet.", "ro": "Învață un lucru nou, și ziua nu a fost pierdută."}, "Wonder is free, and it never runs out.": {"fr": "L'émerveillement est gratuit, et il ne s'épuise jamais.", "it": "La meraviglia è gratis, e non finisce mai.", "de": "Staunen ist kostenlos und geht nie aus.", "ro": "Minunarea e gratuită și nu se termină niciodată."}, "Be kind to yourself today — you're doing better than you think.": {"fr": "Soyez bienveillant envers vous-même aujourd'hui — vous vous en sortez mieux que vous ne le pensez.", "it": "Sii gentile con te stesso oggi — stai andando meglio di quanto pensi.", "de": "Sei heute gut zu dir — du machst das besser, als du denkst.", "ro": "Fii bun cu tine astăzi — te descurci mai bine decât crezi."}, "Small steps, gently taken, still arrive.": {"fr": "De petits pas, faits avec douceur, finissent par arriver.", "it": "Piccoli passi, fatti con calma, arrivano comunque.", "de": "Kleine Schritte, sanft gegangen, kommen doch an.", "ro": "Pașii mici, făcuți cu blândețe, tot ajung."}, "Let yourself be amazed by something ordinary.": {"fr": "Laissez-vous émerveiller par quelque chose d'ordinaire.", "it": "Lasciati stupire da qualcosa di ordinario.", "de": "Lass dich von etwas Gewöhnlichem verblüffen.", "ro": "Lasă-te uimit de ceva obișnuit."}, "Rest is not idleness; it is where ideas are born.": {"fr": "Le repos n'est pas l'oisiveté ; c'est là que naissent les idées.", "it": "Il riposo non è ozio; è dove nascono le idee.", "de": "Ruhe ist kein Müßiggang; dort entstehen Ideen.", "ro": "Odihna nu e lene; acolo se nasc ideile."}, "Breathe. Look up. Begin again.": {"fr": "Respirez. Levez les yeux. Recommencez.", "it": "Respira. Alza lo sguardo. Ricomincia.", "de": "Atme. Schau auf. Fang neu an.", "ro": "Respiră. Privește în sus. Începe din nou."}, "A calm mind notices what a busy one misses.": {"fr": "Un esprit calme remarque ce qu'un esprit affairé manque.", "it": "Una mente calma nota ciò che una indaffarata si perde.", "de": "Ein ruhiger Geist bemerkt, was ein geschäftiger übersieht.", "ro": "O minte calmă observă ce ratează una agitată."}, "Collect wonders, not worries.": {"fr": "Collectionnez les merveilles, pas les soucis.", "it": "Colleziona meraviglie, non preoccupazioni.", "de": "Sammle Wunder, keine Sorgen.", "ro": "Adună minuni, nu griji."}, "Why are flamingos pink?": {"fr": "Pourquoi les flamants roses sont-ils roses ?", "it": "Perché i fenicotteri sono rosa?", "de": "Warum sind Flamingos rosa?", "ro": "De ce sunt flamingii roz?"}, "They hatch grey. Their pink comes from pigments called carotenoids in the algae and tiny shrimp they eat — the more they eat, the pinker they grow.": {"fr": "Ils naissent gris. Leur rose vient de pigments appelés caroténoïdes, présents dans les algues et les petites crevettes qu'ils mangent — plus ils en mangent, plus ils rosissent.", "it": "Nascono grigi. Il loro rosa viene da pigmenti chiamati carotenoidi nelle alghe e nei piccoli gamberetti che mangiano — più ne mangiano, più diventano rosa.", "de": "Sie schlüpfen grau. Ihr Rosa stammt von Pigmenten namens Carotinoiden in den Algen und kleinen Krebsen, die sie fressen — je mehr sie fressen, desto rosiger werden sie.", "ro": "Eclozează gri. Roz-ul lor vine din pigmenți numiți carotenoizi din algele și creveții mici pe care îi mănâncă — cu cât mănâncă mai mult, cu atât devin mai roz."}, "Why is the sky blue?": {"fr": "Pourquoi le ciel est-il bleu ?", "it": "Perché il cielo è blu?", "de": "Warum ist der Himmel blau?", "ro": "De ce este cerul albastru?"}, "Air scatters the shorter blue wavelengths of sunlight in every direction far more than the rest, so the whole sky glows blue.": {"fr": "L'air diffuse les courtes longueurs d'onde bleues de la lumière du soleil dans toutes les directions bien plus que les autres, alors tout le ciel brille en bleu.", "it": "L'aria diffonde le lunghezze d'onda blu, più corte, della luce solare in ogni direzione molto più delle altre, così tutto il cielo appare blu.", "de": "Die Luft streut die kürzeren blauen Wellenlängen des Sonnenlichts in alle Richtungen viel stärker als die übrigen, daher leuchtet der ganze Himmel blau.", "ro": "Aerul împrăștie lungimile de undă albastre, mai scurte, ale luminii solare în toate direcțiile mult mai mult decât restul, așa că tot cerul strălucește albastru."}, "Why do cats purr?": {"fr": "Pourquoi les chats ronronnent-ils ?", "it": "Perché i gatti fanno le fusa?", "de": "Warum schnurren Katzen?", "ro": "De ce torc pisicile?"}, "Cats twitch the muscles of their voice box very fast — when content, but also to self-soothe when hurt; the low vibration may even help tissue heal.": {"fr": "Les chats contractent très vite les muscles de leur larynx — par contentement, mais aussi pour s'apaiser quand ils ont mal ; la basse vibration pourrait même aider les tissus à guérir.", "it": "I gatti contraggono molto rapidamente i muscoli della laringe — quando sono contenti, ma anche per calmarsi quando soffrono; la bassa vibrazione potrebbe persino aiutare i tessuti a guarire.", "de": "Katzen zucken die Muskeln ihres Kehlkopfs sehr schnell — wenn sie zufrieden sind, aber auch zur Selbstberuhigung bei Schmerzen; die tiefe Vibration kann sogar Gewebe heilen helfen.", "ro": "Pisicile contractă foarte repede mușchii laringelui — când sunt mulțumite, dar și ca să se liniștească atunci când suferă; vibrația joasă ar putea chiar ajuta țesuturile să se vindece."}, "Why is the sea salty?": {"fr": "Pourquoi la mer est-elle salée ?", "it": "Perché il mare è salato?", "de": "Warum ist das Meer salzig?", "ro": "De ce este marea sărată?"}, "Rivers carry dissolved minerals from rock into the ocean. The water evaporates again, but the salt stays behind and builds up over millions of years.": {"fr": "Les rivières transportent vers l'océan des minéraux dissous issus de la roche. L'eau s'évapore à nouveau, mais le sel reste et s'accumule sur des millions d'années.", "it": "I fiumi trasportano nell'oceano minerali disciolti dalla roccia. L'acqua evapora di nuovo, ma il sale resta e si accumula nel corso di milioni di anni.", "de": "Flüsse tragen gelöste Mineralien aus Gestein ins Meer. Das Wasser verdunstet wieder, doch das Salz bleibt zurück und sammelt sich über Millionen Jahre an.", "ro": "Râurile duc în ocean minerale dizolvate din rocă. Apa se evaporă din nou, dar sarea rămâne și se acumulează de-a lungul a milioane de ani."}, "Why do onions make you cry?": {"fr": "Pourquoi les oignons font-ils pleurer ?", "it": "Perché le cipolle fanno piangere?", "de": "Warum bringen Zwiebeln uns zum Weinen?", "ro": "De ce ne fac cepele să plângem?"}, "A cut onion releases a stinging gas that meets the moisture in your eyes and turns into a mild acid, so your eyes water to wash it away.": {"fr": "Un oignon coupé libère un gaz piquant qui rencontre l'humidité de vos yeux et se transforme en un léger acide ; vos yeux pleurent alors pour l'évacuer.", "it": "Una cipolla tagliata rilascia un gas pungente che incontra l'umidità degli occhi e si trasforma in un acido lieve, così gli occhi lacrimano per eliminarlo.", "de": "Eine geschnittene Zwiebel setzt ein stechendes Gas frei, das auf die Feuchtigkeit der Augen trifft und zu einer milden Säure wird, daher tränen die Augen, um sie wegzuspülen.", "ro": "O ceapă tăiată eliberează un gaz iritant care întâlnește umezeala din ochi și devine un acid slab, așa că ochii lăcrimează ca să-l spele."}, "Nobody knows who carved the hundreds of giant stone spheres of Costa Rica, or why.": {"fr": "Personne ne sait qui a sculpté les centaines de sphères de pierre géantes du Costa Rica, ni pourquoi.", "it": "Nessuno sa chi abbia scolpito le centinaia di sfere di pietra giganti della Costa Rica, né perché.", "de": "Niemand weiß, wer die Hunderte riesiger Steinkugeln Costa Ricas schuf — oder warum.", "ro": "Nimeni nu știe cine a cioplit sutele de sfere uriașe de piatră din Costa Rica, sau de ce."}, "The Voynich Manuscript has resisted every attempt to decipher it for 600 years.": {"fr": "Le manuscrit de Voynich résiste à toute tentative de déchiffrement depuis 600 ans.", "it": "Il manoscritto Voynich resiste a ogni tentativo di decifrazione da 600 anni.", "de": "Das Voynich-Manuskript widersteht seit 600 Jahren jedem Entzifferungsversuch.", "ro": "Manuscrisul Voynich a rezistat oricărei încercări de descifrare timp de 600 de ani."}, "In 1977 a telescope caught a strong signal from space — the 'Wow! signal' — that has never repeated.": {"fr": "En 1977, un télescope a capté un signal puissant venu de l'espace — le « signal Wow! » — qui ne s'est jamais reproduit.", "it": "Nel 1977 un telescopio captò un forte segnale dallo spazio — il «segnale Wow!» — che non si è mai più ripetuto.", "de": "1977 fing ein Teleskop ein starkes Signal aus dem All auf — das „Wow!-Signal” — das sich nie wiederholt hat.", "ro": "În 1977 un telescop a prins un semnal puternic din spațiu — „semnalul Wow!” — care nu s-a mai repetat niciodată."}, "How ancient builders moved Stonehenge's 25-tonne stones over 200 km is still debated.": {"fr": "Comment les bâtisseurs antiques ont déplacé les pierres de 25 tonnes de Stonehenge sur plus de 200 km fait encore débat.", "it": "Come gli antichi costruttori spostarono le pietre da 25 tonnellate di Stonehenge per oltre 200 km è ancora dibattuto.", "de": "Wie die alten Erbauer die 25-Tonnen-Steine von Stonehenge über 200 km bewegten, ist bis heute umstritten.", "ro": "Cum au mutat constructorii antici pietrele de 25 de tone de la Stonehenge pe peste 200 km e încă dezbătut."}, "The 2,000-year-old Antikythera mechanism is a Greek 'computer' whose full purpose still puzzles historians.": {"fr": "Le mécanisme d'Anticythère, vieux de 2 000 ans, est un « ordinateur » grec dont le but exact intrigue encore les historiens.", "it": "Il meccanismo di Anticitera, di 2.000 anni fa, è un «computer» greco il cui scopo completo ancora confonde gli storici.", "de": "Der 2.000 Jahre alte Mechanismus von Antikythera ist ein griechischer „Computer”, dessen voller Zweck Historiker noch rätseln lässt.", "ro": "Mecanismul de la Antikythera, vechi de 2.000 de ani, e un „computer” grecesc al cărui scop deplin încă îi nedumerește pe istorici."}, "The purpose of the vast Nazca Lines, etched across the Peruvian desert, remains uncertain.": {"fr": "Le but des immenses lignes de Nazca, gravées dans le désert péruvien, reste incertain.", "it": "Lo scopo delle vaste linee di Nazca, incise nel deserto peruviano, resta incerto.", "de": "Der Zweck der riesigen Nazca-Linien in der peruanischen Wüste bleibt ungewiss.", "ro": "Scopul vastelor linii Nazca, gravate în deșertul peruan, rămâne incert."}, "Greece": {"fr": "Grèce", "it": "Grecia", "de": "Griechenland", "ro": "Grecia"}, "Jordan": {"fr": "Jordanie", "it": "Giordania", "de": "Jordanien", "ro": "Iordania"}, "Japan": {"fr": "Japon", "it": "Giappone", "de": "Japan", "ro": "Japonia"}, "Canada": {"fr": "Canada", "it": "Canada", "de": "Kanada", "ro": "Canada"}, "Morocco": {"fr": "Maroc", "it": "Marocco", "de": "Marokko", "ro": "Maroc"}, "Santorini": {"fr": "Santorin", "it": "Santorini", "de": "Santorin", "ro": "Santorini"}, "Petra": {"fr": "Pétra", "it": "Petra", "de": "Petra", "ro": "Petra"}, "Kyoto": {"fr": "Kyoto", "it": "Kyoto", "de": "Kyoto", "ro": "Kyoto"}, "Banff": {"fr": "Banff", "it": "Banff", "de": "Banff", "ro": "Banff"}, "Marrakesh": {"fr": "Marrakech", "it": "Marrakech", "de": "Marrakesch", "ro": "Marrakech"}, "Built on the rim of a flooded volcanic caldera.": {"fr": "Construite sur le bord d'une caldeira volcanique inondée.", "it": "Costruita sul bordo di una caldera vulcanica allagata.", "de": "Erbaut am Rand einer gefluteten Vulkan-Caldera.", "ro": "Construit pe marginea unei caldere vulcanice inundate."}, "Its white houses are painted to reflect summer heat.": {"fr": "Ses maisons blanches sont peintes pour réfléchir la chaleur de l'été.", "it": "Le sue case bianche sono dipinte per riflettere il caldo estivo.", "de": "Seine weißen Häuser sind weiß gestrichen, um die Sommerhitze zu reflektieren.", "ro": "Casele sale albe sunt vopsite ca să reflecte căldura verii."}, "Famous for sunsets over the Aegean Sea.": {"fr": "Célèbre pour ses couchers de soleil sur la mer Égée.", "it": "Famosa per i tramonti sul Mar Egeo.", "de": "Berühmt für Sonnenuntergänge über der Ägäis.", "ro": "Renumită pentru apusurile peste Marea Egee."}, "An entire city carved into rose-red sandstone cliffs.": {"fr": "Une cité entière taillée dans des falaises de grès rose.", "it": "Un'intera città scavata in scogliere di arenaria rosa.", "de": "Eine ganze Stadt, in rosenrote Sandsteinfelsen gehauen.", "ro": "Un întreg oraș săpat în stânci de gresie roz-roșiatică."}, "Over 2,000 years old, hidden in a desert canyon.": {"fr": "Vieille de plus de 2 000 ans, cachée dans un canyon désertique.", "it": "Vecchia di oltre 2.000 anni, nascosta in un canyon nel deserto.", "de": "Über 2.000 Jahre alt, verborgen in einer Wüstenschlucht.", "ro": "Veche de peste 2.000 de ani, ascunsă într-un canion deșertic."}, "Reached through a narrow gorge called the Siq.": {"fr": "On y accède par une gorge étroite appelée le Siq.", "it": "Vi si arriva attraverso una stretta gola chiamata Siq.", "de": "Erreichbar durch eine enge Schlucht namens Siq.", "ro": "Se ajunge printr-o trecătoare îngustă numită Siq."}, "Home to over 1,600 Buddhist temples.": {"fr": "Elle abrite plus de 1 600 temples bouddhistes.", "it": "Ospita oltre 1.600 templi buddhisti.", "de": "Heimat von über 1.600 buddhistischen Tempeln.", "ro": "Găzduiește peste 1.600 de temple budiste."}, "Was Japan's capital for more than 1,000 years.": {"fr": "Elle fut la capitale du Japon pendant plus de 1 000 ans.", "it": "È stata la capitale del Giappone per oltre 1.000 anni.", "de": "War über 1.000 Jahre lang Japans Hauptstadt.", "ro": "A fost capitala Japoniei timp de peste 1.000 de ani."}, "Known for a thousand vermilion shrine gates.": {"fr": "Connue pour ses mille portails de sanctuaire vermillon.", "it": "Nota per mille portali vermigli dei santuari.", "de": "Bekannt für tausend zinnoberrote Schreintore.", "ro": "Cunoscută pentru o mie de porți de altar vermilion."}, "Glacier-fed lakes glow turquoise from rock 'flour'.": {"fr": "Des lacs alimentés par les glaciers brillent en turquoise grâce à la « farine » de roche.", "it": "Laghi alimentati dai ghiacciai brillano di turchese per la «farina» di roccia.", "de": "Gletschergespeiste Seen leuchten türkis durch Gesteins-„Mehl”.", "ro": "Lacurile alimentate de ghețari strălucesc turcoaz din „făina” de rocă."}, "Canada's first national park, founded in 1885.": {"fr": "Le premier parc national du Canada, fondé en 1885.", "it": "Il primo parco nazionale del Canada, fondato nel 1885.", "de": "Kanadas erster Nationalpark, gegründet 1885.", "ro": "Primul parc național al Canadei, înființat în 1885."}, "Ringed by ten snow-dusted peaks.": {"fr": "Entouré de dix sommets saupoudrés de neige.", "it": "Circondato da dieci vette spolverate di neve.", "de": "Umringt von zehn schneebestäubten Gipfeln.", "ro": "Înconjurat de zece piscuri pudrate cu zăpadă."}, "Its old medina is a maze of souks and courtyards.": {"fr": "Sa vieille médina est un labyrinthe de souks et de cours.", "it": "La sua vecchia medina è un labirinto di suk e cortili.", "de": "Seine alte Medina ist ein Labyrinth aus Souks und Innenhöfen.", "ro": "Vechea sa medina e un labirint de souk-uri și curți."}, "Nicknamed the 'Red City' for its earthen walls.": {"fr": "Surnommée la « ville rouge » pour ses murs de terre.", "it": "Soprannominata la «città rossa» per le sue mura di terra.", "de": "Wegen ihrer Lehmmauern „Rote Stadt” genannt.", "ro": "Supranumită „Orașul Roșu” pentru zidurile sale de pământ."}, "A gateway between the Sahara and the Atlas Mountains.": {"fr": "Une porte entre le Sahara et les montagnes de l'Atlas.", "it": "Una porta tra il Sahara e i Monti dell'Atlante.", "de": "Ein Tor zwischen der Sahara und dem Atlasgebirge.", "ro": "O poartă între Sahara și Munții Atlas."}, "Octopus": {"fr": "Pieuvre", "it": "Polpo", "de": "Tintenfisch", "ro": "Caracatiță"}, "Axolotl": {"fr": "Axolotl", "it": "Axolotl", "de": "Axolotl", "ro": "Axolotl"}, "Arctic Tern": {"fr": "Sterne arctique", "it": "Sterna artica", "de": "Küstenseeschwalbe", "ro": "Rândunică de mare arctică"}, "Tardigrade": {"fr": "Tardigrade", "it": "Tardigrado", "de": "Bärtierchen", "ro": "Tardigrad"}, "Pangolin": {"fr": "Pangolin", "it": "Pangolino", "de": "Schuppentier", "ro": "Pangolin"}, "Has three hearts and blue blood.": {"fr": "A trois cœurs et du sang bleu.", "it": "Ha tre cuori e sangue blu.", "de": "Hat drei Herzen und blaues Blut.", "ro": "Are trei inimi și sânge albastru."}, "Each arm carries its own cluster of neurons.": {"fr": "Chaque bras possède son propre amas de neurones.", "it": "Ogni braccio ha il proprio gruppo di neuroni.", "de": "Jeder Arm trägt sein eigenes Nervenbündel.", "ro": "Fiecare braț are propriul grup de neuroni."}, "Can taste the world with its suckers.": {"fr": "Peut goûter le monde avec ses ventouses.", "it": "Può assaporare il mondo con le ventose.", "de": "Kann die Welt mit seinen Saugnäpfen schmecken.", "ro": "Poate gusta lumea cu ventuzele sale."}, "Can regrow lost limbs — even parts of its heart and brain.": {"fr": "Peut faire repousser ses membres perdus — même des parties de son cœur et de son cerveau.", "it": "Può rigenerare gli arti persi — perfino parti di cuore e cervello.", "de": "Kann verlorene Gliedmaßen nachwachsen lassen — sogar Teile von Herz und Hirn.", "ro": "Își poate reface membrele pierdute — chiar și părți din inimă și creier."}, "Keeps its 'baby' form for its whole life.": {"fr": "Conserve sa forme « juvénile » toute sa vie.", "it": "Mantiene la forma «giovanile» per tutta la vita.", "de": "Behält sein ganzes Leben seine „Jugendform”.", "ro": "Își păstrează forma „de pui” toată viața."}, "Critically endangered in the wild.": {"fr": "En danger critique d'extinction à l'état sauvage.", "it": "In pericolo critico in natura.", "de": "In freier Wildbahn vom Aussterben bedroht.", "ro": "Pe cale critică de dispariție în sălbăticie."}, "Migrates pole to pole — the longest journey of any animal.": {"fr": "Migre d'un pôle à l'autre — le plus long voyage de tous les animaux.", "it": "Migra da un polo all'altro — il viaggio più lungo di ogni animale.", "de": "Zieht von Pol zu Pol — die längste Reise aller Tiere.", "ro": "Migrează de la pol la pol — cea mai lungă călătorie a vreunui animal."}, "Sees two summers every single year.": {"fr": "Voit deux étés chaque année.", "it": "Vede due estati ogni anno.", "de": "Erlebt jedes Jahr zwei Sommer.", "ro": "Vede două veri în fiecare an."}, "Can live more than 30 years.": {"fr": "Peut vivre plus de 30 ans.", "it": "Può vivere più di 30 anni.", "de": "Kann über 30 Jahre alt werden.", "ro": "Poate trăi peste 30 de ani."}, "Survives boiling, freezing and the vacuum of space.": {"fr": "Survit à l'ébullition, au gel et au vide de l'espace.", "it": "Sopravvive a bollitura, congelamento e vuoto dello spazio.", "de": "Überlebt Kochen, Gefrieren und das Vakuum des Alls.", "ro": "Supraviețuiește fierberii, înghețului și vidului spațiului."}, "Smaller than a grain of sand.": {"fr": "Plus petit qu'un grain de sable.", "it": "Più piccolo di un granello di sabbia.", "de": "Kleiner als ein Sandkorn.", "ro": "Mai mic decât un grăunte de nisip."}, "Can dry out for years, then revive in water.": {"fr": "Peut se dessécher des années, puis revivre dans l'eau.", "it": "Può seccarsi per anni, poi rivivere nell'acqua.", "de": "Kann jahrelang austrocknen und im Wasser wieder aufleben.", "ro": "Se poate usca ani de zile, apoi reînvie în apă."}, "The only mammal covered in scales.": {"fr": "Le seul mammifère couvert d'écailles.", "it": "L'unico mammifero coperto di scaglie.", "de": "Das einzige Säugetier mit Schuppen.", "ro": "Singurul mamifer acoperit cu solzi."}, "Rolls into an armoured ball when threatened.": {"fr": "Se roule en boule blindée lorsqu'il est menacé.", "it": "Si arrotola in una palla corazzata se minacciato.", "de": "Rollt sich bei Gefahr zu einer gepanzerten Kugel.", "ro": "Se face ghem blindat când e amenințat."}, "Sadly, the most trafficked wild mammal.": {"fr": "Hélas, le mammifère sauvage le plus trafiqué.", "it": "Purtroppo, il mammifero selvatico più trafficato.", "de": "Leider das am meisten gehandelte Wildsäugetier.", "ro": "Din păcate, cel mai traficat mamifer sălbatic."}, "Lavender": {"fr": "Lavande", "it": "Lavanda", "de": "Lavendel", "ro": "Lavandă"}, "Aloe Vera": {"fr": "Aloe vera", "it": "Aloe vera", "de": "Aloe vera", "ro": "Aloe vera"}, "Sunflower": {"fr": "Tournesol", "it": "Girasole", "de": "Sonnenblume", "ro": "Floarea-soarelui"}, "Rosemary": {"fr": "Romarin", "it": "Rosmarino", "de": "Rosmarin", "ro": "Rozmarin"}, "Cherry Blossom": {"fr": "Fleur de cerisier", "it": "Fiore di ciliegio", "de": "Kirschblüte", "ro": "Floare de cireș"}, "Prized since Roman baths for its calming scent.": {"fr": "Prisée depuis les bains romains pour son parfum apaisant.", "it": "Apprezzata fin dalle terme romane per il profumo calmante.", "de": "Seit den römischen Bädern für ihren beruhigenden Duft geschätzt.", "ro": "Prețuită încă de la băile romane pentru parfumul ei calmant."}, "A single plant can bloom for up to 15 years.": {"fr": "Un seul plant peut fleurir jusqu'à 15 ans.", "it": "Una sola pianta può fiorire fino a 15 anni.", "de": "Eine einzelne Pflanze kann bis zu 15 Jahre blühen.", "ro": "O singură plantă poate înflori până la 15 ani."}, "Its name comes from the Latin 'lavare' — to wash.": {"fr": "Son nom vient du latin « lavare » — laver.", "it": "Il suo nome viene dal latino «lavare» — lavare.", "de": "Ihr Name kommt vom lateinischen „lavare” — waschen.", "ro": "Numele ei vine din latinescul „lavare” — a spăla."}, "A desert succulent that stores water in its thick leaves.": {"fr": "Une succulente du désert qui stocke l'eau dans ses feuilles épaisses.", "it": "Una succulenta del deserto che immagazzina acqua nelle foglie spesse.", "de": "Eine Wüsten-Sukkulente, die Wasser in dicken Blättern speichert.", "ro": "O suculentă de deșert care stochează apă în frunzele groase."}, "Used on skin and burns for over 4,000 years.": {"fr": "Utilisée sur la peau et les brûlures depuis plus de 4 000 ans.", "it": "Usata su pelle e ustioni da oltre 4.000 anni.", "de": "Seit über 4.000 Jahren für Haut und Verbrennungen verwendet.", "ro": "Folosită pe piele și arsuri de peste 4.000 de ani."}, "Can survive months with almost no water.": {"fr": "Peut survivre des mois presque sans eau.", "it": "Può sopravvivere mesi quasi senza acqua.", "de": "Kann Monate fast ohne Wasser überleben.", "ro": "Poate supraviețui luni întregi aproape fără apă."}, "Young blooms turn to follow the Sun across the sky.": {"fr": "Les jeunes fleurs se tournent pour suivre le Soleil dans le ciel.", "it": "I fiori giovani si girano per seguire il Sole nel cielo.", "de": "Junge Blüten drehen sich, um der Sonne zu folgen.", "ro": "Florile tinere se întorc ca să urmărească Soarele pe cer."}, "A single head can hold up to 2,000 seeds.": {"fr": "Une seule fleur peut contenir jusqu'à 2 000 graines.", "it": "Un solo capolino può contenere fino a 2.000 semi.", "de": "Ein einzelner Blütenkopf kann bis zu 2.000 Samen tragen.", "ro": "Un singur capitul poate avea până la 2.000 de semințe."}, "Can grow taller than a person in one summer.": {"fr": "Peut devenir plus grand qu'une personne en un seul été.", "it": "Può diventare più alta di una persona in un'estate.", "de": "Kann in einem Sommer größer als ein Mensch werden.", "ro": "Poate crește mai înalt decât un om într-o singură vară."}, "An evergreen herb once worn as a wreath to sharpen memory.": {"fr": "Une herbe à feuillage persistant, jadis portée en couronne pour aiguiser la mémoire.", "it": "Un'erba sempreverde un tempo portata a corona per affinare la memoria.", "de": "Ein immergrünes Kraut, einst als Kranz getragen, um das Gedächtnis zu schärfen.", "ro": "O plantă veșnic verde, purtată cândva ca o cunună pentru a ascuți memoria."}, "Thrives on neglect and rocky, dry soil.": {"fr": "Prospère dans la négligence et un sol rocailleux et sec.", "it": "Prospera nell'incuria e su terreni rocciosi e aridi.", "de": "Gedeiht bei Vernachlässigung und auf steinigem, trockenem Boden.", "ro": "Prosperă din neglijență și pe sol pietros și uscat."}, "Its blue flowers are loved by bees.": {"fr": "Ses fleurs bleues sont adorées des abeilles.", "it": "I suoi fiori blu sono amati dalle api.", "de": "Seine blauen Blüten werden von Bienen geliebt.", "ro": "Florile sale albastre sunt iubite de albine."}, "Blooms for only a week or two each spring.": {"fr": "Ne fleurit qu'une semaine ou deux chaque printemps.", "it": "Fiorisce solo una o due settimane ogni primavera.", "de": "Blüht jeden Frühling nur ein bis zwei Wochen.", "ro": "Înflorește doar o săptămână-două în fiecare primăvară."}, "Celebrated in Japan as 'sakura' for over 1,000 years.": {"fr": "Célébrée au Japon sous le nom de « sakura » depuis plus de 1 000 ans.", "it": "Celebrato in Giappone come «sakura» da oltre 1.000 anni.", "de": "In Japan seit über 1.000 Jahren als „Sakura” gefeiert.", "ro": "Sărbătorită în Japonia drept „sakura” de peste 1.000 de ani."}, "The trees rarely bear edible fruit.": {"fr": "Ces arbres portent rarement des fruits comestibles.", "it": "Questi alberi raramente danno frutti commestibili.", "de": "Die Bäume tragen selten essbare Früchte.", "ro": "Acești copaci rar dau fructe comestibile."}, "The gel soothes burns, sunburn and minor skin irritation, hydrates the skin, and carries antioxidants and enzymes.": {"fr": "Le gel apaise les brûlures, les coups de soleil et les irritations légères, hydrate la peau et contient des antioxydants et des enzymes.", "it": "Il gel lenisce ustioni, scottature e lievi irritazioni, idrata la pelle e contiene antiossidanti ed enzimi.", "de": "Das Gel lindert Verbrennungen, Sonnenbrand und leichte Hautreizungen, spendet Feuchtigkeit und enthält Antioxidantien und Enzyme.", "ro": "Gelul alină arsurile, arsurile solare și iritațiile ușoare, hidratează pielea și conține antioxidanți și enzime."}, "Its seeds are rich in vitamin E, magnesium and healthy fats that support the heart, skin and immune system.": {"fr": "Ses graines sont riches en vitamine E, magnésium et bonnes graisses qui soutiennent le cœur, la peau et le système immunitaire.", "it": "I suoi semi sono ricchi di vitamina E, magnesio e grassi buoni che sostengono cuore, pelle e sistema immunitario.", "de": "Ihre Samen sind reich an Vitamin E, Magnesium und gesunden Fetten, die Herz, Haut und Immunsystem unterstützen.", "ro": "Semințele sale sunt bogate în vitamina E, magneziu și grăsimi sănătoase care susțin inima, pielea și sistemul imunitar."}, "Its aroma is linked to sharper focus and memory, it aids digestion, and it is rich in anti-inflammatory antioxidants.": {"fr": "Son arôme est associé à une meilleure concentration et mémoire, il facilite la digestion et il est riche en antioxydants anti-inflammatoires.", "it": "Il suo aroma è legato a maggiore concentrazione e memoria, favorisce la digestione ed è ricco di antiossidanti antinfiammatori.", "de": "Sein Aroma wird mit besserer Konzentration und Gedächtnis verbunden, fördert die Verdauung und ist reich an entzündungshemmenden Antioxidantien.", "ro": "Aroma sa e legată de o concentrare și o memorie mai bune, ajută digestia și e bogată în antioxidanți antiinflamatori."}, "Cherry-blossom tea is calming and caffeine-free, and the petals carry antioxidants traditionally used to soothe and brighten the skin.": {"fr": "La tisane de fleur de cerisier est apaisante et sans caféine, et les pétales contiennent des antioxydants traditionnellement utilisés pour apaiser et éclaircir la peau.", "it": "Il tè ai fiori di ciliegio è calmante e senza caffeina, e i petali contengono antiossidanti usati tradizionalmente per lenire e illuminare la pelle.", "de": "Kirschblütentee ist beruhigend und koffeinfrei, und die Blütenblätter enthalten Antioxidantien, die traditionell Haut beruhigen und aufhellen.", "ro": "Ceaiul de flori de cireș e liniștitor și fără cofeină, iar petalele conțin antioxidanți folosiți tradițional pentru a calma și lumina pielea."}, "The Statue of Liberty arrives in New York Harbor, packed in 214 crates.": {"fr": "La statue de la Liberté arrive dans le port de New York, emballée dans 214 caisses.", "it": "La Statua della Libertà arriva nel porto di New York, imballata in 214 casse.", "de": "Die Freiheitsstatue erreicht den Hafen von New York, verpackt in 214 Kisten.", "ro": "Statuia Libertății ajunge în portul New York, ambalată în 214 lăzi."}, "The Watergate break-in is discovered, setting off a historic scandal.": {"fr": "Le cambriolage du Watergate est découvert, déclenchant un scandale historique.", "it": "Viene scoperto il furto al Watergate, dando il via a uno scandalo storico.", "de": "Der Watergate-Einbruch wird entdeckt und löst einen historischen Skandal aus.", "ro": "Este descoperită spargerea de la Watergate, declanșând un scandal istoric."}, "Apollo 11 lands the first humans on the Moon.": {"fr": "Apollo 11 dépose les premiers humains sur la Lune.", "it": "Apollo 11 porta i primi esseri umani sulla Luna.", "de": "Apollo 11 bringt die ersten Menschen auf den Mond.", "ro": "Apollo 11 aduce primii oameni pe Lună."}, "The Berlin Wall falls, reopening a divided city.": {"fr": "Le mur de Berlin tombe, rouvrant une ville divisée.", "it": "Cade il muro di Berlino, riaprendo una città divisa.", "de": "Die Berliner Mauer fällt und öffnet eine geteilte Stadt wieder.", "ro": "Cade Zidul Berlinului, redeschizând un oraș divizat."}, "Yuri Gagarin becomes the first human to reach space.": {"fr": "Youri Gagarine devient le premier humain à atteindre l'espace.", "it": "Yuri Gagarin diventa il primo uomo a raggiungere lo spazio.", "de": "Juri Gagarin wird der erste Mensch im Weltraum.", "ro": "Iuri Gagarin devine primul om care ajunge în spațiu."}, "Albert Einstein is born in Ulm, Germany.": {"fr": "Albert Einstein naît à Ulm, en Allemagne.", "it": "Albert Einstein nasce a Ulm, in Germania.", "de": "Albert Einstein wird in Ulm, Deutschland, geboren.", "ro": "Albert Einstein se naște la Ulm, Germania."}, "Martin Luther reportedly posts his 95 Theses.": {"fr": "Martin Luther aurait affiché ses 95 thèses.", "it": "Martin Lutero avrebbe affisso le sue 95 tesi.", "de": "Martin Luther schlägt der Überlieferung nach seine 95 Thesen an.", "ro": "Martin Luther ar fi afișat cele 95 de teze ale sale."}, "The Wright brothers make the first powered flight at Kitty Hawk.": {"fr": "Les frères Wright réalisent le premier vol motorisé à Kitty Hawk.", "it": "I fratelli Wright compiono il primo volo a motore a Kitty Hawk.", "de": "Die Gebrüder Wright gelingt der erste Motorflug in Kitty Hawk.", "ro": "Frații Wright realizează primul zbor cu motor la Kitty Hawk."}, "A new century turns — almanacs everywhere reset their calendars.": {"fr": "Un nouveau siècle commence — partout, les almanachs remettent leurs calendriers à zéro.", "it": "Inizia un nuovo secolo — ovunque gli almanacchi azzerano i calendari.", "de": "Ein neues Jahrhundert beginnt — überall stellen Almanache ihre Kalender zurück.", "ro": "Începe un nou secol — pretutindeni almanahurile își resetează calendarele."}, "How many hearts does an octopus have?": {"fr": "Combien de cœurs possède une pieuvre ?", "it": "Quanti cuori ha un polpo?", "de": "Wie viele Herzen hat ein Tintenfisch?", "ro": "Câte inimi are o caracatiță?"}, "Which planet is the hottest in our solar system?": {"fr": "Quelle est la planète la plus chaude de notre système solaire ?", "it": "Qual è il pianeta più caldo del sistema solare?", "de": "Welcher Planet ist der heißeste in unserem Sonnensystem?", "ro": "Care planetă este cea mai fierb er Mond", "ro": "O lună cu nuanță albastră"}, "The second full moon in a month": {"fr": "La deuxième pleine lune d'un mois", "it": "La seconda luna piena del mese", "de": "Der zweite Vollmond in einem Monat", "ro": "A doua lună plină dintr-o lună"}, "A type of eclipse": {"fr": "Un type d'éclipse", "it": "Un tipo di eclissi", "de": "Eine Art Finsternis", "ro": "Un tip de eclipsă"}, "The first moon of spring": {"fr": "La première lune du printemps", "it": "La prima luna di primavera", "de": "Der erste Mond des Frühlings", "ro": "Prima lună de primăvară"}, "Yes": {"fr": "Oui", "it": "Sì", "de": "Ja", "ro": "Da"}, "No": {"fr": "Non", "it": "No", "de": "Nein", "ro": "Nu"}, "A day": {"fr": "Un jour", "it": "Un giorno", "de": "Ein Tag", "ro": "O zi"}, "A year": {"fr": "Une année", "it": "Un anno", "de": "Ein Jahr", "ro": "Un an"}, "They're the same": {"fr": "Ils sont égaux", "it": "Sono uguali", "de": "Sie sind gleich", "ro": "Sunt la fel"}, "Neither": {"fr": "Aucun", "it": "Nessuno", "de": "Keines", "ro": "Niciunul"}, "Balance": {"fr": "L'équilibre", "it": "Equilibrio", "de": "Gleichgewicht", "ro": "Echilibru"}, "Sensing the space around them": {"fr": "Sentir l'espace autour d'eux", "it": "Percepire lo spazio intorno", "de": "Den Raum um sie herum erfassen", "ro": "Să simtă spațiul din jur"}, "Showing mood": {"fr": "Montrer l'humeur", "it": "Mostrare l'umore", "de": "Stimmung zeigen", "ro": "Să arate starea de spirit"}, "Keeping warm": {"fr": "Garder la chaleur", "it": "Tenere caldo", "de": "Warmhalten", "ro": "Să țină de cald"}, "Three — two pump blood to the gills, one to the rest of the body.": {"fr": "Trois — deux envoient le sang vers les branchies, un vers le reste du corps.", "it": "Tre — due pompano il sangue alle branchie, uno al resto del corpo.", "de": "Drei — zwei pumpen Blut zu den Kiemen, eines in den restlichen Körper.", "ro": "Trei — două pompează sânge spre branhii, una spre restul corpului."}, "Venus — its thick atmosphere traps heat, even hotter than Mercury.": {"fr": "Vénus — son atmosphère épaisse piège la chaleur, encore plus que Mercure.", "it": "Venere — la sua densa atmosfera intrappola il calore, più calda persino di Mercurio.", "de": "Venus — ihre dichte Atmosphäre hält die Hitze, heißer noch als Merkur.", "ro": "Venus — atmosfera ei densă reține căldura, mai fierbinte chiar decât Mercur."}, "Pigments called carotenoids in the algae and shrimp they eat.": {"fr": "Des pigments appelés caroténoïdes, dans les algues et les crevettes qu'ils mangent.", "it": "Pigmenti chiamati carotenoidi nelle alghe e nei gamberetti che mangiano.", "de": "Pigmente namens Carotinoide in den Algen und Krebsen, die sie fressen.", "ro": "Pigmenți numiți carotenoizi din algele și creveții pe care îi mănâncă."}, "Tardigrades endure boiling, freezing and even space.": {"fr": "Les tardigrades supportent l'ébullition, le gel et même l'espace.", "it": "I tardigradi resistono a bollitura, congelamento e persino allo spazio.", "de": "Bärtierchen überstehen Kochen, Gefrieren und sogar das All.", "ro": "Tardigradele rezistă la fierbere, îngheț și chiar la spațiu."}, "The skin — it counts as an organ, and it's the biggest.": {"fr": "La peau — elle compte comme un organe, et c'est le plus grand.", "it": "La pelle — conta come organo, ed è il più grande.", "de": "Die Haut — sie zählt als Organ und ist das größte.", "ro": "Pielea — se consideră organ și este cel mai mare."}, "Its low water content and acidity stop microbes growing.": {"fr": "Sa faible teneur en eau et son acidité empêchent les microbes de se développer.", "it": "Il suo basso contenuto d'acqua e l'acidità impediscono ai microbi di crescere.", "de": "Sein geringer Wassergehalt und die Säure verhindern, dass Mikroben wachsen.", "ro": "Conținutul scăzut de apă și aciditatea împiedică microbii să se dezvolte."}, "White — our atmosphere scatters blue light, so it looks yellow from the ground.": {"fr": "Blanc — notre atmosphère diffuse la lumière bleue, il paraît donc jaune depuis le sol.", "it": "Bianco — la nostra atmosfera diffonde la luce blu, così da terra appare giallo.", "de": "Weiß — unsere Atmosphäre streut blaues Licht, daher wirkt sie vom Boden gelb.", "ro": "Alb — atmosfera noastră împrăștie lumina albastră, așa că de pe sol pare galben."}, "The pangolin — its scales are made of keratin, like our nails.": {"fr": "Le pangolin — ses écailles sont faites de kératine, comme nos ongles.", "it": "Il pangolino — le sue scaglie sono di cheratina, come le nostre unghie.", "de": "Das Schuppentier — seine Schuppen bestehen aus Keratin, wie unsere Nägel.", "ro": "Pangolinul — solzii lui sunt din keratină, ca unghiile noastre."}, "Air scatters the shorter blue wavelengths of sunlight in all directions.": {"fr": "L'air diffuse dans toutes les directions les courtes longueurs d'onde bleues du soleil.", "it": "L'aria diffonde in tutte le direzioni le lunghezze d'onda blu, più corte, del sole.", "de": "Die Luft streut die kürzeren blauen Wellenlängen des Sonnenlichts in alle Richtungen.", "ro": "Aerul împrăștie în toate direcțiile lungimile de undă albastre, mai scurte, ale soarelui."}, "Around 270 — many fuse together into 206 by adulthood.": {"fr": "Environ 270 — beaucoup fusionnent pour n'en former que 206 à l'âge adulte.", "it": "Circa 270 — molte si fondono fino a 206 da adulti.", "de": "Etwa 270 — viele verwachsen bis zum Erwachsenenalter zu 206.", "ro": "În jur de 270 — multe se contopesc în 206 la maturitate."}, "The Arctic Tern flies pole to pole, seeing two summers a year.": {"fr": "La sterne arctique vole d'un pôle à l'autre et voit deux étés par an.", "it": "La sterna artica vola da un polo all'altro, vedendo due estati l'anno.", "de": "Die Küstenseeschwalbe fliegt von Pol zu Pol und erlebt zwei Sommer im Jahr.", "ro": "Rândunica de mare arctică zboară de la pol la pol, văzând două veri pe an."}, "True — bananas qualify as berries, while strawberries don't.": {"fr": "Vrai — les bananes sont des baies, contrairement aux fraises.", "it": "Vero — le banane sono bacche, mentre le fragole no.", "de": "Stimmt — Bananen gelten als Beeren, Erdbeeren dagegen nicht.", "ro": "Adevărat — bananele se încadrează ca bace, în timp ce căpșunile nu."}, "A flamboyance — a fitting name for such showy birds.": {"fr": "Une « flamboyance » — un nom qui sied à des oiseaux si spectaculaires.", "it": "Una «flamboyance» — un nome adatto a uccelli così sgargianti.", "de": "Eine Flamboyance — ein passender Name für so auffällige Vögel.", "ro": "O „flamboyance” — un nume potrivit pentru păsări atât de spectaculoase."}, "Lightning can reach ~30,000°C, far hotter than the Sun's surface.": {"fr": "La foudre peut atteindre ~30 000 °C, bien plus chaud que la surface du Soleil.", "it": "Un fulmine può raggiungere ~30.000 °C, molto più della superficie del Sole.", "de": "Ein Blitz erreicht ~30.000 °C, weit heißer als die Sonnenoberfläche.", "ro": "Fulgerul poate atinge ~30.000 °C, mult mai mult decât suprafața Soarelui."}, "The 2,000-year-old Antikythera mechanism modelled the movements of the sky.": {"fr": "Le mécanisme d'Anticythère, vieux de 2 000 ans, modélisait les mouvements du ciel.", "it": "Il meccanismo di Anticitera, di 2.000 anni, modellava i moti del cielo.", "de": "Der 2.000 Jahre alte Antikythera-Mechanismus bildete die Himmelsbewegungen nach.", "ro": "Mecanismul de la Antikythera, vechi de 2.000 de ani, modela mișcările cerului."}, "Their suckers are lined with taste receptors.": {"fr": "Leurs ventouses sont tapissées de récepteurs du goût.", "it": "Le loro ventose sono ricoperte di recettori del gusto.", "de": "Ihre Saugnäpfe sind mit Geschmacksrezeptoren ausgekleidet.", "ro": "Ventuzele lor sunt căptușite cu receptori de gust."}, "Only around 5% — we know more about the Moon's surface.": {"fr": "Seulement environ 5 % — on connaît mieux la surface de la Lune.", "it": "Solo circa il 5% — conosciamo meglio la superficie della Luna.", "de": "Nur etwa 5 % — wir wissen mehr über die Mondoberfläche.", "ro": "Doar aproximativ 5% — știm mai multe despre suprafața Lunii."}, "Bamboo is a grass — and one of the fastest-growing plants on Earth.": {"fr": "Le bambou est une herbe — et l'une des plantes à la croissance la plus rapide sur Terre.", "it": "Il bambù è un'erba — e una delle piante a crescita più rapida sulla Terra.", "de": "Bambus ist ein Gras — und eine der am schnellsten wachsenden Pflanzen der Erde.", "ro": "Bambusul este o iarbă — și una dintre cele mai rapid crescătoare plante de pe Pământ."}, "It's the second full moon to fall within a single calendar month.": {"fr": "C'est la deuxième pleine lune à tomber dans un même mois civil.", "it": "È la seconda luna piena che cade nello stesso mese di calendario.", "de": "Es ist der zweite Vollmond innerhalb eines Kalendermonats.", "ro": "Este a doua lună plină care cade în aceeași lună calendaristică."}, "No — it's far too narrow; that's a long-standing myth.": {"fr": "Non — elle est bien trop étroite ; c'est un mythe tenace.", "it": "No — è troppo stretta; è un mito di lunga data.", "de": "Nein — sie ist viel zu schmal; das ist ein altes Märchen.", "ro": "Nu — e mult prea îngust; este un mit vechi."}, "A Venusian day is longer than its year — it spins very slowly.": {"fr": "Un jour vénusien est plus long que son année — Vénus tourne très lentement.", "it": "Un giorno venusiano è più lungo del suo anno — Venere ruota molto lentamente.", "de": "Ein Venustag ist länger als sein Jahr — die Venus dreht sich sehr langsam.", "ro": "O zi venusiană este mai lungă decât anul ei — Venus se rotește foarte încet."}, "They sense nearby objects and gaps about as wide as the cat itself.": {"fr": "Elles détectent les objets proches et les passages à peu près aussi larges que le chat lui-même.", "it": "Percepiscono oggetti vicini e varchi larghi all'incirca quanto il gatto stesso.", "de": "Sie erfassen nahe Objekte und Lücken, etwa so breit wie die Katze selbst.", "ro": "Detectează obiectele apropiate și spațiile cam la fel de late ca pisica însăși."}, "A day on Venus is longer than its year — it spins so slowly that one rotation outlasts a full orbit of the Sun.": {"fr": "Un jour sur Vénus est plus long que son année — elle tourne si lentement qu'une rotation dépasse une orbite complète autour du Soleil.", "it": "Un giorno su Venere è più lungo del suo anno — ruota così lentamente che una rotazione dura più di un'orbita completa attorno al Sole.", "de": "Ein Tag auf der Venus ist länger als ihr Jahr — sie dreht sich so langsam, dass eine Umdrehung länger dauert als ein voller Umlauf um die Sonne.", "ro": "O zi pe Venus este mai lungă decât anul ei — se rotește atât de încet încât o rotație durează mai mult decât o orbită completă în jurul Soarelui."}, "Venus also turns the 'wrong' way.": {"fr": "Vénus tourne aussi dans le « mauvais » sens.", "it": "Venere ruota anche nel verso «sbagliato».", "de": "Die Venus dreht sich zudem in die „falsche” Richtung.", "ro": "Venus se rotește și în sensul „greșit”."}, "Sunlight takes about 8 minutes 20 seconds to reach Earth — you always see the Sun's past.": {"fr": "La lumière du Soleil met environ 8 minutes 20 secondes à atteindre la Terre — vous voyez toujours le passé du Soleil.", "it": "La luce del Sole impiega circa 8 minuti e 20 secondi per raggiungere la Terra — vedi sempre il passato del Sole.", "de": "Sonnenlicht braucht etwa 8 Minuten 20 Sekunden bis zur Erde — du siehst immer die Vergangenheit der Sonne.", "ro": "Lumina Soarelui face circa 8 minute și 20 de secunde până la Pământ — vezi mereu trecutul Soarelui."}, "Light is fast, space is vast.": {"fr": "La lumière est rapide, l'espace est immense.", "it": "La luce è veloce, lo spazio è immenso.", "de": "Licht ist schnell, der Raum ist riesig.", "ro": "Lumina e rapidă, spațiul e imens."}, "A teaspoon of neutron-star material would weigh about a billion tonnes on Earth.": {"fr": "Une cuillère à café de matière d'étoile à neutrons pèserait environ un milliard de tonnes sur Terre.", "it": "Un cucchiaino di materia di stella di neutroni peserebbe circa un miliardo di tonnellate sulla Terra.", "de": "Ein Teelöffel Neutronensternmaterie würde auf der Erde etwa eine Milliarde Tonnen wiegen.", "ro": "O linguriță de materie de stea neutronică ar cântări circa un miliard de tone pe Pământ."}, "Matter squeezed to its limit.": {"fr": "La matière comprimée à l'extrême.", "it": "Materia compressa al limite.", "de": "Materie bis an ihre Grenze gepresst.", "ro": "Materie comprimată la limită."}, "The shortest war in history lasted about 38 minutes — the Anglo-Zanzibar War of 1896.": {"fr": "La guerre la plus courte de l'histoire a duré environ 38 minutes — la guerre anglo-zanzibaraise de 1896.", "it": "La guerra più breve della storia durò circa 38 minuti — la guerra anglo-zanzibariana del 1896.", "de": "Der kürzeste Krieg der Geschichte dauerte etwa 38 Minuten — der Britisch-Sansibarische Krieg von 1896.", "ro": "Cel mai scurt război din istorie a durat circa 38 de minute — Războiul anglo-zanzibarian din 1896."}, "Over before breakfast ended.": {"fr": "Terminé avant la fin du petit-déjeuner.", "it": "Finita prima che finisse la colazione.", "de": "Vorbei, bevor das Frühstück endete.", "ro": "Terminat înainte să se termine micul dejun."}, "Cleopatra lived closer in time to the Moon landing than to the building of the Great Pyramid.": {"fr": "Cléopâtre a vécu plus près dans le temps de l'alunissage que de la construction de la grande pyramide.", "it": "Cleopatra visse più vicina nel tempo allo sbarco sulla Luna che alla costruzione della Grande Piramide.", "de": "Kleopatra lebte zeitlich näher an der Mondlandung als am Bau der Großen Pyramide.", "ro": "Cleopatra a trăit mai aproape în timp de aselenizare decât de construirea Marii Piramide."}, "A timeline that bends the mind.": {"fr": "Une chronologie qui défie l'esprit.", "it": "Una cronologia che sfida la mente.", "de": "Eine Zeitachse, die den Verstand verbiegt.", "ro": "O cronologie care îți răstoarnă mintea."}, "Oxford University was teaching students before the Aztec Empire even existed.": {"fr": "L'université d'Oxford enseignait déjà avant même que l'Empire aztèque n'existe.", "it": "L'Università di Oxford insegnava agli studenti prima ancora che esistesse l'Impero azteco.", "de": "Die Universität Oxford unterrichtete schon, bevor das Aztekenreich überhaupt existierte.", "ro": "Universitatea Oxford preda studenți înainte ca Imperiul Aztec să existe."}, "Older than whole civilisations.": {"fr": "Plus ancienne que des civilisations entières.", "it": "Più antica di intere civiltà.", "de": "Älter als ganze Zivilisationen.", "ro": "Mai veche decât civilizații întregi."}, "A lightning bolt is roughly five times hotter than the surface of the Sun.": {"fr": "Un éclair est environ cinq fois plus chaud que la surface du Soleil.", "it": "Un fulmine è circa cinque volte più caldo della superficie del Sole.", "de": "Ein Blitz ist etwa fünfmal heißer als die Sonnenoberfläche.", "ro": "Un fulger este de aproximativ cinci ori mai fierbinte decât suprafața Soarelui."}, "The physics of a 30,000°C flash.": {"fr": "La physique d'un éclair à 30 000 °C.", "it": "La fisica di un lampo a 30.000 °C.", "de": "Die Physik eines 30.000-°C-Blitzes.", "ro": "Fizica unui fulger de 30.000 °C."}, "Helium was discovered on the Sun before it was ever found on Earth.": {"fr": "L'hélium a été découvert sur le Soleil avant d'être trouvé sur Terre.", "it": "L'elio fu scoperto sul Sole prima di essere trovato sulla Terra.", "de": "Helium wurde auf der Sonne entdeckt, bevor es je auf der Erde gefunden wurde.", "ro": "Heliul a fost descoperit pe Soare înainte să fie găsit vreodată pe Pământ."}, "Named for Helios, the Greek sun.": {"fr": "Nommé d'après Hélios, le soleil grec.", "it": "Prende il nome da Helios, il sole greco.", "de": "Benannt nach Helios, der griechischen Sonne.", "ro": "Numit după Helios, soarele grec."}, "Octopuses have three hearts and blue blood — and one heart stops when they swim.": {"fr": "Les pieuvres ont trois cœurs et du sang bleu — et un cœur s'arrête quand elles nagent.", "it": "I polpi hanno tre cuori e sangue blu — e un cuore si ferma quando nuotano.", "de": "Tintenfische haben drei Herzen und blaues Blut — und ein Herz stoppt, wenn sie schwimmen.", "ro": "Caracatițele au trei inimi și sânge albastru — iar o inimă se oprește când înoată."}, "Copper turns their blood blue.": {"fr": "Le cuivre rend leur sang bleu.", "it": "Il rame rende blu il loro sangue.", "de": "Kupfer färbt ihr Blut blau.", "ro": "Cuprul le face sângele albastru."}, "Sharks are older than trees — they have swum the oceans for over 400 million years.": {"fr": "Les requins sont plus anciens que les arbres — ils nagent dans les océans depuis plus de 400 millions d'années.", "it": "Gli squali sono più antichi degli alberi — nuotano negli oceani da oltre 400 milioni di anni.", "de": "Haie sind älter als Bäume — sie durchschwimmen die Ozeane seit über 400 Millionen Jahren.", "ro": "Rechinii sunt mai vechi decât copacii — înoată în oceane de peste 400 de milioane de ani."}, "Earth before forests.": {"fr": "La Terre avant les forêts.", "it": "La Terra prima delle foreste.", "de": "Die Erde vor den Wäldern.", "ro": "Pământul înainte de păduri."}, "Wombats produce cube-shaped droppings — the only animal known to make cubes.": {"fr": "Les wombats produisent des crottes en forme de cube — le seul animal connu à faire des cubes.", "it": "I vombati producono escrementi a forma di cubo — l'unico animale noto a fare cubi.", "de": "Wombats produzieren würfelförmigen Kot — das einzige bekannte Tier, das Würfel macht.", "ro": "Vombații produc excremente în formă de cub — singurul animal cunoscut care face cuburi."}, "The clever gut that shapes cubes.": {"fr": "L'intestin malin qui façonne des cubes.", "it": "L'intestino astuto che modella cubi.", "de": "Der clevere Darm, der Würfel formt.", "ro": "Intestinul iscusit care modelează cuburi."}, "Honey never spoils — sealed pots in ancient Egyptian tombs were still edible after 3,000 years.": {"fr": "Le miel ne se gâte jamais — des pots scellés dans des tombes de l'Égypte ancienne étaient encore comestibles après 3 000 ans.", "it": "Il miele non si guasta mai — vasi sigillati in antiche tombe egizie erano ancora commestibili dopo 3.000 anni.", "de": "Honig verdirbt nie — versiegelte Töpfe in altägyptischen Gräbern waren nach 3.000 Jahren noch essbar.", "ro": "Mierea nu se strică niciodată — vase sigilate în morminte egiptene antice erau încă comestibile după 3.000 de ani."}, "Nature's near-eternal food.": {"fr": "L'aliment presque éternel de la nature.", "it": "Il cibo quasi eterno della natura.", "de": "Das fast ewige Nahrungsmittel der Natur.", "ro": "Alimentul aproape etern al naturii."}, "Bananas are berries, botanically — but strawberries are not.": {"fr": "Les bananes sont des baies, botaniquement — mais pas les fraises.", "it": "Le banane sono bacche, dal punto di vista botanico — ma le fragole no.", "de": "Bananen sind botanisch Beeren — Erdbeeren aber nicht.", "ro": "Bananele sunt bace, din punct de vedere botanic — dar căpșunile nu."}, "Botany breaks our intuitions.": {"fr": "La botanique bouscule nos intuitions.", "it": "La botanica smentisce le nostre intuizioni.", "de": "Botanik durchbricht unsere Intuitionen.", "ro": "Botanica ne contrazice intuițiile."}, "A group of flamingos is called a 'flamboyance'.": {"fr": "Un groupe de flamants roses s'appelle une « flamboyance ».", "it": "Un gruppo di fenicotteri si chiama «flamboyance».", "de": "Eine Gruppe von Flamingos heißt „Flamboyance”.", "ro": "Un grup de flamingi se numește „flamboyance”."}, "English at its most delightful.": {"fr": "L'anglais dans toute sa fantaisie.", "it": "L'inglese nella sua forma più deliziosa.", "de": "Englisch von seiner reizvollsten Seite.", "ro": "Engleza în forma sa cea mai încântătoare."}, "Your brain is about 2% of your body weight but uses around 20% of your energy.": {"fr": "Votre cerveau représente environ 2 % de votre poids corporel mais utilise environ 20 % de votre énergie.", "it": "Il cervello è circa il 2% del peso corporeo ma usa circa il 20% dell'energia.", "de": "Dein Gehirn macht etwa 2 % deines Körpergewichts aus, verbraucht aber rund 20 % deiner Energie.", "ro": "Creierul tău reprezintă circa 2% din greutatea corpului, dar folosește aproximativ 20% din energie."}, "A small, hungry organ.": {"fr": "Un petit organe affamé.", "it": "Un piccolo organo affamato.", "de": "Ein kleines, hungriges Organ.", "ro": "Un organ mic și flămând."}, "The first computer 'bug' was a real moth, found stuck in a relay in 1947.": {"fr": "Le premier « bug » informatique était un vrai papillon de nuit, trouvé coincé dans un relais en 1947.", "it": "Il primo «bug» informatico fu una vera falena, trovata incastrata in un relè nel 1947.", "de": "Der erste Computer-„Bug” war eine echte Motte, 1947 in einem Relais gefunden.", "ro": "Primul „bug” de computer a fost o molie reală, găsită blocată într-un releu în 1947."}, "Where the word came from.": {"fr": "D'où vient le mot.", "it": "Da dove viene la parola.", "de": "Woher das Wort stammt.", "ro": "De unde vine cuvântul."}, "The first programmer was Ada Lovelace, who wrote an algorithm a century before computers existed.": {"fr": "La première programmeuse fut Ada Lovelace, qui écrivit un algorithme un siècle avant l'existence des ordinateurs.", "it": "La prima programmatrice fu Ada Lovelace, che scrisse un algoritmo un secolo prima che esistessero i computer.", "de": "Die erste Programmiererin war Ada Lovelace, die ein Jahrhundert vor den Computern einen Algorithmus schrieb.", "ro": "Prima programatoare a fost Ada Lovelace, care a scris un algoritm cu un secol înainte să existe computerele."}, "Code before the machine.": {"fr": "Du code avant la machine.", "it": "Codice prima della macchina.", "de": "Code vor der Maschine.", "ro": "Cod înainte de mașină."}, "The term 'debugging' predates electronic computers — engineers literally removed insects from machines.": {"fr": "Le terme « débogage » est antérieur aux ordinateurs électroniques — les ingénieurs retiraient littéralement des insectes des machines.", "it": "Il termine «debugging» è precedente ai computer elettronici — gli ingegneri toglievano letteralmente insetti dalle macchine.", "de": "Der Begriff „Debugging” ist älter als elektronische Computer — Ingenieure entfernten buchstäblich Insekten aus Maschinen.", "ro": "Termenul „debugging” este anterior computerelor electronice — inginerii scoteau la propriu insecte din mașini."}, "From moths to merge conflicts.": {"fr": "Des papillons de nuit aux conflits de fusion.", "it": "Dalle falene ai conflitti di merge.", "de": "Von Motten zu Merge-Konflikten.", "ro": "De la molii la conflicte de merge."}, "A golf ball has around 336 dimples — they cut drag and let it fly nearly twice as far.": {"fr": "Une balle de golf compte environ 336 alvéoles — elles réduisent la traînée et lui permettent de voler presque deux fois plus loin.", "it": "Una pallina da golf ha circa 336 fossette — riducono la resistenza e la fanno volare quasi il doppio.", "de": "Ein Golfball hat etwa 336 Dellen — sie verringern den Luftwiderstand und lassen ihn fast doppelt so weit fliegen.", "ro": "O minge de golf are circa 336 de adâncituri — reduc rezistența și o fac să zboare aproape de două ori mai departe."}, "Why smooth balls fly worse.": {"fr": "Pourquoi les balles lisses volent moins bien.", "it": "Perché le palline lisce volano peggio.", "de": "Warum glatte Bälle schlechter fliegen.", "ro": "De ce mingile netede zboară mai prost."}, "The Olympic flame is lit months ahead by the Sun's rays in Olympia, Greece.": {"fr": "La flamme olympique est allumée des mois à l'avance par les rayons du Soleil à Olympie, en Grèce.", "it": "La fiamma olimpica viene accesa mesi prima dai raggi del Sole a Olimpia, in Grecia.", "de": "Die olympische Flamme wird Monate vorher von den Sonnenstrahlen in Olympia, Griechenland, entzündet.", "ro": "Flacăra olimpică este aprinsă cu luni înainte de razele Soarelui la Olympia, în Grecia."}, "Fire with no match.": {"fr": "Du feu sans allumette.", "it": "Fuoco senza fiammifero.", "de": "Feuer ohne Streichholz.", "ro": "Foc fără chibrit."}, "Minecraft, the best-selling video game of all time, has sold over 300 million copies.": {"fr": "Minecraft, le jeu vidéo le plus vendu de tous les temps, s'est écoulé à plus de 300 millions d'exemplaires.", "it": "Minecraft, il videogioco più venduto di sempre, ha venduto oltre 300 milioni di copie.", "de": "Minecraft, das meistverkaufte Videospiel aller Zeiten, wurde über 300 Millionen Mal verkauft.", "ro": "Minecraft, cel mai bine vândut joc video din toate timpurile, s-a vândut în peste 300 de milioane de exemplare."}, "A world built of blocks.": {"fr": "Un monde bâti en blocs.", "it": "Un mondo fatto di blocchi.", "de": "Eine Welt aus Blöcken.", "ro": "O lume construită din blocuri."}, "'Tetris' was created in 1984 by a Soviet researcher — and nearly got tangled in Cold-War licensing fights.": {"fr": "« Tetris » fut créé en 1984 par un chercheur soviétique — et faillit s'enliser dans des batailles de licences en pleine guerre froide.", "it": "«Tetris» fu creato nel 1984 da un ricercatore sovietico — e rischiò di impigliarsi in dispute sulle licenze durante la Guerra Fredda.", "de": "„Tetris” wurde 1984 von einem sowjetischen Forscher erschaffen — und verhedderte sich fast in Lizenzstreitigkeiten des Kalten Krieges.", "ro": "„Tetris” a fost creat în 1984 de un cercetător sovietic — și aproape s-a încurcat în dispute de licență din Războiul Rece."}, "The blocks behind the Iron Curtain.": {"fr": "Les blocs derrière le rideau de fer.", "it": "I blocchi dietro la cortina di ferro.", "de": "Die Blöcke hinter dem Eisernen Vorhang.", "ro": "Blocurile din spatele Cortinei de Fier."}, "The world's first speeding ticket (1896) was for going 8 mph in a 2 mph zone.": {"fr": "La toute première amende pour excès de vitesse au monde (1896) visait une allure de 8 mph dans une zone limitée à 2 mph.", "it": "La prima multa per eccesso di velocità al mondo (1896) fu per 8 mph in una zona limitata a 2 mph.", "de": "Der weltweit erste Strafzettel fürs Rasen (1896) erging für 8 mph in einer 2-mph-Zone.", "ro": "Prima amendă pentru viteză din lume (1896) a fost pentru 8 mph într-o zonă limitată la 2 mph."}, "Fast, by Victorian standards.": {"fr": "Rapide, selon les normes victoriennes.", "it": "Veloce, per gli standard vittoriani.", "de": "Schnell, nach viktorianischen Maßstäben.", "ro": "Rapid, după standardele victoriene."}, "Formula 1 cars can brake so hard the driver feels up to 5 G — five times their body weight.": {"fr": "Les voitures de Formule 1 freinent si fort que le pilote ressent jusqu'à 5 G — cinq fois son poids.", "it": "Le auto di Formula 1 frenano così forte che il pilota sente fino a 5 G — cinque volte il suo peso.", "de": "Formel-1-Autos bremsen so stark, dass der Fahrer bis zu 5 G spürt — das Fünffache seines Körpergewichts.", "ro": "Mașinile de Formula 1 frânează atât de puternic încât pilotul simte până la 5 G — de cinci ori greutatea sa."}, "Stopping is the hard part.": {"fr": "C'est s'arrêter qui est difficile.", "it": "La parte difficile è fermarsi.", "de": "Das Anhalten ist das Schwierige.", "ro": "Partea grea e oprirea."}, "Carrots were mostly purple until Dutch growers bred orange ones in the 1600s.": {"fr": "Les carottes étaient surtout violettes jusqu'à ce que des cultivateurs néerlandais créent les oranges au XVIIᵉ siècle.", "it": "Le carote erano per lo più viola finché coltivatori olandesi non crearono quelle arancioni nel Seicento.", "de": "Karotten waren meist violett, bis niederländische Züchter im 17. Jahrhundert orange Sorten heranzogen.", "ro": "Morcovii erau în mare parte violet până când cultivatori olandezi au creat soiuri portocalii în anii 1600."}, "A vegetable's makeover.": {"fr": "La métamorphose d'un légume.", "it": "Il restyling di un ortaggio.", "de": "Die Verwandlung eines Gemüses.", "ro": "Transformarea unei legume."}, "Apples float because about a quarter of their volume is air.": {"fr": "Les pommes flottent parce qu'environ un quart de leur volume est de l'air.", "it": "Le mele galleggiano perché circa un quarto del loro volume è aria.", "de": "Äpfel schwimmen, weil etwa ein Viertel ihres Volumens Luft ist.", "ro": "Merele plutesc pentru că aproximativ un sfert din volumul lor este aer."}, "Why bobbing for apples works.": {"fr": "Pourquoi la pêche aux pommes fonctionne.", "it": "Perché funziona il gioco delle mele nell'acqua.", "de": "Warum Apfeltauchen funktioniert.", "ro": "De ce funcționează pescuitul merelor."}, "In Switzerland it is illegal to keep just one guinea pig — they're considered social animals.": {"fr": "En Suisse, il est illégal de n'avoir qu'un seul cochon d'Inde — ils sont considérés comme des animaux sociaux.", "it": "In Svizzera è illegale tenere un solo porcellino d'India — sono considerati animali sociali.", "de": "In der Schweiz ist es verboten, nur ein einziges Meerschweinchen zu halten — sie gelten als soziale Tiere.", "ro": "În Elveția este ilegal să ții un singur porcușor de Guineea — sunt considerate animale sociale."}, "A law for lonely pets.": {"fr": "Une loi contre la solitude des animaux.", "it": "Una legge contro la solitudine degli animali.", "de": "Ein Gesetz gegen einsame Haustiere.", "ro": "O lege împotriva animalelor singuratice."}, "The oldest known written laws, the Code of Ur-Nammu, are over 4,000 years old.": {"fr": "Les plus anciennes lois écrites connues, le code d'Ur-Nammu, ont plus de 4 000 ans.", "it": "Le più antiche leggi scritte conosciute, il Codice di Ur-Nammu, hanno oltre 4.000 anni.", "de": "Die ältesten bekannten geschriebenen Gesetze, der Kodex von Ur-Nammu, sind über 4.000 Jahre alt.", "ro": "Cele mai vechi legi scrise cunoscute, Codul lui Ur-Nammu, au peste 4.000 de ani."}, "Justice in clay.": {"fr": "La justice dans l'argile.", "it": "Giustizia nell'argilla.", "de": "Gerechtigkeit in Ton.", "ro": "Dreptate în lut."}, "Russia spans 11 time zones — when it's morning at one end it's night at the other.": {"fr": "La Russie s'étend sur 11 fuseaux horaires — quand c'est le matin d'un côté, c'est la nuit de l'autre.", "it": "La Russia si estende su 11 fusi orari — quando è mattina da un lato è notte dall'altro.", "de": "Russland erstreckt sich über 11 Zeitzonen — wenn es an einem Ende Morgen ist, ist am anderen Nacht.", "ro": "Rusia se întinde pe 11 fuse orare — când la un capăt e dimineață, la celălalt e noapte."}, "A country the size of a continent.": {"fr": "Un pays grand comme un continent.", "it": "Un paese grande come un continente.", "de": "Ein Land so groß wie ein Kontinent.", "ro": "O țară cât un continent."}, "Greenland is mostly ice; the sagas say it was named 'green' to lure settlers.": {"fr": "Le Groenland est presque tout en glace ; les sagas disent qu'il fut nommé « vert » pour attirer des colons.", "it": "La Groenlandia è quasi tutta ghiaccio; le saghe dicono che fu chiamata «verde» per attirare i coloni.", "de": "Grönland besteht größtenteils aus Eis; den Sagas zufolge wurde es „grün” genannt, um Siedler zu locken.", "ro": "Groenlanda e aproape numai gheață; saga spun că a fost numită „verde” ca să atragă coloniști."}, "Perhaps the oldest marketing tale.": {"fr": "Peut-être la plus vieille histoire de marketing.", "it": "Forse la più antica trovata di marketing.", "de": "Vielleicht die älteste Marketing-Geschichte.", "ro": "Poate cea mai veche poveste de marketing."}, "Leonardo da Vinci could reportedly write with one hand while drawing with the other.": {"fr": "Léonard de Vinci pouvait, dit-on, écrire d'une main tout en dessinant de l'autre.", "it": "Si dice che Leonardo da Vinci sapesse scrivere con una mano mentre disegnava con l'altra.", "de": "Leonardo da Vinci konnte angeblich mit einer Hand schreiben, während er mit der anderen zeichnete.", "ro": "Se spune că Leonardo da Vinci putea scrie cu o mână în timp ce desena cu cealaltă."}, "A mind in two directions.": {"fr": "Un esprit dans deux directions.", "it": "Una mente in due direzioni.", "de": "Ein Geist in zwei Richtungen.", "ro": "O minte în două direcții."}, "The world's oldest known melody, the Hurrian Hymn, is about 3,400 years old.": {"fr": "La plus ancienne mélodie connue au monde, l'hymne hourrite, a environ 3 400 ans.", "it": "La melodia più antica conosciuta al mondo, l'Inno hurrita, ha circa 3.400 anni.", "de": "Die älteste bekannte Melodie der Welt, die hurritische Hymne, ist etwa 3.400 Jahre alt.", "ro": "Cea mai veche melodie cunoscută din lume, Imnul hurrit, are circa 3.400 de ani."}, "Music older than the alphabet.": {"fr": "Une musique plus ancienne que l'alphabet.", "it": "Musica più antica dell'alfabeto.", "de": "Musik, älter als das Alphabet.", "ro": "Muzică mai veche decât alfabetul."}, "A single modern container ship can carry over 20,000 steel boxes across the planet.": {"fr": "Un seul porte-conteneurs moderne peut transporter plus de 20 000 caisses d'acier à travers la planète.", "it": "Una sola portacontainer moderna può trasportare oltre 20.000 casse d'acciaio attraverso il pianeta.", "de": "Ein einziges modernes Containerschiff kann über 20.000 Stahlboxen über den Planeten transportieren.", "ro": "Un singur portcontainer modern poate transporta peste 20.000 de cutii de oțel pe planetă."}, "How almost everything moves.": {"fr": "Comment presque tout se déplace.", "it": "Come si muove quasi tutto.", "de": "Wie sich fast alles bewegt.", "ro": "Cum se mișcă aproape totul."}, "There are more possible games of chess than atoms in the observable universe.": {"fr": "Il existe plus de parties d'échecs possibles que d'atomes dans l'univers observable.", "it": "Esistono più partite di scacchi possibili che atomi nell'universo osservabile.", "de": "Es gibt mehr mögliche Schachpartien als Atome im beobachtbaren Universum.", "ro": "Există mai multe partide de șah posibile decât atomi în universul observabil."}, "Meet the giant 'Shannon number'.": {"fr": "Voici le gigantesque « nombre de Shannon ».", "it": "Ecco il gigantesco «numero di Shannon».", "de": "Hier ist die riesige „Shannon-Zahl”.", "ro": "Faceți cunoștință cu uriașul „număr al lui Shannon”."}, "A grove of aspens in Utah nicknamed 'Pando' is one organism sharing a single root system — among the oldest living things on Earth.": {"fr": "Un bosquet de trembles dans l'Utah surnommé « Pando » est un seul organisme partageant un même système racinaire — parmi les êtres vivants les plus anciens de la Terre.", "it": "Un bosco di pioppi tremuli nello Utah soprannominato «Pando» è un solo organismo che condivide un unico apparato radicale — tra gli esseri viventi più antichi della Terra.", "de": "Ein Espenhain in Utah mit dem Spitznamen „Pando” ist ein einziger Organismus mit einem gemeinsamen Wurzelsystem — eines der ältesten Lebewesen der Erde.", "ro": "Un crâng de plopi tremurători din Utah, poreclit „Pando”, este un singur organism cu un sistem radicular comun — printre cele mai vechi viețuitoare de pe Pământ."}, "A forest that is one tree.": {"fr": "Une forêt qui n'est qu'un seul arbre.", "it": "Una foresta che è un solo albero.", "de": "Ein Wald, der ein einziger Baum ist.", "ro": "O pădure care e un singur copac."}, "Bamboo can grow nearly a metre in a single day — the fastest-growing plant on Earth.": {"fr": "Le bambou peut pousser de près d'un mètre en une seule journée — la plante à la croissance la plus rapide sur Terre.", "it": "Il bambù può crescere quasi un metro in un solo giorno — la pianta a crescita più rapida sulla Terra.", "de": "Bambus kann an einem einzigen Tag fast einen Meter wachsen — die am schnellsten wachsende Pflanze der Erde.", "ro": "Bambusul poate crește aproape un metru într-o singură zi — cea mai rapid crescătoare plantă de pe Pământ."}, "Watch grass become timber.": {"fr": "Quand l'herbe devient du bois.", "it": "Quando l'erba diventa legno.", "de": "Wenn Gras zu Holz wird.", "ro": "Când iarba devine lemn."}, "A flami
