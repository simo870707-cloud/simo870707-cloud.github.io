<script>
/* How-To — additive page (tab 4). Self-localises EN/FR/IT/DE/RO. Includes a search
   bar that falls back to a web search. Does not modify any other tab or the i18n engine. */
(function(){
  var HOWTO=[{"icon": "🛠️", "bg": "#E9EFEA", "bd": "#CFE0D2", "rad": "20px", "name": ["Everyday Fixes", "Petits dépannages", "Rimedi di tutti i giorni", "Alltägliche Pannenhilfen", "Reparații de zi cu zi"], "blurb": ["The small household problems everyone meets — solved calmly, step by step.", "Les petits soucis domestiques que tout le monde rencontre — réglés calmement, étape par étape.", "I piccoli problemi domestici che capitano a tutti — risolti con calma, passo dopo passo.", "Die kleinen Haushaltsprobleme, die jeder kennt — ruhig und Schritt für Schritt gelöst.", "Micile probleme casnice pe care le întâlnește oricine — rezolvate calm, pas cu pas."], "topics": [{"icon": "🌬️", "t": ["How to get rid of odours", "Comment éliminer les odeurs", "Come eliminare i cattivi odori", "Wie man Gerüche loswird", "Cum scapi de mirosuri"], "b": ["Odours linger because the source is still there, so start by finding and removing it — old food, a damp cloth, a forgotten bin. Open windows for a few minutes of cross-ventilation, then let bowls of baking soda, white vinegar or activated charcoal quietly absorb what's left over a day or two. Wash the soft things that hold smells — cushions, curtains, pet bedding — and resist simply spraying over the smell, which fades fast and solves nothing.", "Les odeurs persistent parce que la source est toujours là : commencez par la trouver et l'éliminer — aliment oublié, chiffon humide, poubelle pleine. Aérez quelques minutes en courant d'air, puis laissez des bols de bicarbonate, de vinaigre blanc ou de charbon actif absorber le reste pendant un jour ou deux. Lavez les textiles qui retiennent les odeurs — coussins, rideaux, panier de l'animal — et évitez de simplement vaporiser par-dessus, ce qui s'estompe vite sans rien régler.", "Gli odori restano perché la fonte è ancora lì: comincia col trovarla ed eliminarla — cibo vecchio, un panno umido, un bidone dimenticato. Apri le finestre per qualche minuto di ventilazione incrociata, poi lascia che ciotole di bicarbonato, aceto bianco o carbone attivo assorbano il resto in un giorno o due. Lava i tessili che trattengono gli odori — cuscini, tende, cuccia — ed evita di limitarti a spruzzare profumo sopra, che svanisce in fretta senza risolvere nulla.", "Gerüche bleiben, weil die Quelle noch da ist — finde und entferne sie zuerst: altes Essen, ein feuchtes Tuch, ein vergessener Mülleimer. Lüfte ein paar Minuten quer durch, dann lass Schalen mit Natron, weißem Essig oder Aktivkohle den Rest in ein bis zwei Tagen aufnehmen. Wasche die Textilien, die Gerüche festhalten — Kissen, Vorhänge, Tierdecken — und übersprühe den Geruch nicht einfach, das verfliegt schnell und löst nichts.", "Mirosurile persistă pentru că sursa e încă acolo, așa că întâi găsește-o și înlătur-o — mâncare veche, o cârpă umedă, un coș uitat. Aerisește câteva minute în curent, apoi lasă boluri cu bicarbonat, oțet alb sau cărbune activ să absoarbă restul într-o zi-două. Spală textilele care rețin mirosuri — perne, perdele, culcușul animalului — și nu te mulțumi să pulverizezi peste miros, fiindcă se disipă repede și nu rezolvă nimic."]}, {"icon": "🪰", "t": ["How to deal with fruit flies", "Comment se débarrasser des moucherons", "Come liberarsi dei moscerini della frutta", "Wie man Fruchtfliegen loswird", "Cum scapi de muștele de fructe"], "b": ["Fruit flies breed in ripe produce, damp drains and recycling, so the lasting fix is to remove the breeding sites first. Keep fruit in the fridge, take out food waste often, and rinse bottles and jars before they go in the recycling. To catch the adults, set a simple trap: a glass with a little cider vinegar and a drop of dish soap, covered with pierced cling film — they go in but can't get out.", "Les moucherons se reproduisent dans les fruits mûrs, les siphons humides et le tri : la solution durable est d'abord d'éliminer ces foyers. Gardez les fruits au frais, sortez souvent les déchets alimentaires et rincez bouteilles et bocaux avant de les recycler. Pour piéger les adultes, fabriquez un piège simple : un verre avec un peu de vinaigre de cidre et une goutte de liquide vaisselle, couvert d'un film percé — ils entrent mais ne ressortent plus.", "I moscerini si riproducono in frutta matura, scarichi umidi e raccolta differenziata, perciò la soluzione duratura è eliminare prima questi focolai. Tieni la frutta in frigo, butta spesso i rifiuti organici e sciacqua bottiglie e barattoli prima di riciclarli. Per catturare gli adulti, prepara una trappola semplice: un bicchiere con un po' di aceto di mele e una goccia di detersivo, coperto da pellicola bucherellata — entrano ma non escono.", "Fruchtfliegen vermehren sich in reifem Obst, feuchten Abflüssen und im Altglas — die dauerhafte Lösung ist, diese Brutstätten zuerst zu beseitigen. Bewahre Obst im Kühlschrank auf, bring Biomüll oft hinaus und spüle Flaschen und Gläser vor dem Recycling aus. Um die Tiere zu fangen, stell eine einfache Falle: ein Glas mit etwas Apfelessig und einem Tropfen Spülmittel, abgedeckt mit durchlöcherter Folie — sie kommen hinein, aber nicht mehr heraus.", "Muștele de fructe se înmulțesc în fructe coapte, scurgeri umede și reciclare, așa că soluția durabilă e să elimini întâi aceste focare. Ține fructele la frigider, scoate des resturile alimentare și clătește sticlele și borcanele înainte de reciclare. Ca să prinzi adulții, fă o capcană simplă: un pahar cu puțin oțet de mere și un strop de detergent, acoperit cu folie găurită — intră, dar nu mai ies."]}, {"icon": "🧼", "t": ["How to remove mould", "Comment éliminer la moisissure", "Come eliminare la muffa", "Wie man Schimmel entfernt", "Cum elimini mucegaiul"], "b": ["Mould grows wherever moisture sits, so airflow and drying are the real cure, not just scrubbing. On small hard-surface patches, wear gloves, open a window, and clean with warm water and detergent or with white vinegar, then dry thoroughly. Most importantly, fix the cause — a leak, poor ventilation, or laundry drying indoors — or it will return. For large areas, or any black mould over about one square metre, call a professional rather than disturbing it yourself.", "La moisissure pousse là où l'humidité stagne : la vraie solution, c'est l'aération et le séchage, pas seulement le frottage. Sur de petites zones dures, portez des gants, ouvrez une fenêtre et nettoyez à l'eau chaude savonneuse ou au vinaigre blanc, puis séchez bien. Surtout, corrigez la cause — une fuite, une mauvaise ventilation, du linge qui sèche à l'intérieur — sinon elle reviendra. Pour de grandes surfaces, ou toute moisissure noire de plus d'un mètre carré, faites appel à un professionnel plutôt que d'y toucher.", "La muffa cresce dove ristagna l'umidità, quindi la vera cura è l'aria e l'asciugatura, non solo lo sfregamento. Su piccole zone dure indossa i guanti, apri una finestra e pulisci con acqua calda e detersivo o con aceto bianco, poi asciuga bene. Soprattutto, elimina la causa — una perdita, scarsa ventilazione, panni stesi in casa — altrimenti tornerà. Per superfici ampie, o qualsiasi muffa nera oltre circa un metro quadro, chiama un professionista invece di toccarla.", "Schimmel wächst, wo Feuchtigkeit steht — die echte Lösung sind Luft und Trocknung, nicht nur Schrubben. Trage bei kleinen Stellen auf harten Flächen Handschuhe, öffne ein Fenster und reinige mit warmem Wasser und Spülmittel oder mit weißem Essig, dann gründlich trocknen. Vor allem: beseitige die Ursache — ein Leck, schlechte Lüftung, Wäsche im Raum — sonst kommt er wieder. Bei großen Flächen oder schwarzem Schimmel über etwa einem Quadratmeter hol einen Fachmann, statt selbst daran zu hantieren.", "Mucegaiul crește unde stă umezeala, așa că adevăratul remediu sunt aerisirea și uscarea, nu doar frecatul. Pe pete mici, pe suprafețe dure, pune mănuși, deschide o fereastră și curăță cu apă caldă și detergent sau cu oțet alb, apoi usucă bine. Cel mai important, elimină cauza — o scurgere, ventilație slabă, rufe uscate în casă — altfel revine. Pentru suprafețe mari sau orice mucegai negru de peste un metru pătrat, cheamă un profesionist în loc să-l deranjezi singur."]}, {"icon": "🚰", "t": ["How to unclog a drain", "Comment déboucher une canalisation", "Come sturare uno scarico", "Wie man einen Abfluss frei macht", "Cum desfunzi o scurgere"], "b": ["Most slow drains are blocked near the opening by hair, grease or soap, so you rarely need harsh chemicals — they damage pipes over time and seldom beat a good clear-out. Start with a plunger, then try baking soda followed by hot vinegar and boiling water, or a drain snake to hook out the clog. If water is backing up across several drains at once, the blockage is deeper and worth a plumber's visit.", "La plupart des écoulements lents sont bouchés près de l'orifice par des cheveux, de la graisse ou du savon : inutile, le plus souvent, d'utiliser des produits agressifs, qui abîment les tuyaux et règlent rarement mieux le problème. Commencez par une ventouse, puis essayez le bicarbonate suivi de vinaigre chaud et d'eau bouillante, ou un furet pour accrocher le bouchon. Si l'eau remonte dans plusieurs évacuations à la fois, le bouchon est plus profond et mérite l'intervention d'un plombier.", "La maggior parte degli scarichi lenti è ostruita vicino all'apertura da capelli, grasso o sapone, perciò raramente servono prodotti aggressivi — rovinano i tubi nel tempo e di rado superano una buona pulizia. Inizia con lo sturalavandini, poi prova bicarbonato seguito da aceto caldo e acqua bollente, o un furetto per agganciare il tappo. Se l'acqua risale da più scarichi insieme, l'ostruzione è più profonda e conviene chiamare un idraulico.", "Die meisten langsamen Abflüsse sind nahe der Öffnung durch Haare, Fett oder Seife verstopft — scharfe Chemie brauchst du selten, sie schadet den Rohren und schlägt selten eine gute Reinigung. Beginne mit einem Pümpel, dann probiere Natron mit heißem Essig und kochendem Wasser oder eine Rohrspirale, um den Pfropf herauszuziehen. Staut sich Wasser in mehreren Abflüssen gleichzeitig, sitzt die Verstopfung tiefer und gehört einem Klempner.", "Majoritatea scurgerilor lente sunt blocate lângă deschidere de păr, grăsime sau săpun, așa că rar ai nevoie de chimicale dure — strică țevile în timp și rar bat o curățare bună. Începe cu o pompă (ventuză), apoi încearcă bicarbonat urmat de oțet fierbinte și apă clocotită, sau o sârmă-spirală ca să scoți dopul. Dacă apa dă pe afară la mai multe scurgeri deodată, blocajul e mai adânc și merită un instalator."], "steps": [["Remove the plug and clear visible hair and gunk.", "Retirez la bonde et enlevez cheveux et dépôts visibles.", "Togli il tappo e rimuovi capelli e residui visibili.", "Entferne den Stöpsel und sichtbare Haare und Reste.", "Scoate dopul și înlătură părul și depunerile vizibile."], ["Plunge firmly and steadily several times.", "Pompez fermement et régulièrement plusieurs fois.", "Spingi con lo sturalavandini più volte, deciso e costante.", "Pümpel mehrmals fest und gleichmäßig betätigen.", "Pompează ferm și constant de mai multe ori."], ["Pour baking soda, then hot vinegar; wait 10 minutes.", "Versez du bicarbonate, puis du vinaigre chaud ; attendez 10 minutes.", "Versa bicarbonato, poi aceto caldo; attendi 10 minuti.", "Natron einfüllen, dann heißen Essig; 10 Minuten warten.", "Toarnă bicarbonat, apoi oțet fierbinte; așteaptă 10 minute."], ["Flush with boiling water; repeat or use a snake if needed.", "Rincez à l'eau bouillante ; répétez ou utilisez un furet si besoin.", "Risciacqua con acqua bollente; ripeti o usa un furetto se serve.", "Mit kochendem Wasser spülen; bei Bedarf wiederholen oder Spirale nutzen.", "Clătește cu apă clocotită; repetă sau folosește o sârmă dacă e nevoie."]]}, {"icon": "🪟", "t": ["How to stop condensation on windows", "Comment éviter la condensation sur les fenêtres", "Come evitare la condensa sulle finestre", "Wie man Kondenswasser an Fenstern verhindert", "Cum oprești condensul pe geamuri"], "b": ["Condensation forms when warm, humid indoor air meets cold glass, so the cure is less moisture and more airflow. Ventilate daily, run extractor fans while cooking and showering, and keep lids on pans and laundry off the radiators. In damp rooms a dehumidifier or moisture absorber helps, and leaving trickle vents open or a window slightly ajar overnight makes a real difference. Wipe sills dry each morning so the moisture can't feed mould.", "La condensation se forme quand l'air intérieur chaud et humide rencontre le verre froid : la solution, c'est moins d'humidité et plus d'air. Aérez chaque jour, faites tourner la VMC en cuisinant et en vous douchant, couvrez les casseroles et ne séchez pas le linge sur les radiateurs. Dans les pièces humides, un déshumidificateur ou un absorbeur aide, et laisser les grilles d'aération ouvertes ou une fenêtre entrebâillée la nuit change vraiment les choses. Essuyez les rebords chaque matin pour que l'humidité ne nourrisse pas la moisissure.", "La condensa si forma quando l'aria interna calda e umida incontra il vetro freddo, quindi la cura è meno umidità e più aria. Arieggia ogni giorno, usa le cappe quando cucini e fai la doccia, copri le pentole e non asciugare i panni sui termosifoni. Nelle stanze umide aiutano un deumidificatore o un assorbiumidità, e lasciare le griglie aperte o una finestra socchiusa di notte fa davvero la differenza. Asciuga i davanzali ogni mattina così l'umidità non alimenta la muffa.", "Kondenswasser entsteht, wenn warme, feuchte Raumluft auf kaltes Glas trifft — die Lösung ist weniger Feuchte und mehr Luft. Lüfte täglich, nutze Abzugshauben beim Kochen und Duschen, decke Töpfe ab und trockne Wäsche nicht auf Heizkörpern. In feuchten Räumen helfen ein Entfeuchter oder Feuchtigkeitsbinder, und offene Lüftungsschlitze oder ein nachts leicht gekipptes Fenster bringen viel. Wische die Fensterbänke morgens trocken, damit die Feuchte keinen Schimmel nährt.", "Condensul se formează când aerul cald și umed din casă întâlnește geamul rece, așa că remediul e mai puțină umezeală și mai mult aer. Aerisește zilnic, pornește hotele când gătești și faci duș, pune capace pe oale și nu usca rufele pe calorifere. În camerele umede ajută un dezumidificator sau un absorbant de umiditate, iar fantele de aerisire deschise sau o fereastră întredeschisă noaptea schimbă mult. Șterge pervazurile în fiecare dimineață ca umezeala să nu hrănească mucegaiul."]}, {"icon": "🔌", "t": ["How to handle common appliance problems", "Comment régler les pannes d'électroménager courantes", "Come affrontare i problemi comuni degli elettrodomestici", "Wie man häufige Geräteprobleme behebt", "Cum rezolvi problemele frecvente ale electrocasnicelor"], "b": ["Before calling for repair, check the simple things first: the power, the plug, the fuse, the filters, and a door that isn't fully closed. A fridge that won't cool may only need its coils cleaned; a washing machine that won't drain often has a blocked filter or a kinked hose. Always switch off and unplug before you inspect anything, and look up your model's manual — many faults have a quick, safe fix. If it involves opening a sealed unit, gas or fixed wiring, stop and call a qualified technician.", "Avant d'appeler un réparateur, vérifiez d'abord les évidences : l'alimentation, la prise, le fusible, les filtres et une porte mal fermée. Un frigo qui ne refroidit plus n'a parfois besoin que d'un nettoyage de ses serpentins ; un lave-linge qui ne vidange pas a souvent un filtre bouché ou un tuyau plié. Éteignez et débranchez toujours avant d'inspecter quoi que ce soit, et consultez la notice de votre modèle — beaucoup de pannes se règlent vite et sans danger. Si cela touche un appareil scellé, le gaz ou l'installation fixe, arrêtez-vous et appelez un professionnel qualifié.", "Prima di chiamare l'assistenza, controlla le cose semplici: corrente, spina, fusibile, filtri e uno sportello non chiuso bene. Un frigo che non raffredda a volte ha solo bisogno della pulizia delle serpentine; una lavatrice che non scarica spesso ha il filtro intasato o un tubo piegato. Spegni e stacca sempre la spina prima di ispezionare, e consulta il manuale del modello — molti guasti hanno una soluzione rapida e sicura. Se serve aprire un'unità sigillata, toccare il gas o l'impianto fisso, fermati e chiama un tecnico qualificato.", "Bevor du den Reparaturdienst rufst, prüfe zuerst das Einfache: Strom, Stecker, Sicherung, Filter und eine nicht ganz geschlossene Tür. Ein Kühlschrank, der nicht kühlt, braucht oft nur gereinigte Kühlschlangen; eine Waschmaschine, die nicht abpumpt, hat häufig einen verstopften Filter oder geknickten Schlauch. Schalte immer aus und zieh den Stecker, bevor du etwas untersuchst, und schau ins Handbuch deines Modells — viele Fehler haben eine schnelle, sichere Lösung. Geht es um ein versiegeltes Gerät, Gas oder die Festinstallation, hör auf und ruf eine Fachkraft.", "Înainte să chemi un service, verifică întâi lucrurile simple: curentul, ștecherul, siguranța, filtrele și o ușă neînchisă complet. Un frigider care nu răcește are uneori nevoie doar de curățarea serpentinelor; o mașină de spălat care nu evacuează are adesea filtrul înfundat sau furtunul îndoit. Oprește mereu și scoate din priză înainte să inspectezi ceva și caută manualul modelului — multe defecte au o rezolvare rapidă și sigură. Dacă presupune deschiderea unei unități sigilate, gaz sau instalația fixă, oprește-te și cheamă un tehnician calificat."]}, {"icon": "🐜", "t": ["How to prevent pest infestations", "Comment prévenir les infestations de nuisibles", "Come prevenire le infestazioni di parassiti", "Wie man Schädlingsbefall vorbeugt", "Cum previi infestările cu dăunători"], "b": ["Pests come for food, water and shelter, so deny all three and most never settle in. Store food in sealed containers, fix drips and clear standing water, and seal the cracks and gaps around pipes, skirting, doors and windows. Keep bins closed and clean, and don't leave pet food out overnight. Deal with the first few insects or droppings early — prevention is far easier and cheaper than clearing an established infestation.", "Les nuisibles viennent pour la nourriture, l'eau et l'abri : privez-les des trois et la plupart ne s'installeront pas. Conservez les aliments dans des contenants hermétiques, réparez les fuites et éliminez l'eau stagnante, et calfeutrez fissures et interstices autour des tuyaux, plinthes, portes et fenêtres. Gardez les poubelles fermées et propres, et ne laissez pas la gamelle de l'animal dehors la nuit. Traitez tôt les premiers insectes ou crottes — prévenir est bien plus simple et économique que de venir à bout d'une infestation installée.", "I parassiti cercano cibo, acqua e riparo: negali tutti e tre e la maggior parte non si insedia. Conserva il cibo in contenitori ermetici, ripara le perdite ed elimina l'acqua stagnante, e sigilla crepe e fessure attorno a tubi, battiscopa, porte e finestre. Tieni i bidoni chiusi e puliti e non lasciare fuori il cibo degli animali di notte. Affronta presto i primi insetti o escrementi — prevenire è molto più facile ed economico che debellare un'infestazione consolidata.", "Schädlinge kommen wegen Nahrung, Wasser und Unterschlupf — verwehre alle drei, und die meisten siedeln sich gar nicht erst an. Lagere Lebensmittel in dichten Behältern, behebe Tropfstellen und beseitige stehendes Wasser, und dichte Risse und Spalten an Rohren, Sockelleisten, Türen und Fenstern ab. Halte Mülleimer geschlossen und sauber und lass Tierfutter nachts nicht stehen. Geh gegen die ersten Insekten oder Spuren früh vor — Vorbeugen ist viel leichter und günstiger als ein gefestigter Befall.", "Dăunătorii vin pentru hrană, apă și adăpost, așa că refuză-le toate trei și cei mai mulți nu se instalează. Păstrează mâncarea în recipiente etanșe, repară picurările și înlătură apa stătută și etanșează crăpăturile și golurile din jurul țevilor, plintelor, ușilor și ferestrelor. Ține coșurile închise și curate și nu lăsa hrana animalelor afară peste noapte. Ocupă-te din timp de primele insecte sau urme — prevenirea e mult mai ușoară și mai ieftină decât eliminarea unei infestări instalate."]}, {"icon": "🚪", "t": ["How to silence a squeaky hinge", "Comment faire taire une charnière qui grince", "Come zittire un cardine che cigola", "Wie man ein quietschendes Scharnier zum Schweigen bringt", "Cum reduci scârțâitul unei balamale"], "b": ["A squeak comes from metal rubbing dry metal, so the cure is lubrication. Swing the door back and forth a few times, then apply a little oil, petroleum jelly or even a rub of bar soap to the hinge pin and the points where it pivots. For a deeper fix, lift the pin out, wipe it, coat it lightly and slide it back. Open and close the door several times to work the lubricant in, then wipe away anything that drips.", "Un grincement vient du métal qui frotte contre du métal sec : le remède est la lubrification. Faites jouer la porte d'avant en arrière, puis appliquez un peu d'huile, de vaseline ou même un trait de savon sur l'axe de la charnière et les points de pivot. Pour un résultat durable, retirez l'axe, essuyez-le, enduisez-le légèrement et remettez-le. Ouvrez et fermez la porte plusieurs fois pour répartir le lubrifiant, puis essuyez ce qui coule.", "Il cigolio nasce dal metallo che sfrega contro metallo asciutto: il rimedio è la lubrificazione. Muovi la porta avanti e indietro, poi applica un po' d'olio, vaselina o persino una passata di sapone sul perno del cardine e nei punti in cui ruota. Per un risultato duraturo, sfila il perno, puliscilo, ungilo leggermente e rimettilo. Apri e chiudi la porta più volte per distribuire il lubrificante, poi asciuga ciò che cola.", "Ein Quietschen entsteht, wenn Metall auf trockenem Metall reibt — die Lösung ist Schmierung. Beweg die Tür ein paar Mal hin und her, dann gib etwas Öl, Vaseline oder sogar etwas Seife auf den Scharnierstift und die Drehpunkte. Für eine gründliche Lösung zieh den Stift heraus, wisch ihn ab, trag dünn etwas auf und schieb ihn zurück. Öffne und schließe die Tür mehrmals, damit sich das Mittel verteilt, und wisch ab, was heraustropft.", "Scârțâitul vine din metal care freacă pe metal uscat, așa că soluția este lubrifierea. Mișcă ușa înainte și înapoi de câteva ori, apoi pune puțin ulei, vaselină sau chiar o trecere de săpun pe axul balamalei și în punctele unde se rotește. Pentru o rezolvare temeinică, scoate axul, șterge-l, unge-l ușor și pune-l la loc. Deschide și închide ușa de mai multe ori ca să se distribuie lubrifiantul, apoi șterge ce picură."]}]}, {"icon": "🧰", "bg": "#F1E9DC", "bd": "#E2D2B9", "rad": "6px 22px 6px 22px", "name": ["Handy Skills Everyone Should Know", "Compétences utiles à connaître", "Abilità utili da conoscere", "Nützliche Fähigkeiten für alle", "Abilități utile pentru oricine"], "blurb": ["A few simple skills that save money, time and the odd emergency.", "Quelques savoir-faire simples qui font économiser argent, temps et bien des urgences.", "Poche abilità semplici che fanno risparmiare soldi, tempo e qualche emergenza.", "Ein paar einfache Fähigkeiten, die Geld, Zeit und manchen Notfall sparen.", "Câteva abilități simple care economisesc bani, timp și câte o urgență."], "topics": [{"icon": "🧵", "t": ["How to sew on a button", "Comment coudre un bouton", "Come attaccare un bottone", "Wie man einen Knopf annäht", "Cum coși un nasture"], "b": ["A re-sewn button takes about five minutes and saves a whole garment. Thread a needle with roughly 50 cm of thread, double it and knot the end, then come up through the fabric where the button belongs. Stitch up and down through the holes six to eight times, keeping it slightly loose, then wind the thread a few times around the threads beneath the button to form a small 'shank' so it sits well, and knot off underneath.", "Recoudre un bouton prend environ cinq minutes et sauve tout un vêtement. Enfilez une aiguille avec environ 50 cm de fil, doublez-le et faites un nœud au bout, puis remontez à travers le tissu à l'emplacement du bouton. Cousez de haut en bas par les trous six à huit fois, en gardant un peu de jeu, puis enroulez le fil quelques tours autour des brins sous le bouton pour former une petite « tige », et nouez par-dessous.", "Riattaccare un bottone richiede circa cinque minuti e salva un intero capo. Infila un ago con circa 50 cm di filo, raddoppialo e annoda l'estremità, poi risali dal tessuto dove va il bottone. Cuci su e giù nei fori sei-otto volte, lasciandolo un po' lento, poi avvolgi il filo qualche giro attorno ai fili sotto il bottone per formare un piccolo «gambo», e annoda sotto.", "Einen Knopf wieder anzunähen dauert etwa fünf Minuten und rettet ein ganzes Kleidungsstück. Fädle eine Nadel mit etwa 50 cm Faden ein, lege ihn doppelt und verknote das Ende, dann stich von unten durch den Stoff an der Knopfstelle. Nähe sechs- bis achtmal durch die Löcher, lass es leicht locker, wickle den Faden dann ein paar Mal um die Fäden unter dem Knopf zu einem kleinen „Hals” und verknote unten.", "Cusutul la loc al unui nasture durează cam cinci minute și salvează o haină întreagă. Înfilează un ac cu aproximativ 50 cm de ață, îndoaie firul și înnoadă capătul, apoi ieși prin material acolo unde stă nasturele. Coase în sus și în jos prin găuri de șase-opt ori, lăsându-l puțin lejer, apoi înfășoară firul de câteva ori în jurul firelor de sub nasture pentru un mic „picioruș”, și înnoadă pe dedesubt."], "steps": [["Thread the needle, double the thread and knot the end.", "Enfilez l'aiguille, doublez le fil et nouez le bout.", "Infila l'ago, raddoppia il filo e annoda l'estremità.", "Nadel einfädeln, Faden doppeln und Ende verknoten.", "Înfilează acul, dublează firul și înnoadă capătul."], ["Come up through the fabric and a buttonhole.", "Remontez à travers le tissu et un trou du bouton.", "Risali dal tessuto e da un foro del bottone.", "Von unten durch Stoff und ein Knopfloch stechen.", "Ieși prin material și printr-o gaură a nasturelui."], ["Stitch through the holes six to eight times.", "Cousez par les trous six à huit fois.", "Cuci nei fori sei-otto volte.", "Sechs- bis achtmal durch die Löcher nähen.", "Coase prin găuri de șase până la opt ori."], ["Wrap thread under the button, then knot and trim.", "Enroulez le fil sous le bouton, puis nouez et coupez.", "Avvolgi il filo sotto il bottone, poi annoda e taglia.", "Faden unter dem Knopf umwickeln, dann verknoten und abschneiden.", "Înfășoară firul sub nasture, apoi înnoadă și taie."]]}, {"icon": "🪚", "t": ["How to hang shelves", "Comment poser des étagères", "Come montare delle mensole", "Wie man Regale aufhängt", "Cum montezi rafturi"], "b": ["A shelf is only as safe as its fixings, so the wall matters as much as the bracket. Find the studs in a stud wall, or use the correct plugs for plasterboard, brick or concrete, and always check for hidden pipes and cables before you drill. Mark the holes with a spirit level so the shelf sits straight, choose brackets rated for the weight you'll load, and don't overfill — books are far heavier than they look.", "Une étagère ne vaut que ses fixations : le mur compte autant que l'équerre. Repérez les montants d'une cloison, ou utilisez les chevilles adaptées au placo, à la brique ou au béton, et vérifiez toujours l'absence de tuyaux et de câbles avant de percer. Tracez les trous au niveau à bulle pour que l'étagère soit droite, choisissez des équerres prévues pour la charge, et ne surchargez pas — les livres sont bien plus lourds qu'ils n'en ont l'air.", "Una mensola vale quanto i suoi fissaggi: il muro conta quanto la staffa. Trova i montanti in una parete in cartongesso, o usa i tasselli giusti per cartongesso, mattone o cemento, e controlla sempre tubi e cavi nascosti prima di forare. Segna i fori con una livella perché la mensola sia dritta, scegli staffe adatte al peso, e non sovraccaricare — i libri pesano molto più di quanto sembri.", "Ein Regal ist nur so sicher wie seine Befestigung — die Wand zählt so viel wie der Winkel. Finde die Ständer einer Trockenbauwand oder nimm die richtigen Dübel für Gipskarton, Ziegel oder Beton, und prüfe vor dem Bohren immer auf verborgene Rohre und Kabel. Markiere die Löcher mit der Wasserwaage, damit das Regal gerade sitzt, wähle Winkel passend zur Last, und überlade nicht — Bücher sind viel schwerer, als sie aussehen.", "Un raft e atât de sigur cât sunt fixările lui, așa că peretele contează la fel de mult ca suportul. Găsește montanții într-un perete de rigips sau folosește diblurile potrivite pentru rigips, cărămidă sau beton și verifică mereu țevile și cablurile ascunse înainte să găurești. Marchează găurile cu o nivelă ca raftul să stea drept, alege console potrivite greutății și nu supraîncărca — cărțile sunt mult mai grele decât par."]}, {"icon": "🩹", "t": ["How to patch small wall holes", "Comment reboucher de petits trous dans le mur", "Come tappare piccoli buchi nel muro", "Wie man kleine Wandlöcher spachtelt", "Cum astupi găuri mici în perete"], "b": ["Small nail and screw holes fill in minutes and disappear with a little care. Clean out any loose debris, then press filler or spackle in with a putty knife, leaving it very slightly proud of the surface, and let it dry fully. Sand it flush, wipe off the dust, and touch up with matching paint. Holes bigger than a coin need a self-adhesive mesh patch behind the filler so it has something to grip.", "Les petits trous de clous et de vis se rebouchent en quelques minutes et disparaissent avec un peu de soin. Enlevez les débris, puis appliquez de l'enduit avec un couteau à enduire en le laissant légèrement en relief, et laissez sécher complètement. Poncez à fleur, essuyez la poussière et retouchez avec une peinture assortie. Les trous plus grands qu'une pièce demandent une trame autocollante derrière l'enduit pour qu'il ait une prise.", "I piccoli fori di chiodi e viti si tappano in pochi minuti e spariscono con un po' di cura. Pulisci i detriti, poi premi lo stucco con una spatola lasciandolo appena sporgente, e fallo asciugare bene. Carteggia a livello, togli la polvere e ritocca con vernice abbinata. I buchi più grandi di una moneta richiedono una retina autoadesiva dietro lo stucco, così ha qualcosa a cui aggrapparsi.", "Kleine Nagel- und Schraublöcher sind in Minuten gefüllt und verschwinden mit etwas Sorgfalt. Entferne lose Reste, drücke dann Spachtelmasse mit einem Spachtel ein, lass sie ganz leicht überstehen und vollständig trocknen. Schleife sie bündig, wische den Staub ab und bessere mit passender Farbe aus. Löcher größer als eine Münze brauchen ein selbstklebendes Gittergewebe hinter der Masse, damit sie Halt findet.", "Găurile mici de cuie și șuruburi se umplu în câteva minute și dispar cu puțină grijă. Curăță resturile, apoi apasă chit sau ipsos cu un șpaclu, lăsându-l ușor proeminent, și lasă-l să se usuce complet. Șlefuiește la nivel, șterge praful și retușează cu vopsea asortată. Găurile mai mari decât o monedă au nevoie de o plasă autoadezivă în spatele chitului, ca să aibă de ce să se prindă."]}, {"icon": "🧰", "t": ["How to use basic tools", "Comment utiliser les outils de base", "Come usare gli attrezzi di base", "Wie man Grundwerkzeuge benutzt", "Cum folosești uneltele de bază"], "b": ["A small kit handles most home jobs: a claw hammer, a couple of screwdrivers, an adjustable spanner, a tape measure, a spirit level and pliers. Match the screwdriver to the screw head, remember 'righty-tighty, lefty-loosey', and let the tool do the work instead of forcing it. A cordless drill with a basic bit set turns hours of effort into minutes — and storing tools dry and tidy keeps them ready for next time.", "Une petite trousse suffit pour la plupart des travaux : un marteau à panne fendue, deux tournevis, une clé à molette, un mètre ruban, un niveau à bulle et une pince. Adaptez le tournevis à la tête de vis, retenez « à droite ça serre, à gauche ça desserre », et laissez l'outil travailler sans forcer. Une perceuse-visseuse sans fil avec un jeu d'embouts transforme des heures d'effort en minutes — et ranger les outils au sec et en ordre les garde prêts.", "Una piccola cassetta basta per la maggior parte dei lavori: un martello con granchio, un paio di cacciaviti, una chiave inglese, un metro, una livella e una pinza. Abbina il cacciavite alla testa della vite, ricorda «destra stringe, sinistra allenta», e lascia lavorare l'attrezzo senza forzare. Un trapano avvitatore a batteria con un set di punte trasforma ore di fatica in minuti — e tenere gli attrezzi asciutti e in ordine li mantiene pronti.", "Ein kleines Set bewältigt die meisten Arbeiten: ein Klauenhammer, ein paar Schraubendreher, ein verstellbarer Schraubenschlüssel, ein Maßband, eine Wasserwaage und eine Zange. Passe den Schraubendreher zum Schraubenkopf, merke dir „rechts fest, links lose”, und lass das Werkzeug arbeiten, statt es zu erzwingen. Ein Akkuschrauber mit Bit-Satz macht aus Stunden Minuten — und trocken und ordentlich verstaut bleiben Werkzeuge einsatzbereit.", "O trusă mică rezolvă majoritatea lucrărilor: un ciocan cu gheară, două șurubelnițe, o cheie reglabilă, o ruletă, o nivelă și un clește. Potrivește șurubelnița cu capul șurubului, ține minte „dreapta strânge, stânga slăbește” și lasă unealta să lucreze în loc s-o forțezi. O bormașină-șurubelniță cu acumulator și un set de capete transformă ore de efort în minute — iar păstrarea uneltelor uscate și ordonate le ține pregătite."]}, {"icon": "🧾", "t": ["How to read utility bills", "Comment lire ses factures d'énergie", "Come leggere le bollette", "Wie man Nebenkostenabrechnungen liest", "Cum citești facturile la utilități"], "b": ["Bills make sense once you know the parts: a standing charge you pay whatever you use, a unit rate for each kWh or cubic metre, and your metered usage for the period. Check whether a reading is 'estimated' or 'actual', and submit your own meter reading to avoid nasty surprises. Note the tariff name and the contract end date so you can compare and switch — and watch for a sudden jump, which often points to a leak, a fault or an estimate that needs correcting.", "Une facture devient claire quand on en connaît les parties : un abonnement fixe payé quoi qu'il arrive, un prix unitaire par kWh ou mètre cube, et votre consommation relevée sur la période. Vérifiez si un relevé est « estimé » ou « réel », et transmettez votre propre index pour éviter les mauvaises surprises. Notez le nom du tarif et la date de fin de contrat pour comparer et changer — et méfiez-vous d'un bond soudain, souvent signe d'une fuite, d'une panne ou d'une estimation à corriger.", "Una bolletta diventa chiara quando ne conosci le parti: una quota fissa che paghi comunque, un prezzo unitario per kWh o metro cubo, e i tuoi consumi rilevati nel periodo. Controlla se una lettura è «stimata» o «effettiva» e comunica la tua lettura del contatore per evitare brutte sorprese. Annota il nome della tariffa e la scadenza del contratto per confrontare e cambiare — e attenzione a un balzo improvviso, spesso segno di una perdita, un guasto o una stima da correggere.", "Eine Rechnung wird verständlich, wenn man ihre Teile kennt: eine Grundgebühr, die du immer zahlst, einen Arbeitspreis je kWh oder Kubikmeter und deinen gemessenen Verbrauch im Zeitraum. Prüfe, ob ein Stand „geschätzt” oder „tatsächlich” ist, und melde deinen eigenen Zählerstand, um böse Überraschungen zu vermeiden. Notiere Tarifname und Vertragsende, um zu vergleichen und zu wechseln — und achte auf einen plötzlichen Sprung, oft ein Hinweis auf ein Leck, einen Defekt oder eine falsche Schätzung.", "O factură devine clară când îi cunoști părțile: o taxă fixă pe care o plătești oricum, un preț unitar pentru fiecare kWh sau metru cub și consumul tău citit pe perioadă. Verifică dacă o citire e „estimată” sau „reală” și transmite propria citire a contorului ca să eviți surprizele neplăcute. Notează numele tarifului și data de final a contractului ca să compari și să schimbi — și fii atent la un salt brusc, adesea semn de scurgere, defect sau o estimare ce trebuie corectată."]}, {"icon": "⚡", "t": ["How to shut off water and electricity", "Comment couper l'eau et l'électricité", "Come chiudere acqua ed elettricità", "Wie man Wasser und Strom abstellt", "Cum oprești apa și electricitatea"], "b": ["Knowing your shut-offs turns an emergency into a mere inconvenience. Find the main water stopcock — often under the kitchen sink or where the pipe enters the home — and turn it clockwise to close. At the consumer unit (fuse box) the main switch cuts all electricity, while individual breakers cut single circuits; for gas, know where the emergency control valve is. Find and label them now, while everything is calm, and make sure everyone in the home knows where they are.", "Connaître ses coupures transforme une urgence en simple désagrément. Repérez le robinet d'arrêt principal d'eau — souvent sous l'évier ou à l'entrée de la canalisation — et tournez-le dans le sens des aiguilles d'une montre pour fermer. Au tableau électrique, l'interrupteur général coupe toute l'électricité, les disjoncteurs individuels coupent un circuit ; pour le gaz, sachez où se trouve la vanne d'arrêt d'urgence. Repérez-les et étiquetez-les maintenant, au calme, et assurez-vous que tout le monde sait où ils sont.", "Sapere dove chiudere trasforma un'emergenza in un semplice fastidio. Trova il rubinetto generale dell'acqua — spesso sotto il lavello o dove il tubo entra in casa — e giralo in senso orario per chiudere. Nel quadro elettrico l'interruttore generale stacca tutta la corrente, i singoli interruttori i singoli circuiti; per il gas, sappi dov'è la valvola d'emergenza. Trovali ed etichettali ora, con calma, e assicurati che tutti in casa sappiano dove sono.", "Zu wissen, wo man absperrt, macht aus einem Notfall eine bloße Unannehmlichkeit. Finde den Haupthahn fürs Wasser — oft unter der Spüle oder wo das Rohr ins Haus kommt — und drehe ihn im Uhrzeigersinn zu. Im Sicherungskasten trennt der Hauptschalter den ganzen Strom, einzelne Sicherungen einzelne Stromkreise; beim Gas: wisse, wo das Notabsperrventil ist. Finde und beschrifte sie jetzt, in Ruhe, und sorge dafür, dass alle im Haus wissen, wo sie sind.", "Să știi unde oprești transformă o urgență într-un simplu inconvenient. Găsește robinetul principal de apă — adesea sub chiuvetă sau acolo unde țeava intră în casă — și rotește-l în sensul acelor de ceas ca să-l închizi. La tabloul electric, întrerupătorul general taie tot curentul, iar siguranțele individuale taie câte un circuit; pentru gaz, află unde e robinetul de urgență. Găsește-le și etichetează-le acum, pe liniște, și asigură-te că toți din casă știu unde sunt."], "steps": [["Locate the main water stopcock and the fuse box.", "Repérez le robinet d'arrêt principal et le tableau électrique.", "Individua il rubinetto generale e il quadro elettrico.", "Haupthahn und Sicherungskasten ausfindig machen.", "Localizează robinetul principal și tabloul electric."], ["To stop water, turn the stopcock clockwise.", "Pour couper l'eau, tournez le robinet dans le sens horaire.", "Per fermare l'acqua, gira il rubinetto in senso orario.", "Wasser stoppen: Haupthahn im Uhrzeigersinn zudrehen.", "Ca să oprești apa, rotește robinetul în sensul acelor de ceas."], ["To cut power, switch the main breaker off.", "Pour couper le courant, basculez l'interrupteur général.", "Per togliere corrente, abbassa l'interruttore generale.", "Strom abschalten: Hauptschalter ausschalten.", "Ca să tai curentul, oprește întrerupătorul general."], ["Label both and make sure the household knows.", "Étiquetez les deux et prévenez toute la maisonnée.", "Etichetta entrambi e avvisa tutti in casa.", "Beides beschriften und alle im Haushalt informieren.", "Etichetează-le pe ambele și anunță toată gospodăria."]]}, {"icon": "📋", "t": ["How to build a household inventory", "Comment dresser un inventaire du foyer", "Come creare un inventario domestico", "Wie man ein Haushaltsinventar erstellt", "Cum faci un inventar al gospodăriei"], "b": ["A simple inventory helps with insurance claims, moving home and everyday order. Go room by room, photographing valuables and noting the brand, model, serial number and rough value, and keep receipts and warranties together in one folder. Store the list in the cloud or with a trusted person so it survives the very fire or flood it is meant for, and update it once a year. It takes an afternoon and can save weeks of stress later.", "Un inventaire simple aide pour les assurances, les déménagements et l'ordre du quotidien. Pièce par pièce, photographiez les objets de valeur en notant marque, modèle, numéro de série et valeur approximative, et gardez factures et garanties dans un même dossier. Conservez la liste dans le cloud ou chez une personne de confiance pour qu'elle survive à l'incendie ou à l'inondation qu'elle prévoit, et mettez-la à jour une fois par an. Cela prend un après-midi et peut éviter des semaines de stress.", "Un semplice inventario aiuta con le assicurazioni, i traslochi e l'ordine quotidiano. Stanza per stanza, fotografa gli oggetti di valore annotando marca, modello, numero di serie e valore approssimativo, e tieni scontrini e garanzie in un'unica cartella. Conserva la lista nel cloud o presso una persona fidata, così sopravvive proprio all'incendio o all'allagamento per cui serve, e aggiornala una volta l'anno. Richiede un pomeriggio e può evitare settimane di stress.", "Ein einfaches Inventar hilft bei Versicherungen, Umzügen und der alltäglichen Ordnung. Geh Raum für Raum vor, fotografiere Wertsachen und notiere Marke, Modell, Seriennummer und ungefähren Wert, und sammle Belege und Garantien in einem Ordner. Speichere die Liste in der Cloud oder bei einer Vertrauensperson, damit sie genau den Brand oder die Überschwemmung übersteht, für die sie gedacht ist, und aktualisiere sie einmal im Jahr. Es kostet einen Nachmittag und kann später Wochen Stress sparen.", "Un inventar simplu ajută la asigurări, mutări și ordinea de zi cu zi. Mergi din cameră în cameră, fotografiază lucrurile de valoare și notează marca, modelul, seria și valoarea aproximativă și ține bonurile și garanțiile într-un singur dosar. Păstrează lista în cloud sau la o persoană de încredere, ca să supraviețuiască chiar incendiului sau inundației pentru care e gândită, și actualizeaz-o o dată pe an. Durează o după-amiază și poate scuti săptămâni de stres mai târziu."]}, {"icon": "🧯", "t": ["How to use a fire extinguisher", "Comment utiliser un extincteur", "Come usare un estintore", "Wie man einen Feuerlöscher benutzt", "Cum folosești un extinctor"], "b": ["Remember the word PASS. Pull the pin to break the seal. Aim the nozzle low, at the base of the fire rather than the flames. Squeeze the handle to release the agent. Sweep from side to side across the base until the fire is out. Always keep a clear exit behind you, stand a couple of metres back, and only tackle a small, contained fire — if it is spreading or taller than you, leave at once and call the emergency services.", "Retenez le mot anglais PASS. Tirez la goupille (Pull) pour briser le scellé. Visez bas (Aim), à la base du feu plutôt que les flammes. Pressez la poignée (Squeeze) pour libérer le produit. Balayez (Sweep) d'un côté à l'autre à la base jusqu'à extinction. Gardez toujours une sortie dégagée derrière vous, tenez-vous à deux mètres, et n'attaquez qu'un petit feu maîtrisé — s'il se propage ou vous dépasse, sortez aussitôt et appelez les secours.", "Ricorda la parola inglese PASS. Togli la spina (Pull) per rompere il sigillo. Punta in basso (Aim), alla base del fuoco e non alle fiamme. Premi la maniglia (Squeeze) per erogare l'agente. Muovi da un lato all'altro (Sweep) sulla base finché il fuoco è spento. Tieni sempre un'uscita libera alle spalle, stai a un paio di metri e affronta solo un piccolo incendio contenuto — se si propaga o è più alto di te, esci subito e chiama i soccorsi.", "Merk dir das englische Wort PASS. Zieh den Stift (Pull), um die Sicherung zu lösen. Ziel tief (Aim), auf den Brandherd statt auf die Flammen. Drück den Hebel (Squeeze), um das Mittel freizugeben. Wisch in Schwüngen (Sweep) hin und her über die Basis, bis das Feuer aus ist. Halt immer einen freien Ausgang im Rücken, steh ein paar Meter entfernt und bekämpfe nur ein kleines, begrenztes Feuer — breitet es sich aus oder ist es größer als du, geh sofort hinaus und ruf die Feuerwehr.", "Ține minte cuvântul englezesc PASS. Trage siguranța (Pull) ca să rupi sigiliul. Țintește jos (Aim), la baza focului, nu spre flăcări. Apasă mânerul (Squeeze) ca să eliberezi agentul. Mătură dintr-o parte în alta (Sweep) peste bază până se stinge focul. Păstrează mereu o ieșire liberă în spate, stai la câțiva metri și atacă doar un foc mic, controlat — dacă se extinde sau e mai înalt decât tine, ieși imediat și sună la urgențe."]}]}];

  function tile(sec,t){

      steps='<button class="nbtn sm" onclick="nestToggle(\''+id+'\')">'+E(L(U.how))+' →</button>'+
        '<div class="nsteps" id="'+id+'"><ol>'+t.steps.map(function(s){return '<li>'+E(L(s))+'</li>';}).join('')+'</ol></div>';}
    return '<div class="ntile" data-s="'+EA(ds)+'" style="--nbg:'+sec.bg+';--nbd:'+sec.bd+';border-radius:'+sec.rad+'">'+
      '<button class="nheart" onclick="nestSaveToggle(this)" aria-label="Save">♡</button>'+
      '<div class="ntile-ic">'+t.icon+'</div><h3>'+E(q)+'</h3><p>'+E(L(t.b))+'</p>'+

      steps+'</div>';
  }

  window.renderHowTo=function(){
    var head='<div class="back" onclick="setTab(0)">'+E(L(U.back))+'</div>';
    var body=inner();
    if(typeof S!=="undefined"&&S&&S.unlocked) return '<div class="panel nest howto">'+head+body+'</div>';
    return '<div class="panel nest howto">'+head+'<div class="lockwrap"><div class="lockblur">'+body+'</div>'+
      '<div class="lockcard"><div class="lk">🔒</div>'+
      '<h2 class="serif" style="font-size:25px;margin:8px 0 4px">'+E(L(U.lockt))+'</h2>'+
      '<div class="muted ital" style="margin-bottom:16px;max-width:320px">'+E(L(U.lockb))+'</div>'+
      '<button class="btn" onclick="subscribe()">'+E(L(U.unlock))+'</button>'+
      '<button class="btn gift" style="margin-top:10px" onclick="ding();toast(\'Gift link ready to send 🎁\')">'+E(L(U.gift))+'</button>'+
      '</div></div></div>';
  };
  window.howtoFilter=function(){
    var box=document.getElementById('howtoSearch'); if(!box)return;
    var q=box.value.trim().toLowerCase(), shown=0;
    document.querySelectorAll('.howto .ntile').forEach(function(t){
      var hit=!q||(t.getAttribute('data-s')||'').indexOf(q)>=0;
      t.style.display=hit?'':'none'; if(hit)shown++;
    });
    document.querySelectorAll('.howto .nsec').forEach(function(s){
      var vis=0; s.querySelectorAll('.ntile').forEach(function(t){if(t.style.display!=='none')vis++;});
      s.style.display=vis?'':'none';
    });
    var no=document.getElementById('howtoNo'); if(no) no.style.display=(q&&shown===0)?'block':'none';
  };
  window.howtoWeb=function(){
    var box=document.getElementById('howtoSearch'); var q=box?box.value.trim():'';
    if(!q){ if(box)box.focus(); return; }
    window.open('https://www.google.com/search?q='+encodeURIComponent(q),'_blank');
  };
  window.howtoWatch=function(btn){
    var q=btn&&btn.getAttribute('data-q')||'';
    window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(q),'_blank');
  };
})();
</script>

<script>
/* Aurora day/night sky — additive, cosmetic only (real-clock dawn/day/dusk/night) */
(function(){
  function build(){
    if(document.getElementById('aurora-sky'))return;
    var sky=document.createElement('div'); sky.id='aurora-sky';
    ['dawn','day','dusk','night'].forEach(function(p){
      var d=document.createElement('div'); d.className='aurora-layer aurora-'+p; d.setAttribute('data-p',p); sky.appendChild(d);
    });
    document.body.insertBefore(sky, document.body.firstChild);
    apply();
  }
  function phaseFor(h){ if(h>=6&&h<9)return 'dawn'; if(h>=9&&h<16)return 'day'; if(h>=16&&h<18)return 'dusk'; return 'night'; }
  function apply(){
    var sky=document.getElementById('aurora-sky'); if(!sky)return;
    var h=new Date().getHours(), p=phaseFor(h);
    var layers=sky.querySelectorAll('.aurora-layer');
    for(var i=0;i<layers.length;i++){ layers[i].classList.toggle('on', layers[i].getAttribute('data-p')===p); }
    try{ document.body.classList.toggle('night', (h>=18||h<6)); }catch(e){}
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', build); else build();
  setInterval(apply, 60000);
})();
</script>

<script>
/* CuriO photos — real images from Wikipedia at display time; graceful fallback to the illustration when offline or unavailable */
(function(){
  var WMAP={"Banff":"Banff National Park","Arctic Tern":"Arctic tern","Aloe Vera":"Aloe vera",
    "Cherry Blossom":"Cherry blossom","Lavender":"Lavandula","Sunflower":"Common sunflower",
    "Rosemary":"Rosemary","Marrakesh":"Marrakesh"};
  var cache={};
  function title(nm){ return WMAP[nm]||nm; }
  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function look(nm){
    var t=title(nm);
    if(cache[t]!==undefined) return Promise.resolve(cache[t]);
    return fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(t))
      .then(function(r){ return r.ok?r.json():null; })
      .then(function(j){
        var src=(j&&j.thumbnail&&j.thumbnail.source)||"";
        if(src) src=src.replace(/\/\d+px-/,"/640px-");
        var page=(j&&j.content_urls&&j.content_urls.desktop&&j.content_urls.desktop.page)||"";
        var info=src?{src:src,page:page}:null; cache[t]=info; return info;
      }).catch(function(){ cache[t]=null; return null; });
  }
  function hydrate(){
    var list=document.querySelectorAll("svg.ph[data-nm]:not([data-pdone])");
    Array.prototype.forEach.call(list,function(svg){
      svg.setAttribute("data-pdone","1");
      var nm=svg.getAttribute("data-nm"); var plate=svg.parentElement;
      if(!plate) return;
      look(nm).then(function(info){
        if(!info||!info.src||!plate.isConnected) return;
        var im=new Image();
        im.onload=function(){
          plate.innerHTML='<img src="'+esc(info.src)+'" alt="'+esc(nm)+'">'+
            (info.page?'<a class="photo-credit" href="'+esc(info.page)+'" target="_blank" rel="noopener noreferrer">Wikipedia \u2197</a>':'');
        };
        im.src=info.src;  /* keep the illustration until the photo actually loads */
      });
    });
  }
  var t; function ping(){ clearTimeout(t); t=setTimeout(hydrate,60); }
  function start(){
    try{ new MutationObserver(ping).observe(document.getElementById("view")||document.body,{childList:true,subtree:true}); }catch(e){}
    hydrate();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",start); else start();
})();
</script>

<script>
/* CuriO daily reminder (opt-in). Additive — uses existing S/save()/toast(). */
function curioReminderLabel(){
  var l=document.getElementById('remindLbl');
  if(l) l.textContent = (typeof S!=='undefined' && S.remind) ? 'Daily reminder \u00b7 on' : 'Daily reminder';
}
async function curioRegisterPeriodic(){
  try{
    if(!('serviceWorker' in navigator)) return;
    var reg=await navigator.serviceWorker.ready;
    if('periodicSync' in reg){
      var st=await navigator.permissions.query({name:'periodic-background-sync'});
      if(st.state==='granted'){ await reg.periodicSync.register('curio-daily',{minInterval:24*60*60*1000}); }
    }
  }catch(e){}
}
async function curioReminder(){
  try{ if(typeof closeMenu==='function') closeMenu(); }catch(e){}
  if(!('Notification' in window)){ if(typeof toast==='function') toast('Notifications aren\u2019t supported here'); return; }
  if(typeof S==='undefined'){ return; }
  if(S.remind){
    S.remind=false; if(typeof save==='function') save(); curioReminderLabel();
    try{ var reg=await navigator.serviceWorker.ready; if(reg.periodicSync) await reg.periodicSync.unregister('curio-daily'); }catch(e){}
    if(typeof toast==='function') toast('Daily reminder turned off'); return;
  }
  var perm=Notification.permission;
  if(perm!=='granted'){ try{ perm=await Notification.requestPermission(); }catch(e){} }
  if(perm!=='granted'){ if(typeof toast==='function') toast('Notifications are blocked \u2014 allow them in your settings'); return; }
  S.remind=true; if(typeof save==='function') save(); curioReminderLabel();
  await curioRegisterPeriodic();
  var opts={body:'Daily reminder is on \u2014 this is how your gentle nudge will look. \u2726',
            icon:'icon-192.png?v=2',badge:'favicon-32.png?v=2',tag:'curio-daily',renotify:true};
  try{ var reg2=await navigator.serviceWorker.ready; reg2.showNotification('CuriO \u2014 The Daybook',opts); }
  catch(e){ try{ new Notification('CuriO \u2014 The Daybook',opts); }catch(_){} }
  if(typeof toast==='function') toast('Daily reminder on \u2014 sent you a sample');
}
(function(){
  function init(){ curioReminderLabel(); try{ if(typeof S!=='undefined' && S.remind) curioRegisterPeriodic(); }catch(e){} }
  if(document.readyState==='complete') init(); else window.addEventListener('load', init);
})();
</script>

<script>
/* CuriO Collection — save & revisit. Additive: uses existing S / save() / toast(). */
var CURIO_SAVEABLE={'\u2b50 Fact of the Day':'Fact','\ud83d\udcdc This Day in History':'This Day',
 '\ud83c\udf0d Place of the Day':'Place','\ud83e\udd89 Animal of the Day':'Animal',
 '\ud83c\udf3f Green Discovery':'Green','\ud83d\udcac Quote of the Day':'Quote'};
function curioCol(){ if(typeof S==='undefined') return []; if(!Array.isArray(S.collection)) S.collection=[]; return S.collection; }
function curioHash(s){ var n=0,i; for(i=0;i<s.length;i++){ n=(n*31+s.charCodeAt(i))|0; } return 'c'+(n>>>0).toString(36); }
function curioClean(t){ return (t||'').replace(/Wikipedia\s*\u2197/g,'').replace(/[\u2661\u2665]/g,'').replace(/\s+/g,' ').trim(); }
function curioDateStr(){ try{ return new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }
function curioCardText(sh){ var c=sh.nextElementSibling; if(!c) return ''; return curioClean(c.innerText||c.textContent||'').slice(0,420); }
function curioCount(){ var l=document.getElementById('colLbl'); if(l){ var n=curioCol().length; l.textContent=n?('Collection \u00b7 '+n):'Collection'; } }
function curioToggleSave(sh,kind,title,btn){
  var text=curioCardText(sh); if(!text) return;
  var id=curioHash(kind+'|'+text), col=curioCol(), idx=col.findIndex(function(x){return x.id===id;});
  if(idx>=0){ col.splice(idx,1); btn.classList.remove('on'); btn.textContent='\u2661'; if(typeof toast==='function') toast('Removed from your collection'); }
  else{ col.unshift({id:id,kind:kind,title:title,text:text,date:curioDateStr()}); btn.classList.add('on'); btn.textContent='\u2665'; if(typeof toast==='function') toast('Saved to your collection'); }
  if(typeof save==='function') save(); curioCount();
}
function curioInjectSaves(){
  var col=curioCol(), hs=document.querySelectorAll('#view .section-h h2');
  Array.prototype.forEach.call(hs,function(h2){
    var title=(h2.textContent||'').trim(), kind=CURIO_SAVEABLE[title]; if(!kind) return;
    var sh=h2.parentElement; if(sh.querySelector('.curio-save')) return;
    var text=curioCardText(sh);
    var saved=!!text && col.some(function(x){return x.id===curioHash(kind+'|'+text);});
    var btn=document.createElement('button');
    btn.className='curio-save'+(saved?' on':''); btn.type='button';
    btn.setAttribute('aria-label','Save to collection'); btn.textContent=saved?'\u2665':'\u2661';
    sh.style.position='relative'; sh.style.paddingRight='34px';
    btn.onclick=function(ev){ ev.stopPropagation(); curioToggleSave(sh,kind,title,btn); };
    sh.appendChild(btn);
  });
}
function curioRefreshSaves(){
  var col=curioCol(), hs=document.querySelectorAll('#view .section-h h2');
  Array.prototype.forEach.call(hs,function(h2){
    var title=(h2.textContent||'').trim(), kind=CURIO_SAVEABLE[title]; if(!kind) return;
    var sh=h2.parentElement, btn=sh.querySelector('.curio-save'); if(!btn) return;
    var text=curioCardText(sh), saved=!!text && col.some(function(x){return x.id===curioHash(kind+'|'+text);});
    btn.classList.toggle('on',saved); btn.textContent=saved?'\u2665':'\u2661';
  });
}
function curioEsc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function curioRenderCol(){
  var body=document.getElementById('colBody'); if(!body) return;
  var col=curioCol();
  var head='<div class="col-head"><h2>\u2726 Collection</h2><button class="col-x" onclick="closeCollection()" aria-label="Close">\u00d7</button></div>';
  if(!col.length){ body.innerHTML=head+'<div class="col-empty">Your collection is empty.<br>Tap the \u2661 on any card to keep it here.</div>'; return; }
  body.innerHTML=head+'<div class="col-list">'+col.map(function(it){
    return '<div class="col-item"><div class="ct">'+curioEsc(it.title)+'</div>'+
      '<div class="cx">'+curioEsc(it.text)+'</div>'+
      '<div class="cd">saved '+curioEsc(it.date)+'</div>'+
      '<div class="col-acts"><button onclick="curioShareItem(\''+curioEsc(it.id)+'\')">Share</button>'+
      '<button onclick="curioRemoveItem(\''+curioEsc(it.id)+'\')">Remove</button></div></div>';
  }).join('')+'</div>';
}
function openCollection(){ try{ if(typeof closeMenu==='function') closeMenu(); }catch(e){} curioRenderCol(); var s=document.getElementById('colSheet'); if(s) s.classList.add('show'); }
function closeCollection(){ var s=document.getElementById('colSheet'); if(s) s.classList.remove('show'); }
function curioRemoveItem(id){ var col=curioCol(), i=col.findIndex(function(x){return x.id===id;}); if(i>=0){ col.splice(i,1); if(typeof save==='function') save(); } curioRenderCol(); curioCount(); curioRefreshSaves(); }
function curioShareItem(id){
  var col=curioCol(), it=col.find(function(x){return x.id===id;}); if(!it) return;
  var txt=it.text+'\n\n\u2014 '+it.title+', via CuriO \u2014 The Daybook';
  if(navigator.share){ navigator.share({title:'CuriO \u2014 The Daybook',text:txt}).catch(function(){}); }
  else if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){ if(typeof toast==='function') toast('Copied to clipboard'); },function(){}); }
  else if(typeof toast==='function'){ toast('Sharing not supported here'); }
}
(function(){
  var t; function ping(){ clearTimeout(t); t=setTimeout(function(){ curioInjectSaves(); curioCount(); },80); }
  function start(){ try{ new MutationObserver(ping).observe(document.getElementById('view')||document.body,{childList:true,subtree:true}); }catch(e){} ping(); }
  if(document.readyState==='loading') window.addEventListener('DOMContentLoaded',start); else start();
})();
</script>

<script>
/* CuriO — 7-day free trial of CuriO+. Additive: uses existing S / save() / setTab() / toast(). */
var CURIO_TRIAL_MS = 7*24*60*60*1000;
function curioTrialActive(){ return typeof S!=='undefined' && S.trialStart>0 && (Date.now()-S.trialStart) < CURIO_TRIAL_MS; }
function curioTrialDaysLeft(){ if(!curioTrialActive()) return 0; return Math.max(1, Math.ceil((CURIO_TRIAL_MS-(Date.now()-S.trialStart))/86400000)); }
function curioTrialSync(){
  if(typeof S==='undefined') return;
  if(S.paid){ if(!S.unlocked){ S.unlocked=true; if(typeof save==='function') save(); } return; }
  if(S.trialStart>0){
    if(curioTrialActive()){ if(!S.unlocked){ S.unlocked=true; if(typeof save==='function') save(); } }
    else if(S.unlocked){ S.unlocked=false; if(typeof save==='function') save(); }
  }
}
function startTrial(){
  if(typeof S==='undefined') return;
  if(S.paid) return;
  if(S.trialStart>0){ if(typeof toast==='function') toast('Your free trial has already been used'); return; }
  S.trialStart=Date.now(); S.unlocked=true; if(typeof save==='function') save();
  try{ if(typeof ding==='function') ding(); }catch(e){}
  if(typeof toast==='function') toast('Your 7-day trial has begun \u2014 enjoy all of CuriO+ \u2726');
  try{ if(typeof setTab==='function') setTab(typeof tab!=='undefined'?tab:0); }catch(e){}
}
function curioInjectTrial(){
  var v=document.getElementById('view'); if(!v) return;
  if(v.querySelector('.curio-trial-btn,.curio-trial-note')) return;   /* one CTA per view */
  var btn=v.querySelector('button[onclick="subscribe()"]'); if(!btn || !btn.parentNode) return;
  if(typeof S==='undefined' || S.paid) return;
  if(curioTrialActive()){
    var d=curioTrialDaysLeft();
    var note=document.createElement('div'); note.className='curio-trial-note';
    note.textContent='\u2726 Free trial active \u2014 '+d+' day'+(d===1?'':'s')+' left';
    btn.parentNode.insertBefore(note, btn); return;
  }
  if(S.trialStart>0){
    var n2=document.createElement('div'); n2.className='curio-trial-note';
    n2.textContent='Your free trial has ended.';
    btn.parentNode.insertBefore(n2, btn); return;
  }
  var tb=document.createElement('button');
  tb.className='btn curio-trial-btn'; tb.type='button';
  tb.textContent='Start your 7-day free trial';
  tb.onclick=function(ev){ ev.preventDefault(); ev.stopPropagation(); startTrial(); };
  btn.parentNode.insertBefore(tb, btn);
}
curioTrialSync();   /* runs before any navigation to a locked tab */
(function(){
  var t; function ping(){ clearTimeout(t); t=setTimeout(curioInjectTrial,90); }
  function start(){ try{ new MutationObserver(ping).observe(document.getElementById('view')||document.body,{childList:true,subtree:true}); }catch(e){} ping(); }
  if(document.readyState==='loading') window.addEventListener('DOMContentLoaded',start); else start();
})();
</script>
